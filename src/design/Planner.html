            .map((item) => {
              const k = item.base.toLowerCase();
              const inFridge = fridgeNames.some(
                (fn) => fn.includes(k) || k.includes(fn),
              );
              return {
                ...item,
                recipes: [...item.recipes],
                lines: [...item.lines],
                inFridge,
              };
            })
            .sort(
              (a, b) =>
                Number(a.inFridge) - Number(b.inFridge) ||
                a.base.localeCompare(b.base),
            );
        }, [assignedRecipes, fridge.length, L]);

        const missingCount = shoppingItems.filter((i) => !i.inFridge).length;
        const haveCount = shoppingItems.filter((i) => i.inFridge).length;

        const weekRange = (() => {
          const end = new Date(weekStart);
          end.setDate(weekStart.getDate() + 6);
          const m = L ? monthsEn : monthsBg;
          return `${weekStart.getDate()} ${m[weekStart.getMonth()]} → ${end.getDate()} ${m[end.getMonth()]}`;
        })();

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "The week ahead" : "Седмицата напред"}</span>
              </div>
              <div className="topbar-actions">
                <button
                  className="btn btn-secondary btn-xs"
                  onClick={() => setWeekOffset((w) => w - 1)}
                >
                  ← {L ? "Prev" : "Пред."}
                </button>
                <button
                  className="btn btn-secondary btn-xs"
                  onClick={() => setWeekOffset(0)}
                  style={{ opacity: weekOffset === 0 ? 0.55 : 1 }}
                >
                  {L ? "This week" : "Тази седмица"}
                </button>
                <button
                  className="btn btn-secondary btn-xs"
                  onClick={() => setWeekOffset((w) => w + 1)}
                >
                  {L ? "Next" : "Следв."} →
                </button>
              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "A week at the table" : "Седмица на масата"}
                </div>
                <h1 className="h-title">
                  <span className="italic">{L ? "Planner" : "Седмица"}</span>
                </h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {L
                    ? "Drag a recipe onto any meal slot. When the week is set, the shopping list assembles itself."
                    : "Дръпни рецепта в свободна клетка. Когато седмицата е готова, списъкът за пазар се сглобява сам."}
                </div>
              </div>
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "flex-end",
                  gap: 10,
                }}
              >
                <span className="label">{weekRange}</span>
                <div style={{ display: "flex", gap: 8 }}>
                  {mealsPlanned === 0 && (
                    <button
                      className="btn btn-secondary btn-xs"
                      onClick={() => {
                        setPlanner({
                          ...planner,
                          [weekKey]: {
                            "0_breakfast": "r1",
                            "0_lunch": "r2",
                            "0_dinner": "r4",
                            "1_breakfast": "r3",
                            "1_dinner": "r6",
                            "2_breakfast": "r5",
                            "2_lunch": "r2",
                            "3_breakfast": "r1",
                            "3_dinner": "r4",
                            "4_breakfast": "r3",
                            "4_lunch": "r6",
                            "5_breakfast": "r5",
                            "5_dinner": "r2",
                            "6_breakfast": "r1",
                          },
                        });
                      }}
                    >
                      {L ? "Try a sample week" : "Пробвай примерна седмица"}
                    </button>
                  )}
                  {mealsPlanned > 0 && (
                    <button
                      className="btn btn-ghost btn-xs"
                      onClick={clearWeek}
                    >
                      {L ? "Clear week" : "Изчисти седмицата"}
                    </button>
                  )}
                </div>
              </div>
            </div>

            <div className="week-metrics">
              <div className="week-metric">
                <div className="week-metric-num italic clay">
                  {mealsPlanned}
                  <span
                    style={{
                      color: "var(--ink-3)",
                      fontSize: ".55em",
                      letterSpacing: 0,
                      fontStyle: "normal",
                    }}
                  >
                    {" "}
                    / {mealsTotal}
                  </span>
                </div>
                <div className="week-metric-label">
                  {L ? "Meals planned" : "Планирани хранения"}
                </div>
              </div>
              <div className="week-metric">
                <div className="week-metric-num italic">
                  {new Set(assignedIds).size}
                </div>
                <div className="week-metric-label">
                  {L ? "Unique recipes" : "Уникални рецепти"}
                </div>
              </div>
              <div className="week-metric">
                <div className="week-metric-num italic amber">
                  {missingCount}
                </div>
                <div className="week-metric-label">
                  {L ? "To buy" : "За пазар"}
                </div>
              </div>
              <div className="week-metric">
                <div className="week-metric-num italic moss">{haveCount}</div>
                <div className="week-metric-label">
                  {L ? "Already on shelves" : "Вече на рафта"}
                </div>
              </div>
            </div>

            <div className="planner-stage">
              <div>
                <div className="section-eyebrow">
                  <span className="label">{L ? "Mon → Sun" : "Пон → Нед"}</span>
                </div>
                <div className="planner-week">
                  {days.map((day) => (
                    <div
                      key={day.idx}
                      className={`planner-day${day.isToday ? " today" : ""}`}
                    >
                      <div className="day-label">
                        <div className="day-name">{day.name}</div>
                        <div className="day-date">
                          {day.dateLabel}
                          {day.isToday ? ` · ${L ? "TODAY" : "ДНЕС"}` : ""}
                        </div>
                      </div>
                      <div className="day-meals">
                        {meals.map((meal) => {
                          const slotKey = `${day.idx}_${meal.id}`;
                          const recipeId = weekData[slotKey];
                          const recipe = recipeId
                            ? recipes.find((r) => r.id === recipeId)
                            : null;
                          const flagged =
                            recipe &&
                            recipe.requiredIngredients?.some((i) =>
                              blocked.some((b) => i.toLowerCase().includes(b)),
                            );
                          const isDropTarget = dropTarget === slotKey;
                          return (
                            <div
                              key={meal.id}
                              className={`meal-slot${recipe ? "" : " empty"}${flagged ? " flagged" : ""}${isDropTarget ? " drop-target" : ""}`}
                              onDragOver={(e) => {
                                e.preventDefault();
                                setDropTarget(slotKey);
                              }}
                              onDragLeave={() =>
                                setDropTarget((t) => (t === slotKey ? null : t))
                              }
                              onDrop={(e) => {
                                e.preventDefault();
                                const id =
                                  e.dataTransfer.getData("text/plain") ||
                                  dragId;

                            >

                              {recipe ? (
                                <>
                                  <div
                                    className="meal-filled"
                                    draggable
                                    onDragStart={(e) => {

                                        "text/plain",
                                        recipe.id,
                                      );
                                      setDragId(recipe.id);
                                    }}
                                    onDragEnd={() => setDragId(null)}
                                    onClick={() => onOpenRecipe?.(recipe.id)}
                                  >
                                    <div className="meal-emoji">
                                      <span>{recipe.emoji}</span>
                                    </div>
                                    <div className="meal-text">
                                      <div className="meal-name">
                                        {L && recipe.nameEn
                                          ? recipe.nameEn
                                          : recipe.name}
                                      </div>
                                      <div className="meal-meta">
                                        {recipe.time} {L ? "MIN" : "МИН"}
                                      </div>
                                    </div>
                                  </div>
                                  <button
                                    className="meal-remove"
                                    onClick={(e) => {
                                      e.stopPropagation();
                                      clearSlot(day.idx, meal.id);
                                    }}
                                    title={L ? "Clear" : "Изчисти"}
                                  >
                                    ×
                                  </button>
                                </>
                              ) : (
                                <button
                                  className="meal-slot-empty-cta"
                                  onClick={() =>
                                    setPickerOpen({
                                      day: day.idx,
                                      meal: meal.id,
                                    })
                                  }
                                >
                                  <span>
                                    {L ? "drop or pick" : "пусни или избери"}
                                  </span>
                                  <span className="plus">+</span>
                                </button>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <aside className="planner-rail">
                <div className="recipe-drawer">
                  <div className="recipe-drawer-head">
                    <div className="drawer-title">
                      {L ? "Recipes" : "Рецепти"}
                    </div>
                    <div className="drawer-count">
                      {filteredRecipes.length} / {recipes.length}
                    </div>
                  </div>
                  <div className="drawer-search">
                    <span className="drawer-search-glyph">⌕</span>
                    <input
                      value={drawerQuery}
                      onChange={(e) => setDrawerQuery(e.target.value)}
                      placeholder={L ? "Search…" : "Търси…"}
                    />
                  </div>
                  <div className="drawer-chips">
                    {[
                      ["all", L ? "All" : "Всички"],
                      ["breakfast", L ? "Breakfast" : "Закуска"],
                      ["lunch", L ? "Lunch" : "Обяд"],
                      ["dinner", L ? "Dinner" : "Вечеря"],
                    ].map(([id, label]) => (
                      <button
                        key={id}
                        className={`drawer-chip${drawerFilter === id ? " on" : ""}`}
                        onClick={() => setDrawerFilter(id)}
                      >
                        {label}
                      </button>
                    ))}
                  </div>
                  <div className="drawer-list">
                    {filteredRecipes.map((r) => {
                      const flagged = r.requiredIngredients?.some((i) =>
                        blocked.some((b) => i.toLowerCase().includes(b)),
                      );
                      return (
                        <div
                          key={r.id}
                          className={`drawer-recipe${flagged ? " flagged" : ""}${dragId === r.id ? " dragging" : ""}`}
                          draggable
                          onDragStart={(e) => {
                            e.dataTransfer.setData("text/plain", r.id);
                            setDragId(r.id);
                          }}
                          onDragEnd={() => setDragId(null)}
                        >
                          <div className="drawer-recipe-emoji">
                            <span>{r.emoji}</span>
                          </div>
                          <div className="drawer-recipe-text">
                            <div className="drawer-recipe-name">
                              {L && r.nameEn ? r.nameEn : r.name}
                            </div>
                            <div className="drawer-recipe-meta">
                              {r.time} {L ? "MIN" : "МИН"} ·{" "}
                              {r.tags?.[0] || (L ? "recipe" : "рецепта")}
                            </div>
                          </div>
                          <div className="drawer-recipe-grip">::</div>
                        </div>
                      );
                    })}
                    {filteredRecipes.length === 0 && (
                      <div
                        style={{
                          padding: "24px 8px",
                          textAlign: "center",
                          color: "var(--ink-3)",
                          fontSize: 13,
                        }}
                      >
                        {L ? "Nothing matches." : "Нищо не намерихме."}
                      </div>
                    )}
                  </div>
                </div>

                <div className="shopping-card">
                  <div className="shopping-card-glyph">∑</div>
                  <div className="shopping-card-eyebrow">
                    {L ? "End of the week" : "Краят на седмицата"}
                  </div>
                  <div className="shopping-card-title">
                    {L ? "Shopping list" : "Списък за пазар"}
                  </div>
                  <div className="shopping-card-sub">
                    {mealsPlanned === 0
                      ? L
                        ? "Plan a meal first — the list will assemble itself."
                        : "Първо планирай — списъкът ще се сглоби сам."
                      : L
                        ? `${mealsPlanned} meals across ${new Set(assignedIds).size} recipes call for ${missingCount + haveCount} ingredients.`
                        : `${mealsPlanned} хранения от ${new Set(assignedIds).size} рецепти искат ${missingCount + haveCount} продукта.`}
                  </div>
                  <div className="shopping-card-stats">
                    <div className="shopping-card-stat">
                      <div className="shopping-card-stat-num">
                        {missingCount}
                      </div>
                      <div className="shopping-card-stat-label">
                        {L ? "To buy" : "За пазар"}
                      </div>
                    </div>
                    <div className="shopping-card-stat">
                      <div className="shopping-card-stat-num">{haveCount}</div>
                      <div className="shopping-card-stat-label">
                        {L ? "On shelves" : "На рафта"}
                      </div>
                    </div>
                  </div>
                  <button
                    className="shopping-card-btn"
                    onClick={() => setShopOpen(true)}
                    disabled={mealsPlanned === 0}
                  >
                    {L ? "Generate list" : "Генерирай списъка"}{" "}
                    <span style={{ opacity: 0.55 }}>→</span>
                  </button>
                </div>
              </aside>
            </div>

            {pickerOpen && (
              <PickerModal
                recipes={recipes}
                lang={lang}
                blocked={blocked}
                dayName={days[pickerOpen.day].name}
                mealName={
                  L
                    ? meals.find((m) => m.id === pickerOpen.meal).en
                    : meals.find((m) => m.id === pickerOpen.meal).bg
                }
                onClose={() => setPickerOpen(null)}
                onPick={(id) => {
                  setSlot(pickerOpen.day, pickerOpen.meal, id);
                  setPickerOpen(null);
                }}
              />
            )}

            {shopOpen && (
              <ShoppingModal
                items={shoppingItems}
                missingCount={missingCount}
                haveCount={haveCount}
                mealsPlanned={mealsPlanned}
                weekRange={weekRange}
                lang={lang}
                onClose={() => setShopOpen(false)}
              />
            )}
          </div>
        );
      }

      function PickerModal({
        recipes,
        lang,
        blocked,
        dayName,
        mealName,
        onClose,
        onPick,
      }) {
        const L = lang === "en";
        const [q, setQ] = useState("");
        const filtered = recipes.filter((r) => {
          const name = ((L ? r.nameEn : r.name) || r.name).toLowerCase();
          return !q || name.includes(q.toLowerCase());
        });
        return (
          <div className="overlay" onClick={onClose}>
            <div
              className="modal"
              onClick={(e) => e.stopPropagation()}
              style={{ maxWidth: 560 }}
            >
              <button className="modal-close" onClick={onClose}>
                ×
              </button>
              <div className="label" style={{ marginBottom: 10 }}>
                {dayName} · {mealName}
              </div>
              <h2 className="modal-title italic">
                {L ? "Pick a recipe" : "Избери рецепта"}
              </h2>
              <div className="modal-sub">
                {L
                  ? "Or drag one from the side panel."
                  : "Или дръпни от страничния панел."}
              </div>
              <input
                className="input"
                autoFocus
                placeholder={L ? "Search recipes…" : "Търси рецепти…"}
                value={q}
                onChange={(e) => setQ(e.target.value)}
                style={{ marginBottom: 14 }}
              />
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: 6,
                  maxHeight: 380,
                  overflowY: "auto",
                  margin: "0 -4px",
                  padding: "0 4px",
                }}
              >
                {filtered.map((r) => {
                  const flagged = r.requiredIngredients?.some((i) =>
                    blocked.some((b) => i.toLowerCase().includes(b)),
                  );
                  return (
                    <button
                      key={r.id}
                      className={`drawer-recipe${flagged ? " flagged" : ""}`}
                      onClick={() => onPick(r.id)}
                    >
                      <div className="drawer-recipe-emoji">
                        <span>{r.emoji}</span>
                      </div>
                      <div className="drawer-recipe-text">
                        <div className="drawer-recipe-name">
                          {L && r.nameEn ? r.nameEn : r.name}
                        </div>
                        <div className="drawer-recipe-meta">
                          {r.time} {L ? "MIN" : "МИН"} ·{" "}
                          {r.tags?.[0] || (L ? "recipe" : "рецепта")}
                        </div>
                      </div>
                    </button>
                  );
                })}
                {filtered.length === 0 && (
                  <div
                    style={{
                      padding: "24px 8px",
                      textAlign: "center",
                      color: "var(--ink-3)",
                      fontSize: 13,
                    }}
                  >
                    {L ? "Nothing matches." : "Нищо не намерихме."}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      function ShoppingModal({
        items,
        missingCount,
        haveCount,
        mealsPlanned,
        weekRange,
        lang,
        onClose,
      }) {
        const L = lang === "en";
        const [checked, setChecked] = useState(() => new Set());
        const [tab, setTab] = useState("buy");
        const toggle = (key) => {
          setChecked((prev) => {
            const n = new Set(prev);
            if (n.has(key)) n.delete(key);
            else n.add(key);
            return n;
          });
        };
        const visible = items.filter((i) =>
          tab === "buy" ? !i.inFridge : i.inFridge,
        );
        const copyList = () => {
          const lines = items
            .filter((i) => !i.inFridge)
            .map(
              (i) =>
                `· ${i.base} — ${i.recipes.length} ${L ? (i.recipes.length === 1 ? "recipe" : "recipes") : i.recipes.length === 1 ? "рецепта" : "рецепти"}`,
            );
          const text = `${L ? "Shopping list" : "Списък за пазар"} · ${weekRange}\n${L ? "For " + mealsPlanned + " planned meals" : "За " + mealsPlanned + " хранения"}\n\n${lines.join("\n")}`;
          try {
            navigator.clipboard.writeText(text);
          } catch {}
        };
        return (
          <div className="overlay" onClick={onClose}>
            <div
              className="modal"
              onClick={(e) => e.stopPropagation()}
              style={{ maxWidth: 620 }}
            >
              <button className="modal-close" onClick={onClose}>
                ×
              </button>
              <div className="label" style={{ marginBottom: 10 }}>
                {weekRange}
              </div>
              <h2 className="modal-title italic">
                {L ? "Shopping list" : "Списък за пазар"}
              </h2>
              <div className="modal-sub">
                {L
                  ? `${mealsPlanned} planned meals · ${missingCount} to buy · ${haveCount} already on your shelves.`
                  : `${mealsPlanned} планирани хранения · ${missingCount} за пазар · ${haveCount} вече на рафта.`}
              </div>

              <div className="shop-tabs">
                <button
                  className={`shop-tab${tab === "buy" ? " on" : ""}`}
                  onClick={() => setTab("buy")}
                >
                  {L ? "To buy" : "За пазар"} · {missingCount}
                </button>
                <button
                  className={`shop-tab${tab === "have" ? " on" : ""}`}
                  onClick={() => setTab("have")}
                >
                  {L ? "On shelves" : "На рафта"} · {haveCount}
                </button>
              </div>

              {visible.length === 0 ? (
                <div className="planner-empty-inner">
                  <div className="planner-empty-title">
                    {tab === "buy"
                      ? L
                        ? "Nothing to buy."
                        : "Нищо за купуване."
                      : L
                        ? "Nothing matched yet."
                        : "Все още нищо."}
                  </div>
                  <div className="planner-empty-sub">
                    {tab === "buy"
                      ? L
                        ? "Your fridge already has what you need."
                        : "Хладилникът ти има всичко необходимо."
                      : L
                        ? "Stock the fridge to see matches here."
                        : "Зареди хладилника, за да видиш съвпадения."}
                  </div>
                </div>
              ) : (
                <div>
                  {visible.map((item) => (
                    <div
                      key={item.base}
                      className={`shop-row${checked.has(item.base) ? " checked" : ""}${item.inFridge ? " in-fridge" : ""}`}
                      onClick={() => !item.inFridge && toggle(item.base)}
                    >
                      <div className="shop-check">
                        {item.inFridge || checked.has(item.base) ? "✓" : ""}
                      </div>
                      <div className="shop-name">{item.base}</div>
                      <div className="shop-recipes">
                        {item.recipes.length}×{" "}
                        {L
                          ? item.recipes.length === 1
                            ? "recipe"
                            : "recipes"
                          : item.recipes.length === 1
                            ? "рецепта"
                            : "рецепти"}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div
                style={{
                  display: "flex",
                  gap: 10,
                  marginTop: 24,
                  justifyContent: "flex-end",
                }}
              >
                <button className="btn btn-secondary btn-sm" onClick={onClose}>
                  {L ? "Close" : "Затвори"}
                </button>
                <button
                  className="btn btn-primary btn-sm"
                  onClick={copyList}
                  disabled={missingCount === 0}
                >
                  {L ? "Copy list" : "Копирай"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ─── HOME ─────────────────────────────────────────────────────────────────
      function HomeScreen({
        profile,
        recipes,
        fridge,
        setTab,
        lang,
        onOpenRecipe,
      }) {
        const L = lang === "en";
        const blocked = [...profile.allergies, ...profile.dislikes];
        const safeRecipes = recipes.filter(
          (r) =>
            !r.requiredIngredients?.some((i) =>
              blocked.some((b) => i.toLowerCase().includes(b)),
            ),
        );
        const hr = new Date().getHours();
        const greeting =
          hr < 12
            ? L
              ? "Good morning"
              : "Добро утро"
            : hr < 18
              ? L
                ? "Good afternoon"
                : "Добър обяд"
              : L
                ? "Good evening"
                : "Добър вечер";
        const today = new Date().toLocaleDateString(L ? "en-GB" : "bg-BG", {
          weekday: "long",
          day: "numeric",
          month: "long",
        });

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"} <span>/ {L ? "Today" : "Днес"}</span>
              </div>
              <div className="topbar-actions">
                <div className="topbar-date">{today}</div>
              </div>
            </div>

            <section className="hero-grid">
              <div>
                <div className="eyebrow" style={{ marginBottom: 18 }}>
                  {greeting}, {profile.name || (L ? "cook" : "готвачо")}
                </div>
                <h1 className="h-display">
                  {L ? "What can we " : "Какво да "}
                  <span className="it">{L ? "cook" : "сготвим"}</span>
                  <br />
                  {L ? "today?" : "днес?"}
                </h1>
                <p className="h-sub" style={{ marginTop: 22 }}>
                  {L

            {profile.allergies.length > 0 && (

      // ─── RECIPES ──────────────────────────────────────────────────────────────
      function RecipesScreen({
        recipes,
        setRecipes,
        profile,
        fridge,
        lang,
        openRecipeId,
        setOpenRecipeId,
      }) {
        const L = lang === "en";
        const [search, setSearch] = useState("");
        const [shopOpen, setShopOpen] = useState(false);
        const [filterSafe, setFilterSafe] = useState(false);
        const [addOpen, setAddOpen] = useState(false);
        const [newR, setNewR] = useState({
          name: "",
          emoji: "🍽",
          time: "",
          ingredients: "",
          steps: "",
        });

        const blocked = [...profile.allergies, ...profile.dislikes];
        const isSafe = (r) =>
          !r.requiredIngredients?.some((i) =>
            blocked.some((b) => i.toLowerCase().includes(b)),
          );

        const filtered = recipes.filter((r) => {
          const n = L && r.nameEn ? r.nameEn : r.name;
          return (
            n.toLowerCase().includes(search.toLowerCase()) &&
            (!filterSafe || isSafe(r))
          );
        });

        const saveRecipe = () => {
          if (!newR.name.trim()) return;
          const ings = newR.ingredients.split("\n").filter(Boolean);
          const r = {
            id: "r" + Date.now(),
            name: newR.name,
            emoji: newR.emoji || "🍽",
            ingredients: ings,
            steps: newR.steps.split("\n").filter(Boolean),
            time: parseInt(newR.time) || 15,
            tags: [],
            isAI: false,
            requiredIngredients: ings.map(
              (i) => i.split(" ").slice(1).join(" ") || i,
            ),
          };
          setRecipes([...recipes, r]);
          setNewR({
            name: "",
            emoji: "🍽",
            time: "",
            ingredients: "",
            steps: "",
          });
          setAddOpen(false);
        };

        // Recipe detail view
        if (openRecipeId) {
          const r = recipes.find((x) => x.id === openRecipeId);
          if (!r) {
            setOpenRecipeId(null);
            return null;
          }
          const safe = isSafe(r);
          // Missing-ingredient count for the CTA badge
          const fridgeLowDetail = (fridge || []).map((f) =>
            (f.name || "").toLowerCase(),
          );
          const missingCount = (r.requiredIngredients || []).filter(
            (i) =>
              !fridgeLowDetail.some(
                (f) =>
                  f.includes(i.toLowerCase()) || i.toLowerCase().includes(f),
              ),
          ).length;
          return (
            <div className="fade-in">
              <button
                className="detail-back"
                onClick={() => setOpenRecipeId(null)}
              >
                ← {L ? "Back to recipes" : "Към рецептите"}
              </button>
              <div className="detail-hero">
                <div className="detail-image">
                  <div className="recipe-image-stripes" />
                  <div className="detail-image-emoji">{r.emoji}</div>
                  <div className="recipe-image-label">PHOTO · DROP HERE</div>
                </div>
                <div className="detail-head">
                  <div className="eyebrow">
                    {r.tags?.[0] || (L ? "recipe" : "рецепта")} · {r.time}{" "}
                    {L ? "min" : "мин"}
                  </div>
                  <h1 className="h-title italic">
                    {L && r.nameEn ? r.nameEn : r.name}
                  </h1>
                  <div
                    style={{
                      display: "flex",
                      gap: 6,
                      flexWrap: "wrap",
                      marginBottom: 18,
                    }}
                  >
                    {safe ? (
                      <Badge kind="safe">
                        <span className="dot dot-safe" />{" "}
                        {L ? "Safe for you" : "Безопасно"}
                      </Badge>
                    ) : (
                      <Badge kind="danger">
                        <span className="dot dot-danger" />{" "}
                        {L ? "Contains restrictions" : "Съдържа ограничения"}
                      </Badge>
                    )}
                    <Badge kind="neutral">
                      {r.time} {L ? "minutes" : "минути"}
                    </Badge>
                    {r.isAI && <Badge kind="clay">AI</Badge>}
                  </div>
                  <p
                    className="h-sub"
                    style={{ fontSize: 15, maxWidth: "38ch" }}
                  >
                    {L
                      ? "A short, honest recipe — the kind you cook on Tuesday without thinking."
                      : "Кратка, честна рецепта — от тези, които правиш във вторник без да мислиш."}
                  </p>
                </div>
              </div>

              <div className="grid-2" style={{ alignItems: "start", gap: 48 }}>
                <div>
                  <div className="section-eyebrow">
                    <span className="label">
                      {L ? "Ingredients" : "Съставки"}
                    </span>
                  </div>
                  {r.ingredients.map((ing, i) => {
                    const isBlocked = blocked.some((b) =>
                      ing.toLowerCase().includes(b),
                    );
                    return (
                      <div
                        key={i}
                        className={`ing-row${isBlocked ? " blocked" : ""}`}
                      >
                        <span
                          className={`dot ${isBlocked ? "dot-danger" : "dot-safe"}`}
                        />
                        <span className="ing-name">{ing}</span>
                        {isBlocked && (
                          <Badge
                            kind={
                              profile.allergies.some((a) =>
                                ing.toLowerCase().includes(a),
                              )
                                ? "danger"
                                : "warn"
                            }
                          >
                            {profile.allergies.some((a) =>
                              ing.toLowerCase().includes(a),
                            )
                              ? L
                                ? "allergy"
                                : "алергия"
                              : L
                                ? "dislike"
                                : "нелюб."}
                          </Badge>
                        )}
                      </div>
                    );
                  })}
                  <button
                    className="btn btn-primary btn-shop"
                    style={{ marginTop: 24, marginRight: 10 }}
                    onClick={() => setShopOpen(true)}
                  >
                    {L
                      ? "Shop missing ingredients"
                      : "Купи липсващите съставки"}
                    {missingCount > 0 ? (
                      <span className="badge-count">{missingCount}</span>
                    ) : (
                      <span
                        className="badge-count"
                        style={{ background: "rgba(245,241,234,.18)" }}
                      >
                        {L ? "all set" : "имаш всичко"}
                      </span>
                    )}
                  </button>
                  <button
                    className="btn btn-danger btn-sm"
                    style={{ marginTop: 24 }}
                    onClick={() => {
                      setRecipes(recipes.filter((x) => x.id !== r.id));
                      setOpenRecipeId(null);
                    }}
                  >
                    {L ? "Delete recipe" : "Изтрий"}
                  </button>
                </div>
                <div>
                  <div className="section-eyebrow">
                    <span className="label">{L ? "Method" : "Метод"}</span>
                  </div>
                  <div className="step-grid">
                    {r.steps.map((s, i) => (
                      <div key={i} className="step">
                        <span className="step-num">
                          {String(i + 1).padStart(2, "0")}
                        </span>
                        <div className="step-text">{s}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <ShoppingListModal
                open={shopOpen}
                onClose={() => setShopOpen(false)}
                recipe={r}
                fridge={fridge || []}
                lang={lang}
              />
            </div>
          );
        }

        // List view
        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Recipes" : "Рецепти"}</span>
              </div>
              <div className="topbar-actions">
                <button
                  className="btn btn-secondary btn-sm"
                  onClick={() => setAddOpen(true)}
                >
                  + {L ? "New recipe" : "Нова рецепта"}
                </button>
              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "Your cookbook" : "Твоята книга"}
                </div>
                <h1 className="h-title italic">{L ? "Recipes" : "Рецепти"}</h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {recipes.length}{" "}
                  {L
                    ? "recipes saved · filtered against "
                    : "рецепти · филтрирани спрямо "}
                  {blocked.length} {L ? "restrictions" : "ограничения"}
                </div>
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <div className="search" style={{ width: 260 }}>
                  <span className="search-glyph">⌕</span>
                  <input
                    className="input"
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    placeholder={
                      L
                        ? "Search by name, ingredient…"
                        : "Търси по име, съставка…"
                    }
                  />
                </div>
                <button
                  className={`chip${filterSafe ? " selected" : ""}`}
                  onClick={() => setFilterSafe(!filterSafe)}
                >
                  {L ? "Safe only" : "Само безопасни"}
                </button>
              </div>
            </div>

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="empty-glyph">📖</div>
                <div className="empty-title">Нищо не съответства</div>
                <div className="empty-sub">
                  {L
                    ? "Try a softer search or add a new recipe."
                    : "Опитай с друга дума или добави нова рецепта."}
                </div>
              </div>
            ) : (
              <div className="grid-3">
                {filtered.map((r) => (
                  <RecipeCard
                    key={r.id}
                    recipe={r}
                    blocked={blocked}
                    lang={lang}
                    onClick={() => setOpenRecipeId(r.id)}
                  />
                ))}
              </div>
            )}

            <Modal
              open={addOpen}
              onClose={() => setAddOpen(false)}
              title={L ? "A new recipe" : "Нова рецепта"}
              sub={
                L
                  ? "Write it down before you forget."
                  : "Запиши я преди да забравиш."
              }
            >
              <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                <div style={{ flex: 1 }}>
                  <label className="input-label">
                    {L ? "Name" : "Название"}
                  </label>
                  <input
                    className="input"
                    value={newR.name}
                    onChange={(e) => setNewR({ ...newR, name: e.target.value })}
                    placeholder={L ? "Recipe name" : "Името на рецептата"}
                  />
                </div>
                <div style={{ width: 80 }}>
                  <label className="input-label">Emoji</label>
                  <input
                    className="input"
                    value={newR.emoji}
                    onChange={(e) =>
                      setNewR({ ...newR, emoji: e.target.value })
                    }
                    style={{ textAlign: "center", fontSize: 22 }}
                  />
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <label className="input-label">
                  {L ? "Time (min)" : "Време (мин)"}
                </label>
                <input
                  className="input"
                  type="number"
                  value={newR.time}
                  onChange={(e) => setNewR({ ...newR, time: e.target.value })}
                  placeholder="15"
                />
              </div>
              <div style={{ marginBottom: 14 }}>
                <label className="input-label">
                  {L
                    ? "Ingredients · one per line"
                    : "Съставки · по една на ред"}
                </label>
                <textarea
                  className="input"
                  rows={4}
                  value={newR.ingredients}
                  onChange={(e) =>
                    setNewR({ ...newR, ingredients: e.target.value })
                  }
                  placeholder={"3 яйца\n50г кашкавал"}
                />
              </div>
              <div style={{ marginBottom: 22 }}>
                <label className="input-label">
                  {L ? "Steps · one per line" : "Стъпки · по една на ред"}
                </label>
                <textarea
                  className="input"
                  rows={4}
                  value={newR.steps}
                  onChange={(e) => setNewR({ ...newR, steps: e.target.value })}
                  placeholder={"Разбий яйцата\nЗагрей тигана"}
                />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button
                  className="btn btn-primary"
                  style={{ flex: 1 }}
                  onClick={saveRecipe}
                >
                  {L ? "Save recipe" : "Запази"}
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={() => setAddOpen(false)}
                >
                  {L ? "Cancel" : "Отказ"}
                </button>
              </div>
            </Modal>
          </div>
        );
      }

      // ─── FRIDGE ───────────────────────────────────────────────────────────────
      function FridgeScreen({
        fridge,
        setFridge,
        recipes,
        profile,
        lang,
        onOpenRecipe,
        setTab,
      }) {
        const L = lang === "en";
        const [open, setOpen] = useState(true);
        const [pickerShelf, setPickerShelf] = useState(null);
        const [removing, setRemoving] = useState({});
        const [customOpen, setCustomOpen] = useState(false);
        const [custom, setCustom] = useState({
          name: "",
          emoji: "📦",
          shelf: 2,
          tint: "jar",
          kind: "",
          expires: 7,
        });

        const blocked = useMemo(
          () => [...profile.allergies, ...profile.dislikes],
          [profile],
        );

        const byShelf = useMemo(() => {
          const m = [[], [], [], [], []];
          fridge.forEach((it) => {
            if (m[it.shelf] != null) m[it.shelf].push(it);
          });
          return m;
        }, [fridge]);

        const removeItem = (id) => {
          setRemoving((r) => ({ ...r, [id]: true }));
          setTimeout(() => {
            setFridge(fridge.filter((f) => f.id !== id));
            setRemoving((r) => {
              const next = { ...r };
              delete next[id];
              return next;
            });
          }, 220);
        };

        const addItem = (template, shelfOverride) => {
          const item = {
            id: "f" + Date.now() + Math.random().toString(36).slice(2, 6),
            name: template.name,
            nameEn: template.nameEn,
            emoji: template.emoji,
            shelf: shelfOverride != null ? shelfOverride : template.shelf,
            tint: template.tint || "jar",
            kind: template.kind || "",
            expires: template.expires,
          };
          setFridge([...fridge, item]);
          setOpen(true);
        };

        const addCustom = () => {
          if (!custom.name.trim()) return;
          addItem({
            name: custom.name.trim(),
            nameEn: custom.name.trim(),
            emoji: custom.emoji || "📦",
            shelf: custom.shelf,
            tint: custom.tint,
            kind: "",
            expires: parseInt(custom.expires) || 7,
          });
          setCustom({
            name: "",
            emoji: "📦",
            shelf: 2,
            tint: "jar",
            kind: "",
            expires: 7,
          });
          setCustomOpen(false);
          setPickerShelf(null);
        };

        const existingNames = new Set(fridge.map((f) => f.name.toLowerCase()));

        // Recipe matches against fridge inventory
        const fridgeLow = fridge.map((f) => f.name.toLowerCase());
        const matchesIng = (i) =>
          fridgeLow.some(
            (f) => f.includes(i.toLowerCase()) || i.toLowerCase().includes(f),
          );
        const isBlockedIng = (i) =>
          blocked.some((b) => i.toLowerCase().includes(b));
        const recipeMatches = recipes
          .filter((r) => !r.requiredIngredients?.some(isBlockedIng))
          .map((r) => {
            const matched = (r.requiredIngredients || []).filter(
              matchesIng,
            ).length;
            const total = (r.requiredIngredients || []).length || 1;
            return {
              ...r,
              matchedCount: matched,
              totalCount: total,
              matchScore: matched / total,
            };
          })
          .filter((r) => r.matchScore > 0)
          .sort((a, b) => b.matchScore - a.matchScore)
          .slice(0, 5);

        const expiringSoon = fridge.filter((f) => f.expires <= 3).length;

        const renderProduct = (it) => {
          const flagged = blocked.some(
            (b) =>
              it.name.toLowerCase().includes(b) ||
              (it.nameEn && it.nameEn.toLowerCase().includes(b)),
          );
          const label = L && it.nameEn ? it.nameEn : it.name;
          return (
            <div
              key={it.id}
              className={`fridge-product tint-${it.tint || "jar"} ${it.kind || ""}${flagged ? " flagged" : ""}${removing[it.id] ? " fading" : ""}`}
              onClick={(e) => {
                e.stopPropagation();
                removeItem(it.id);
              }}
              title={`${label} · ${it.expires}${L ? "d" : "дн"}`}
            >
              <span className="e">{it.emoji}</span>
              <span className="l">
                {label.length > 8 ? label.slice(0, 7) + "…" : label}
              </span>
              <span className="rm">✕</span>
            </div>
          );
        };

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Fridge" : "Хладилник"}</span>
              </div>
              <div className="topbar-actions">
                <button
                  className="btn btn-secondary btn-sm"
                  onClick={() => setCustomOpen(true)}
                >
                  + {L ? "Custom item" : "Свой продукт"}
                </button>
              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "What's inside" : "Какво е вътре"}
                </div>
                <h1 className="h-title italic">{L ? "Fridge" : "Хладилник"}</h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {L
                    ? "Tap the door to open. Click any product to take it out, or use a plus to put something new in."
                    : "Натисни вратата, за да отвориш. Натисни продукт, за да го извадиш, или плюс, за да добавиш нещо."}
                </div>
              </div>
              <div style={{ display: "flex", gap: 28 }}>
                <div className="metric">
                  <div className="metric-num italic" style={{ fontSize: 44 }}>
                    {fridge.length}
                  </div>
                  <div className="metric-label">{L ? "items" : "продукта"}</div>
                </div>
                <div className="metric">
                  <div
                    className="metric-num italic"
                    style={{ fontSize: 44, color: "var(--rust)" }}
                  >
                    {expiringSoon}
                  </div>
                  <div className="metric-label">
                    {L ? "expiring" : "изтичат"}
                  </div>
                </div>
              </div>
            </div>

            <div className="fridge-stage">
              <div className={`fridge-room${open ? " is-open" : ""}`}>
                <div className="fridge-toolbar">
                  <span className={`fridge-status${open ? " open" : ""}`}>
                    <span className="led" />
                    {open
                      ? L
                        ? "Door open · 4°C"
                        : "Отворено · 4°C"
                      : L
                        ? "Sealed · 4°C"
                        : "Затворено · 4°C"}
                  </span>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      className="btn btn-secondary btn-sm"
                      onClick={() => setOpen(!open)}
                    >
                      {open
                        ? L
                          ? "Close door"
                          : "Затвори"
                        : L
                          ? "Open fridge"
                          : "Отвори хладилника"}
                    </button>
                  </div>
                </div>

                <div className="fridge-3d-wrap">
                  <div className={`fridge-3d${open ? " open" : ""}`}>
                    <div className="fridge-cabinet" />
                    <div className="fridge-interior">
                      <div className="fridge-shelves">

                            <div className="bottle b2" />
                            <div className="bottle b1" />

                            <div className="bottle b4" />

                <div className="rail-card">
                  <span className="label">{L ? "At a glance" : "Преглед"}</span>
                  <div className="rail-stat-row">
                    <div className="rail-stat metric">
                      <div
                        className="metric-num italic"
                        style={{ color: "var(--clay-deep)" }}
                      >
                        {recipeMatches.length}
                      </div>
                      <div className="metric-label">
                        {L ? "recipe matches" : "съвпадения"}
                      </div>
                    </div>
                    <div className="rail-stat metric">
                      <div
                        className="metric-num italic"
                        style={{ color: "var(--rust)" }}
                      >
                        {expiringSoon}
                      </div>
                      <div className="metric-label">
                        {L ? "expiring soon" : "изтичат"}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="rail-card">
                  <span className="label">
                    {L ? "You can make now" : "Готови за готвене"}
                  </span>
                  {recipeMatches.length === 0 ? (
                    <div
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 11,
                        color: "var(--ink-3)",
                        letterSpacing: 0.5,
                        fontStyle: "italic",
                        padding: "12px 0",
                      }}
                    >
                      {L

                        : "Добави няколко продукта и ще намерим идеи."}
                    </div>
                  ) : (
                    <div className="match-list">
                      {recipeMatches.map((r) => (
                        <div
                          key={r.id}
                          className="match-row"
                          onClick={() => onOpenRecipe(r.id)}
                        >
                          <div className="m-thumb">{r.emoji}</div>
                          <div>
                            <div className="m-name">
                              {L && r.nameEn ? r.nameEn : r.name}
                            </div>
                            <div className="m-meta">
                              ⏱ {r.time} {L ? "min" : "мин"} ·{" "}
                              {(r.requiredIngredients || [])
                                .slice(0, 3)
                                .join(", ")}
                            </div>
                          </div>
                          <div className="m-score">
                            {r.matchedCount}
                            <small>/{r.totalCount}</small>
                          </div>
                        </div>
                      ))}

                  )}
                </div>

            </div>

            {/* Quick-add picker as modal */}
            <Modal
              open={pickerShelf !== null}
              onClose={() => setPickerShelf(null)}

                pickerShelf !== null

                    : `Зареди ${SHELF_LABELS[pickerShelf].bg}`
                  : ""

              sub={L ? "Pick what to place inside." : "Избери какво да сложиш."}
            >

                  <button

                    className="picker-tile"
                    onClick={() => {
                      addItem(a, pickerShelf);
                      setPickerShelf(null);

                  >
                    <span className="e">{a.emoji}</span>
                    <span className="n">
                      {L && a.nameEn ? a.nameEn : a.name}

                    setCustomOpen(true);

                <button
                  className="btn btn-ghost btn-sm"
                  onClick={() => setPickerShelf(null)}

                  {L ? "Cancel" : "Отказ"}

              onClose={() => setCustomOpen(false)}

              <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>

                  <input

                    value={custom.name}
                    onChange={(e) =>
                      setCustom({ ...custom, name: e.target.value })

                  />

                <div style={{ width: 80 }}>
                  <label className="input-label">Emoji</label>
                  <input
                    className="input"
                    value={custom.emoji}
                    onChange={(e) =>
                      setCustom({ ...custom, emoji: e.target.value })
                    }
                    style={{ textAlign: "center", fontSize: 22 }}
                  />
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <label className="input-label">{L ? "Shelf" : "Рафт"}</label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {SHELF_LABELS.map((s, i) => (
                    <span
                      key={i}
                      className={`chip${custom.shelf === i ? " selected" : ""}`}
                      onClick={() => setCustom({ ...custom, shelf: i })}
                    >
                      {s.n} · {L ? s.en : s.bg}
                    </span>
                  ))}

              </div>

                <label className="input-label">

                    setCustom({ ...custom, expires: e.target.value })

              <div style={{ display: "flex", gap: 10 }}>
                <button

                  {L ? "Add to fridge" : "Сложи в хладилника"}

                  className="btn btn-ghost"
                  onClick={() => setCustomOpen(false)}
