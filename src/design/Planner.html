      }

      // ─── PRODUCTS ─────────────────────────────────────────────────────────────
      const CATEGORIES = [
        { id: "protein", label: "Месо", labelEn: "Meat" },
        { id: "fish", label: "Риба", labelEn: "Fish" },
        { id: "dairy", label: "Млечни", labelEn: "Dairy" },
        { id: "egg", label: "Яйца", labelEn: "Eggs" },
        { id: "veg", label: "Зеленчуци", labelEn: "Vegetables" },
        { id: "fruit", label: "Плодове", labelEn: "Fruits" },
        { id: "grain", label: "Зърнени", labelEn: "Grains" },
        { id: "condiment", label: "Подправки", labelEn: "Condiments" },
        { id: "other", label: "Друго", labelEn: "Other" },
      ];

      function ProductsScreen({ products, setProducts, lang }) {
        const L = lang === "en";
        const [search, setSearch] = useState("");
        const [statusFilter, setStatusFilter] = useState("all");
        const [addOpen, setAddOpen] = useState(false);
        const [newP, setNewP] = useState({
          name: "",
          emoji: "📦",
          category: "other",
          status: "liked",
        });

        const filtered = products.filter((p) => {
          const n = L && p.nameEn ? p.nameEn : p.name;
          return (
            n.toLowerCase().includes(search.toLowerCase()) &&
            (statusFilter === "all" || p.status === statusFilter)
          );
        });

        const counts = {
          liked: products.filter((p) => p.status === "liked").length,
          disliked: products.filter((p) => p.status === "disliked").length,
          allergic: products.filter((p) => p.status === "allergic").length,
        };

        const addProduct = () => {
          if (!newP.name.trim()) return;
          setProducts([...products, { id: "p" + Date.now(), ...newP }]);
          setNewP({
            name: "",
            emoji: "📦",
            category: "other",
            status: "liked",
          });
          setAddOpen(false);
        };

        const statusBadge = (s) =>
          s === "liked" ? (
            <Badge kind="safe">
              <span className="dot dot-safe" /> {L ? "safe" : "харесвам"}
            </Badge>
          ) : s === "disliked" ? (
            <Badge kind="warn">
              <span className="dot dot-warn" /> {L ? "dislike" : "нелюб."}
            </Badge>
          ) : (
            <Badge kind="danger">
              <span className="dot dot-danger" /> {L ? "allergy" : "алергия"}
            </Badge>
          );

        const cycleStatus = (id) => {
          const order = ["liked", "disliked", "allergic"];
          setProducts(
            products.map((p) =>
              p.id === id
                ? { ...p, status: order[(order.indexOf(p.status) + 1) % 3] }
                : p,
            ),
          );
        };

        const FILTERS = [
          { id: "all", label: L ? "All" : "Всички", n: products.length },
          { id: "liked", label: L ? "Safe" : "Харесвам", n: counts.liked },
          {
            id: "disliked",
            label: L ? "Disliked" : "Не харесвам",
            n: counts.disliked,
          },
          {
            id: "allergic",
            label: L ? "Allergic" : "Алергии",
            n: counts.allergic,
          },
        ];

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Products" : "Продукти"}</span>
              </div>
              <div className="topbar-actions">
                <button
                  className="btn btn-secondary btn-sm"
                  onClick={() => setAddOpen(true)}
                >
                  + {L ? "Add product" : "Добави"}
                </button>
              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "What I eat & what I don't" : "Какво ям и какво не"}
                </div>
                <h1 className="h-title italic">
                  {L ? "Products" : "Продукти"}
                </h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {L
                    ? "Tap a status to cycle through safe / dislike / allergy."
                    : "Натисни статуса, за да превключиш безопасно / нелюбимо / алергия."}
                </div>
              </div>
              <div className="search" style={{ width: 260 }}>
                <span className="search-glyph">⌕</span>
                <input
                  className="input"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder={L ? "Search products…" : "Търси…"}
                />
              </div>
            </div>

            <div
              style={{
                display: "flex",
                gap: 8,
                marginBottom: 24,
                flexWrap: "wrap",
              }}
            >
              {FILTERS.map((f) => (
                <button
                  key={f.id}
                  className={`chip${statusFilter === f.id ? " selected" : ""}`}
                  onClick={() => setStatusFilter(f.id)}
                >
                  {f.label}{" "}
                  <span
                    style={{
                      opacity: 0.55,
                      marginLeft: 4,
                      fontFamily: "var(--mono)",
                      fontSize: 11,
                    }}
                  >
                    {f.n}
                  </span>
                </button>
              ))}
            </div>

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="empty-glyph">🥕</div>
                <div className="empty-title">Няма продукти</div>
                <div className="empty-sub">
                  {L
                    ? "Add the things you eat often."
                    : "Добави нещата, които ядеш често."}
                </div>
              </div>
            ) : (
              <div className="card" style={{ padding: 0, overflow: "hidden" }}>
                {filtered.map((p) => {
                  const cat = CATEGORIES.find((c) => c.id === p.category);
                  return (
                    <div key={p.id} className="product-row">
                      <span className="p-emoji">{p.emoji}</span>
                      <span className="p-name">
                        {L && p.nameEn ? p.nameEn : p.name}
                      </span>
                      <span className="p-cat">
                        {cat ? (L ? cat.labelEn : cat.label) : "—"}
                      </span>
                      <button
                        className="btn btn-xs"
                        onClick={() => cycleStatus(p.id)}
                        style={{ background: "transparent", padding: 0 }}
                      >
                        {statusBadge(p.status)}
                      </button>
                      <button
                        className="btn-icon"
                        style={{ width: 28, height: 28, fontSize: 11 }}
                        onClick={() =>
                          setProducts(products.filter((x) => x.id !== p.id))
                        }
                        aria-label="Remove"
                      >
                        ✕
                      </button>
                    </div>
                  );
                })}
              </div>
            )}

            <Modal
              open={addOpen}
              onClose={() => setAddOpen(false)}
              title={L ? "Add a product" : "Нов продукт"}
            >
              <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                <div style={{ flex: 1 }}>
                  <label className="input-label">{L ? "Name" : "Името"}</label>
                  <input
                    className="input"
                    value={newP.name}
                    onChange={(e) => setNewP({ ...newP, name: e.target.value })}
                    placeholder={L ? "e.g. Tomatoes" : "напр. Домати"}
                  />
                </div>
                <div style={{ width: 80 }}>
                  <label className="input-label">Emoji</label>
                  <input
                    className="input"
                    value={newP.emoji}
                    onChange={(e) =>
                      setNewP({ ...newP, emoji: e.target.value })
                    }
                    style={{ textAlign: "center", fontSize: 22 }}
                  />
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <label className="input-label">
                  {L ? "Category" : "Категория"}
                </label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {CATEGORIES.map((c) => (
                    <span
                      key={c.id}
                      className={`chip${newP.category === c.id ? " selected" : ""}`}
                      onClick={() => setNewP({ ...newP, category: c.id })}
                    >
                      {L ? c.labelEn : c.label}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 22 }}>
                <label className="input-label">{L ? "Status" : "Статус"}</label>
                <div style={{ display: "flex", gap: 6 }}>
                  <span
                    className={`chip${newP.status === "liked" ? " selected" : ""}`}
                    onClick={() => setNewP({ ...newP, status: "liked" })}
                  >
                    {L ? "Safe" : "Харесвам"}
                  </span>
                  <span
                    className={`chip${newP.status === "disliked" ? " sel-warn" : ""}`}
                    onClick={() => setNewP({ ...newP, status: "disliked" })}
                  >
                    {L ? "Dislike" : "Не харесвам"}
                  </span>
                  <span
                    className={`chip${newP.status === "allergic" ? " sel-danger" : ""}`}
                    onClick={() => setNewP({ ...newP, status: "allergic" })}
                  >
                    {L ? "Allergy" : "Алергия"}
                  </span>
                </div>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button
                  className="btn btn-primary"
                  style={{ flex: 1 }}
                  onClick={addProduct}
                >
                  {L ? "Add" : "Добави"}
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={() => setAddOpen(false)}
                >
                  {L ? "Cancel" : "Отказ"}
                </button>
              </div>
            </Modal>
          </div>
        );
      }

      // ─── PROFILE ──────────────────────────────────────────────────────────────
      function ProfileScreen({ profile, setProfile, lang }) {
        const L = lang === "en";
        const [name, setName] = useState(profile.name || "");
        const saveName = () => setProfile({ ...profile, name: name.trim() });

        const PREFS = [
          "Вегетарианец",
          "Веган",
          "Без глутен",
          "Без лактоза",
          "Халал",
          "Кошер",
        ];

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Profile" : "Профил"}</span>
              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "Your shape of hunger" : "Твоята форма на глад"}
                </div>
                <h1 className="h-title italic">{L ? "Profile" : "Профил"}</h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {L
                    ? "Tell the kitchen what to avoid. The cookbook will quietly remember."
                    : "Кажи на кухнята какво да избягва. Книгата ще го помни."}
                </div>
              </div>
            </div>

            <div className="grid-2" style={{ alignItems: "start" }}>
              <div
                className="card"
                style={{ display: "flex", flexDirection: "column", gap: 18 }}
              >
                <div className="label">{L ? "Display name" : "Име"}</div>
                <div style={{ display: "flex", gap: 10 }}>
                  <input
                    className="input"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    placeholder={L ? "Your name" : "Твоето име"}
                    onBlur={saveName}
                    onKeyDown={(e) => e.key === "Enter" && saveName()}
                  />
                  <button
                    className="btn btn-secondary btn-sm"
                    onClick={saveName}
                  >
                    {L ? "Save" : "Запази"}
                  </button>
                </div>
                <div style={{ marginTop: 18 }}>
                  <div className="label" style={{ marginBottom: 12 }}>
                    {L ? "Dietary preferences" : "Диетични предпочитания"}
                  </div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {PREFS.map((pref) => {
                      const sel = profile.dietaryPrefs.includes(pref);
                      return (
                        <span
                          key={pref}
                          className={`chip${sel ? " selected" : ""}`}
                          onClick={() =>
                            setProfile({
                              ...profile,
                              dietaryPrefs: sel
                                ? profile.dietaryPrefs.filter((p) => p !== pref)
                                : [...profile.dietaryPrefs, pref],
                            })
                          }
                        >
                          {pref}
                        </span>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div className="card" style={{ background: "var(--paper-2)" }}>
                <div className="label">
                  {L ? "Quiet summary" : "Тихо обобщение"}
                </div>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "1fr 1fr",
                    gap: 28,
                    marginTop: 18,
                  }}
                >
                  <div className="metric">
                    <div
                      className="metric-num italic"
                      style={{ color: "var(--rust)" }}
                    >
                      {profile.allergies.length}
                    </div>
                    <div className="metric-label">
                      {L ? "allergies" : "алергии"}
                    </div>
                  </div>
                  <div className="metric">
                    <div
                      className="metric-num italic"
                      style={{ color: "var(--amber)" }}
                    >
                      {profile.dislikes.length}
                    </div>
                    <div className="metric-label">
                      {L ? "dislikes" : "нелюбими"}
                    </div>
                  </div>
                  <div className="metric">
                    <div
                      className="metric-num italic"
                      style={{ color: "var(--moss)" }}
                    >
                      {profile.dietaryPrefs.length}
                    </div>
                    <div className="metric-label">
                      {L ? "preferences" : "предпочит."}
                    </div>
                  </div>
                  <div className="metric">
                    <div className="metric-num italic">
                      {profile.allergies.length + profile.dislikes.length}
                    </div>
                    <div className="metric-label">
                      {L ? "total filters" : "общо филтри"}
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="divider" />

            <div className="grid-2" style={{ alignItems: "start" }}>
              <div
                className="card"
                style={{ borderColor: "rgba(180,60,40,.2)" }}
              >
                <div className="section-eyebrow" style={{ marginBottom: 8 }}>
                  <span className="label" style={{ color: "var(--rust)" }}>
                    {L ? "Allergies — serious" : "Алергии — сериозни"}
                  </span>
                </div>
                <p
                  className="page-head-sub"
                  style={{ marginBottom: 16, fontSize: 13.5 }}
                >
                  {L
                    ? "These will always be marked as dangerous."
                    : "Тези съставки винаги се маркират като опасни."}
                </p>
                <TagInput
                  value={profile.allergies}
                  kind="danger"
                  onChange={(v) => setProfile({ ...profile, allergies: v })}
                  placeholder={L ? "Add allergen" : "Добави алерген"}
                />
              </div>

              <div
                className="card"
                style={{ borderColor: "rgba(212,140,30,.2)" }}
              >
                <div className="section-eyebrow" style={{ marginBottom: 8 }}>
                  <span className="label" style={{ color: "var(--amber)" }}>
                    {L ? "Dislikes" : "Нелюбими"}
                  </span>
                </div>
                <p
                  className="page-head-sub"
                  style={{ marginBottom: 16, fontSize: 13.5 }}
                >
                  {L
                    ? "Foods you simply don't enjoy."
                    : "Храни, които просто не харесваш."}
                </p>
                <TagInput
                  value={profile.dislikes}
                  kind="warn"
                  onChange={(v) => setProfile({ ...profile, dislikes: v })}
                  placeholder={
                    L ? "Add disliked food" : "Добави нелюбима храна"
                  }
                />
              </div>
            </div>
          </div>
        );
      }

      // ─── TWEAKS PANEL ─────────────────────────────────────────────────────────
      function TweaksPanel({ open, tweaks, setTweaks, onClose }) {
        const themes = [
          { id: "paper", label: "Paper" },
          { id: "fresh", label: "Fresh" },
          { id: "night", label: "Night" },
        ];
        return (
          <div className={`tweaks${open ? " open" : ""}`}>
            <div className="tweaks-title">
              <span>Tweaks</span>
              <button
                className="tweaks-close"
                onClick={onClose}
                aria-label="Hide tweaks"
                title="Hide"
              >
                ✕
              </button>
            </div>
            <div className="tweak-row">
              <span className="tweak-label">Theme</span>
              <div className="seg">
                {themes.map((t) => (
                  <button
                    key={t.id}
                    className={`seg-btn${tweaks.theme === t.id ? " active" : ""}`}
                    onClick={() => setTweaks({ ...tweaks, theme: t.id })}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="tweak-row">
              <span className="tweak-label">Language</span>
              <div className="seg">
                <button
                  className={`seg-btn${tweaks.lang === "bg" ? " active" : ""}`}
                  onClick={() => setTweaks({ ...tweaks, lang: "bg" })}
                >
                  Български
                </button>
                <button
                  className={`seg-btn${tweaks.lang === "en" ? " active" : ""}`}
                  onClick={() => setTweaks({ ...tweaks, lang: "en" })}
                >
                  English
                </button>
              </div>
            </div>
            <div className="tweak-row">
              <span className="tweak-label">Show emoji</span>
              <div className="seg">
                <button
                  className={`seg-btn${tweaks.showEmoji ? " active" : ""}`}
                  onClick={() => setTweaks({ ...tweaks, showEmoji: true })}
                >
                  On
                </button>
                <button
                  className={`seg-btn${!tweaks.showEmoji ? " active" : ""}`}
                  onClick={() => setTweaks({ ...tweaks, showEmoji: false })}
                >
                  Off
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ─── APP ──────────────────────────────────────────────────────────────────
      function App() {
        const [tab, setTab] = useLocalStorage("kdy_tab_v3", "planner");
        const [profile, setProfile] = useLocalStorage(
          "kdy_profile_v2",
          DEFAULT_PROFILE,
        );
        const [recipes, setRecipes] = useLocalStorage(
          "kdy_recipes_v2",
          DEFAULT_RECIPES,
        );
        const [products, setProducts] = useLocalStorage(
          "kdy_products_v2",
          DEFAULT_PRODUCTS,
        );
        const [fridge, setFridge] = useLocalStorage(
          "kdy_fridge_v2",
          DEFAULT_FRIDGE,
        );
        const [planner, setPlanner] = useLocalStorage("kdy_planner_v2", {});
        const [tweaks, setTweaks] = useState(() => {
          try {
            const s = localStorage.getItem("kdy_tweaks_v2");
            return s ? JSON.parse(s) : TWEAK_DEFAULTS;
          } catch {
            return TWEAK_DEFAULTS;
          }
        });
        const [tweaksOpen, setTweaksOpen] = useState(false);
        const [openRecipeId, setOpenRecipeId] = useState(null);

        useEffect(() => {
          try {
            localStorage.setItem("kdy_tweaks_v2", JSON.stringify(tweaks));
          } catch {}
        }, [tweaks]);

        // Tweaks protocol — register listener BEFORE announcing availability
        useEffect(() => {
          const handler = (e) => {
            if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
            if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
            if (e.data?.type === "__edit_mode_set_keys" && e.data.edits) {
              setTweaks((t) => ({ ...t, ...e.data.edits }));
            }
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");
          return () => window.removeEventListener("message", handler);
        }, []);

        const themeClass =
          tweaks.theme === "fresh"
            ? "theme-fresh"
            : tweaks.theme === "night"
              ? "theme-night"
              : "";
        const L = tweaks.lang === "en";

        const NAV = [
          { id: "home", label: L ? "Home" : "Начало", glyph: "◐" },
          { id: "planner", label: L ? "Planner" : "Седмица", glyph: "▦" },
          { id: "fridge", label: L ? "Fridge" : "Хладилник", glyph: "▢" },
          { id: "recipes", label: L ? "Recipes" : "Рецепти", glyph: "✦" },
          { id: "products", label: L ? "Products" : "Продукти", glyph: "◊" },
          { id: "profile", label: L ? "Profile" : "Профил", glyph: "◯" },
        ];

        const openRecipe = (id) => {
          setOpenRecipeId(id);
          setTab("recipes");
        };

        const screens = {
          home: (
            <HomeScreen
              profile={profile}
              recipes={recipes}
              fridge={fridge}
              setTab={setTab}
              lang={tweaks.lang}
              onOpenRecipe={openRecipe}
            />
          ),
          planner: (
            <PlannerScreen
              recipes={recipes}
              fridge={fridge}
              profile={profile}
              lang={tweaks.lang}
              planner={planner}
              setPlanner={setPlanner}
              onOpenRecipe={openRecipe}
            />
          ),
          fridge: (
            <FridgeScreen
              fridge={fridge}
              setFridge={setFridge}
              recipes={recipes}
              profile={profile}
              lang={tweaks.lang}
              onOpenRecipe={openRecipe}
              setTab={setTab}
            />
          ),
          recipes: (
            <RecipesScreen
              recipes={recipes}
              setRecipes={setRecipes}
              profile={profile}
              fridge={fridge}
              lang={tweaks.lang}
              openRecipeId={openRecipeId}
              setOpenRecipeId={setOpenRecipeId}
            />
          ),
          products: (
            <ProductsScreen
              products={products}
              setProducts={setProducts}
              lang={tweaks.lang}
            />
          ),
          profile: (
            <ProfileScreen
              profile={profile}
              setProfile={setProfile}
              lang={tweaks.lang}
            />
          ),
        };

        // When tab switches away from recipes, clear detail
        useEffect(() => {
          if (tab !== "recipes") setOpenRecipeId(null);
        }, [tab]);

        const userInitial = (profile.name || "К")
          .trim()
          .charAt(0)
          .toUpperCase();

        const updateTweaks = (next) => {
          setTweaks(next);
          window.parent.postMessage(
            { type: "__edit_mode_set_keys", edits: next },
            "*",
          );
        };

        return (
          <div className={`app ${themeClass}`}>
            <aside className="sidebar">
              <div className="brand">
                <span className="brand-mark">Ко-да-ям</span>
                <span className="brand-sub">
                  {L ? "for picky eaters" : "за капризни хора"}
                </span>
              </div>
              <nav className="nav">
                <div className="nav-section-label">
                  {L ? "Sections" : "Секции"}
                </div>
                {NAV.map((n, i) => (
                  <button
                    key={n.id}
                    className={`nav-item${tab === n.id ? " active" : ""}`}
                    onClick={() => setTab(n.id)}
                  >
                    <span className="nav-num">
                      {String(i + 1).padStart(2, "0")}
                    </span>
                    <span className="nav-glyph" style={{ display: "none" }}>
                      {n.glyph}
                    </span>
                    <span>{n.label}</span>
                  </button>
                ))}
              </nav>
              <div className="sidebar-footer">
                <div className="user-chip">
                  <div className="user-avatar">{userInitial}</div>
                  <div>
                    <div className="user-name">
                      {profile.name || (L ? "Guest cook" : "Гост")}
                    </div>
                    <div className="user-meta">
                      {profile.allergies.length + profile.dislikes.length}{" "}
                      {L ? "filters" : "филтри"}
                    </div>
                  </div>
                </div>
                <div className="sidebar-utility">
                  <button
                    className={tweaksOpen ? "on" : ""}
                    onClick={() => setTweaksOpen((o) => !o)}
                  >
                    Tweaks
                  </button>
                  <button
                    onClick={() =>
                      updateTweaks({
                        ...tweaks,
                        lang: tweaks.lang === "bg" ? "en" : "bg",
                      })
                    }
                  >
                    {tweaks.lang === "bg" ? "EN" : "BG"}
                  </button>
                </div>
              </div>
            </aside>

            <main className="main">
              <div className="main-inner">{screens[tab]}</div>
            </main>

            <TweaksPanel
              open={tweaksOpen}
              tweaks={tweaks}
              setTweaks={updateTweaks}
              onClose={() => {
                setTweaksOpen(false);
                try {
                  window.parent.postMessage(
                    { type: "__edit_mode_dismissed" },
                    "*",
                  );
                } catch {}
              }}
            />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
