<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ко-да-ям — Cooking Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#F5F1EA;
  --paper-2:#EFEAE0;
  --surface:#FCFAF6;
  --ink:#1C1815;
  --ink-2:#5A4F46;
  --ink-3:#8B8278;
  --line:#E4DED2;
  --line-2:#D6CFC1;

  --clay:oklch(0.58 0.13 38);
  --clay-soft:oklch(0.93 0.04 38);
  --clay-deep:oklch(0.42 0.13 38);
  --moss:oklch(0.52 0.07 145);
  --moss-soft:oklch(0.93 0.03 145);
  --rust:oklch(0.50 0.16 25);
  --rust-soft:oklch(0.93 0.05 25);
  --amber:oklch(0.66 0.11 75);
  --amber-soft:oklch(0.94 0.05 75);

  --shadow-sm:0 1px 2px rgba(28,24,21,.04), 0 1px 1px rgba(28,24,21,.03);
  --shadow:0 1px 2px rgba(28,24,21,.04), 0 8px 24px -8px rgba(28,24,21,.08);
  --shadow-lg:0 4px 12px rgba(28,24,21,.06), 0 24px 48px -16px rgba(28,24,21,.16);

  --r-xs:6px; --r-sm:10px; --r:14px; --r-lg:20px;

  --sans:"Geist", ui-sans-serif, system-ui, sans-serif;
  --serif:"Instrument Serif", ui-serif, Georgia, serif;
  --mono:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

html,body{background:var(--paper);color:var(--ink);min-height:100dvh;overflow-x:hidden}
body{font-family:var(--sans);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"ss01","cv11"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
input:focus,textarea:focus,select:focus{outline:none}
a{color:inherit;text-decoration:none}
::selection{background:var(--clay);color:var(--surface)}

/* ── Detail page (entry point) ───────────────────────────────────────── */
.shell{max-width:1080px;margin:0 auto;padding:40px 56px 96px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;gap:24px}
.breadcrumb{font-family:var(--mono);font-size:11px;letter-spacing:1.2px;color:var(--ink-3);text-transform:uppercase}
.breadcrumb span{color:var(--ink)}
.lang-toggle{display:inline-flex;background:var(--paper-2);border-radius:999px;padding:3px;font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase}
.lang-toggle button{padding:6px 12px;border-radius:999px;color:var(--ink-3)}
.lang-toggle button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

.detail-back{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);padding:6px 0;margin-bottom:24px;display:inline-flex;align-items:center;gap:8px}
.detail-back:hover{color:var(--ink)}

.detail-hero{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:end;margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid var(--line)}
.detail-image{aspect-ratio:1/1;background:var(--paper-2);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.recipe-image-stripes{position:absolute;inset:0;background:repeating-linear-gradient(135deg, transparent 0 16px, rgba(28,24,21,.035) 16px 17px)}
.detail-image-emoji{font-size:152px;position:relative;z-index:1;filter:grayscale(.08)}
.recipe-image-label{position:absolute;left:14px;bottom:12px;font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);opacity:.7;z-index:2}

.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;color:var(--ink-3);text-transform:uppercase}
.h-title{font-family:var(--serif);font-weight:400;font-size:48px;letter-spacing:-1.2px;line-height:1.02;color:var(--ink)}
.h-title.italic{font-style:italic}
.h-sub{font-size:15.5px;line-height:1.55;color:var(--ink-2);font-weight:400;max-width:42ch}

.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.badge-safe{background:var(--moss-soft);color:var(--moss)}
.badge-neutral{background:var(--paper-2);color:var(--ink-2)}
.badge-clay{background:var(--clay-soft);color:var(--clay-deep)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-safe{background:var(--moss)}
.dot-warn{background:var(--amber)}
.dot-clay{background:var(--clay)}

.detail-actions{display:flex;align-items:center;gap:10px;margin-top:22px;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:500;font-family:var(--sans);border:1px solid transparent;transition:transform .12s ease,background .15s,color .15s,border-color .15s;letter-spacing:-.1px}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:var(--clay-deep)}
.btn-secondary{background:var(--surface);color:var(--ink);border-color:var(--line-2)}
.btn-secondary:hover{border-color:var(--ink-2)}
.btn-ghost{color:var(--ink-2);padding:8px 14px}
.btn-ghost:hover{color:var(--ink);background:var(--paper-2)}
.btn-danger{background:var(--rust-soft);color:var(--rust)}
.btn-danger:hover{background:var(--rust);color:var(--surface)}
.btn-sm{padding:7px 14px;font-size:12.5px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2)}
.btn-icon:hover{color:var(--ink);border-color:var(--ink-2)}

/* Big start-cook CTA */
.btn-cook{
  padding:15px 24px;font-size:15px;letter-spacing:-.2px;font-weight:600;
  background:var(--ink);color:var(--paper);border-radius:999px;
  display:inline-flex;align-items:center;gap:14px;position:relative;
  transition:background .15s ease,transform .12s ease;
}
.btn-cook:hover{background:var(--clay-deep)}
.btn-cook .glyph{
  width:28px;height:28px;border-radius:50%;background:rgba(245,241,234,.14);
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:13px;letter-spacing:0;
}
.btn-cook .meta{
  font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;
  color:rgba(245,241,234,.62);padding-left:12px;margin-left:4px;border-left:1px solid rgba(245,241,234,.16);
}

.section-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-eyebrow .label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3)}
.section-eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}

.grid-2-detail{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}
.ing-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);font-size:14.5px}
.ing-row:last-child{border-bottom:1px solid var(--line)}
.ing-row .ing-name{flex:1;color:var(--ink)}
.ing-row .ing-q{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.6px}

.step-grid{display:grid;grid-template-columns:1fr;gap:0}
.step{display:grid;grid-template-columns:64px 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--line)}
.step:last-child{border-bottom:1px solid var(--line)}
.step-num{font-family:var(--serif);font-style:italic;font-size:42px;letter-spacing:-1px;color:var(--clay-deep);line-height:0.9}
.step-text{font-size:15.5px;color:var(--ink);line-height:1.55;padding-top:8px}
.step-text .dur{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
  color:var(--clay-deep);background:var(--clay-soft);
  padding:2px 8px;border-radius:999px;vertical-align:middle;margin:0 2px;
  font-weight:500;
}

/* ── Cooking mode overlay ────────────────────────────────────────────── */
.cook{
  position:fixed;inset:0;z-index:400;background:var(--paper);
  display:flex;flex-direction:column;
  animation:cookIn .28s cubic-bezier(.2,.9,.3,1.1);
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
}
@keyframes cookIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.cook-top{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:18px 28px 14px;
}
.cook-rail{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.cook-counter{
  font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--ink-2);white-space:nowrap;
}
.cook-counter b{color:var(--ink);font-weight:500}
.cook-progress{
  flex:1;height:2px;background:var(--line);border-radius:1px;overflow:hidden;max-width:520px;
}
.cook-progress-fill{
  height:100%;background:var(--clay-deep);transition:width .28s cubic-bezier(.2,.9,.3,1.1);
  border-radius:1px;
}
.cook-title-mark{
  font-family:var(--serif);font-style:italic;font-size:18px;letter-spacing:-.4px;color:var(--ink-2);
  max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cook-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.wake-badge{
  display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:999px;
  font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
  background:var(--paper-2);color:var(--ink-2);
}
.wake-badge.on{color:var(--moss);background:var(--moss-soft)}
.wake-badge.off{color:var(--amber);background:var(--amber-soft)}
.wake-led{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.85;animation:wakePulse 2s infinite}
@keyframes wakePulse{0%,100%{opacity:.85}50%{opacity:.35}}

.cook-close{
  width:40px;height:40px;border-radius:50%;background:var(--surface);
  border:1px solid var(--line-2);color:var(--ink-2);
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--sans);font-size:16px;
}
.cook-close:hover{color:var(--ink);border-color:var(--ink-2)}

/* ── Cooking body — Editorial layout (default) ───────────────────────── */
.cook-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 56px 32px;overflow:hidden;min-height:0}
.cook-stage{
  width:100%;max-width:880px;display:grid;grid-template-columns:170px 1fr;gap:48px;align-items:start;
}
.cook-step-num{
  font-family:var(--serif);font-style:italic;font-size:128px;letter-spacing:-3px;line-height:.85;
  color:var(--clay-deep);
}
.cook-step-meta{
  font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-3);
  margin-top:18px;display:flex;flex-direction:column;gap:4px;
}
.cook-step-meta .of{color:var(--ink-2)}
.cook-step-text{
  font-family:var(--serif);font-weight:400;font-size:clamp(28px,3.4vw,44px);
  line-height:1.18;letter-spacing:-1px;color:var(--ink);max-width:22ch;
}
.cook-step-text em{font-style:italic;color:var(--clay-deep)}
.cook-step-aux{
  margin-top:28px;font-size:14.5px;color:var(--ink-2);line-height:1.55;max-width:44ch;
  display:none;
}
.cook-step-aux.show{display:block}

/* Inline timer chip inside the step text */
.timer-inline{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:14px;letter-spacing:.2px;
  background:var(--clay-soft);color:var(--clay-deep);
  padding:4px 12px 4px 14px;border-radius:999px;
  vertical-align:middle;margin:0 4px;cursor:pointer;
  transition:background .15s,color .15s;
  font-weight:500;font-style:normal;
}
.timer-inline:hover{background:var(--clay-deep);color:var(--paper)}
.timer-inline.running{background:var(--ink);color:var(--paper)}
.timer-inline.done{background:var(--moss);color:var(--paper)}
.timer-inline .glyph{
  font-family:var(--sans);font-size:11px;width:14px;height:14px;border-radius:50%;
  background:currentColor;opacity:.18;display:inline-flex;align-items:center;justify-content:center;
}
.timer-inline.running .glyph{animation:wakePulse 1.4s infinite}

/* ── Card-stack layout ───────────────────────────────────────────────── */
.cook-cards{
  width:100%;max-width:520px;position:relative;perspective:1200px;margin:0 auto;
}
.cook-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:36px 32px 32px;min-height:380px;
  display:flex;flex-direction:column;gap:18px;
  box-shadow:var(--shadow);position:relative;
}
.cook-card.peek{
  position:absolute;inset:0;transform:translateY(14px) scale(.96);opacity:.42;
  filter:blur(.4px);pointer-events:none;z-index:-1;
}
.cook-card-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-3);display:flex;justify-content:space-between}
.cook-card-num{font-family:var(--serif);font-style:italic;font-size:72px;letter-spacing:-2px;color:var(--clay-deep);line-height:.9}
.cook-card-text{font-family:var(--serif);font-size:30px;line-height:1.18;letter-spacing:-.8px;color:var(--ink)}
.cook-card-dots{display:flex;gap:6px;justify-content:center;margin-top:18px}
.cook-card-dot{width:6px;height:6px;border-radius:50%;background:var(--line-2);transition:all .2s}
.cook-card-dot.active{background:var(--clay-deep);width:22px;border-radius:3px}
.cook-card-dot.done{background:var(--ink-3)}

/* ── Timer-ring layout ───────────────────────────────────────────────── */
.cook-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:36px;max-width:560px;width:100%;margin:0 auto}
.cook-ring{position:relative;width:300px;height:300px;flex-shrink:0}
.cook-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.cook-ring-track{fill:none;stroke:var(--line);stroke-width:6}
.cook-ring-fill{fill:none;stroke:var(--clay-deep);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .9s linear}
.cook-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.cook-ring-num{font-family:var(--serif);font-style:italic;font-size:84px;letter-spacing:-2.5px;color:var(--ink);line-height:.9}
.cook-ring-num.idle{color:var(--ink-3);font-size:64px}
.cook-ring-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-3)}
.cook-ring-step-text{font-family:var(--serif);font-size:26px;line-height:1.2;letter-spacing:-.5px;text-align:center;max-width:34ch;color:var(--ink)}
.cook-ring-controls{display:flex;gap:10px}

/* ── Split layout (step + ingredients-for-this-step) ─────────────────── */
.cook-split{width:100%;max-width:780px;display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:start;margin:0 auto}
.cook-split-text{font-family:var(--serif);font-size:36px;line-height:1.18;letter-spacing:-.8px;color:var(--ink)}
.cook-split-num{font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--clay-deep);margin-bottom:14px}
.cook-split-aside{position:sticky;top:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px 24px}
.cook-split-aside .section-eyebrow{margin-bottom:14px}
.aux-list{list-style:none;display:flex;flex-direction:column;gap:0}
.aux-list li{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px;color:var(--ink-2)}
.aux-list li:last-child{border-bottom:1px solid var(--line)}
.aux-list li.used{color:var(--ink)}
.aux-list li.used::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--clay-deep);display:inline-block;flex-shrink:0;align-self:center}
.aux-list li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--line-2);display:inline-block;flex-shrink:0;align-self:center}
.aux-list .q{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.5px;margin-left:auto}

/* ── Bottom control bar ──────────────────────────────────────────────── */
.cook-foot{
  padding:18px 28px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;
  border-top:1px solid var(--line);background:var(--paper);
}
.cook-foot-left{font-family:var(--mono);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);min-width:140px}
.cook-foot-left b{color:var(--ink-2);font-weight:500}
.cook-nav{display:flex;align-items:center;gap:10px}
.nav-btn{
  display:inline-flex;align-items:center;gap:10px;padding:14px 24px;border-radius:999px;
  font-size:15px;font-weight:500;letter-spacing:-.1px;
  background:var(--surface);color:var(--ink);border:1px solid var(--line-2);
  transition:all .15s;min-height:52px;min-width:120px;justify-content:center;
}
.nav-btn:hover{border-color:var(--ink-2)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.nav-btn.primary:hover{background:var(--clay-deep);border-color:var(--clay-deep)}
.nav-btn .arrow{font-family:var(--mono);font-size:18px;line-height:1}
.cook-foot-right{display:flex;align-items:center;gap:10px;justify-content:flex-end;min-width:140px}

/* ── Exit-confirm sheet ──────────────────────────────────────────────── */
.cook-confirm-overlay{position:fixed;inset:0;background:rgba(28,24,21,.46);z-index:600;display:flex;align-items:center;justify-content:center;padding:24px;animation:cookIn .2s ease}
.cook-confirm{background:var(--surface);border-radius:var(--r-lg);width:100%;max-width:440px;padding:32px 30px 26px;box-shadow:var(--shadow-lg)}
.cook-confirm-title{font-family:var(--serif);font-size:30px;letter-spacing:-.8px;line-height:1.06;margin-bottom:8px}
.cook-confirm-title em{font-style:italic;color:var(--clay-deep)}
.cook-confirm-sub{font-size:14.5px;color:var(--ink-2);margin-bottom:22px;line-height:1.5}
.cook-confirm-row{display:flex;gap:10px}
.cook-confirm-row .btn{flex:1}

/* ── Toast (mini sub-timer) ─────────────────────────────────────────── */
.subtimer{
  position:fixed;bottom:120px;right:28px;z-index:380;
  display:flex;align-items:center;gap:12px;padding:12px 14px 12px 18px;
  background:var(--ink);color:var(--paper);border-radius:999px;
  box-shadow:var(--shadow-lg);
  font-family:var(--mono);font-size:13px;letter-spacing:.4px;
  animation:cookIn .25s ease;
}
.subtimer.done{background:var(--moss)}
.subtimer .label{font-family:var(--sans);font-size:13.5px;color:rgba(245,241,234,.7);font-style:italic}
.subtimer .num{font-variant-numeric:tabular-nums;color:var(--paper)}
.subtimer button{
  margin-left:6px;width:30px;height:30px;border-radius:50%;
  background:rgba(245,241,234,.14);color:var(--paper);display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;font-family:var(--mono);
}
.subtimer button:hover{background:rgba(245,241,234,.28)}

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (max-width:920px){
  .shell{padding:32px 24px 96px}
  .detail-hero{grid-template-columns:1fr;gap:24px}
  .detail-image{aspect-ratio:4/3;max-height:340px}
  .h-title{font-size:36px;letter-spacing:-.8px}
  .grid-2-detail{grid-template-columns:1fr;gap:36px}
  .cook-stage{grid-template-columns:1fr;gap:18px}
