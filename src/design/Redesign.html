<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ко-да-ям — Redesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        /* Warm paper neutrals */
        --paper: #f5f1ea;
        --paper-2: #efeae0;
        --surface: #fcfaf6;
        --ink: #1c1815;
        --ink-2: #5a4f46;
        --ink-3: #8b8278;
        --line: #e4ded2;
        --line-2: #d6cfc1;

        /* Accents — same chroma, varied hue */
        --clay: oklch(0.58 0.13 38);
        --clay-soft: oklch(0.93 0.04 38);
        --clay-deep: oklch(0.42 0.13 38);
        --moss: oklch(0.52 0.07 145);
        --moss-soft: oklch(0.93 0.03 145);
        --rust: oklch(0.5 0.16 25);
        --rust-soft: oklch(0.93 0.05 25);
        --amber: oklch(0.66 0.11 75);
        --amber-soft: oklch(0.94 0.05 75);

        --shadow-sm:
          0 1px 2px rgba(28, 24, 21, 0.04), 0 1px 1px rgba(28, 24, 21, 0.03);
        --shadow:
          0 1px 2px rgba(28, 24, 21, 0.04),
          0 8px 24px -8px rgba(28, 24, 21, 0.08);
        --shadow-lg:
          0 4px 12px rgba(28, 24, 21, 0.06),
          0 24px 48px -16px rgba(28, 24, 21, 0.16);

        --r-xs: 6px;
        --r-sm: 10px;
        --r: 14px;
        --r-lg: 20px;

        --sans: "Geist", ui-sans-serif, system-ui, sans-serif;
        --serif: "Instrument Serif", ui-serif, Georgia, serif;
        --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
      }

      html,
      body {
        background: var(--paper);
        color: var(--ink);
        min-height: 100dvh;
        overflow-x: hidden;
      }
      body {
        font-family: var(--sans);
        font-weight: 400;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        font-feature-settings: "ss01", "cv11";
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }
      input,
      textarea,
      select {
        font-family: inherit;
        color: inherit;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      ::selection {
        background: var(--clay);
        color: var(--surface);
      }

      /* ── Layout ───────────────────────────────────────────────────────────── */
      .app {
        display: grid;
        grid-template-columns: 236px 1fr;
        min-height: 100dvh;
      }
      .sidebar {
        position: sticky;
        top: 0;
        align-self: start;
        height: 100dvh;
        padding: 36px 28px 24px;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        gap: 36px;
        background: var(--paper);
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
        line-height: 1;
      }
      .brand-mark {
        font-family: var(--serif);
        font-style: italic;
        font-size: 34px;
        letter-spacing: -1.5px;
        color: var(--ink);
        font-weight: 400;
      }
      .brand-sub {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.5px;
        color: var(--ink-3);
        text-transform: uppercase;
        margin-top: 4px;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
      }
      .nav-section-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 1.2px;
        color: var(--ink-3);
        text-transform: uppercase;
        padding: 0 4px;
        margin-bottom: 8px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 4px;
        font-size: 15px;
        font-weight: 500;
        color: var(--ink-2);
        border-radius: 0;
        background: none;
        width: 100%;
        text-align: left;
        position: relative;
        transition: color 0.15s;
        font-family: var(--sans);
      }
      .nav-item:hover {
        color: var(--ink);
      }
      .nav-item .nav-num {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-3);
        width: 18px;
      }
      .nav-item.active {
        color: var(--ink);
        font-weight: 600;
      }
      .nav-item.active::before {
        content: "";
        position: absolute;
        left: -28px;
        top: 50%;
        transform: translateY(-50%);
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--clay);
      }

      .sidebar-footer {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding-top: 24px;
        border-top: 1px solid var(--line);
      }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 4px;
      }
      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--clay-soft);
        color: var(--clay-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 13px;
        letter-spacing: -0.2px;
      }
      .user-name {
        font-size: 13.5px;
        font-weight: 500;
        color: var(--ink);
      }
      .user-meta {
        font-size: 11.5px;
        color: var(--ink-3);
        font-family: var(--mono);
        letter-spacing: 0.2px;
      }
      .sidebar-utility {
        display: flex;
        gap: 6px;
        font-size: 12px;
        color: var(--ink-3);
        font-family: var(--mono);
        letter-spacing: 0.3px;
      }
      .sidebar-utility button {
        padding: 4px 8px;
        border-radius: var(--r-xs);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--ink-3);
      }
      .sidebar-utility button:hover {
        color: var(--ink);
        background: var(--paper-2);
      }
      .sidebar-utility button.on {
        color: var(--ink);
        background: var(--paper-2);
      }

      .main {
        padding: 48px 64px 96px;
        min-width: 0;
      }
      .main-inner {
        max-width: 1080px;
        margin: 0 auto;
      }

      /* ── Typography ────────────────────────────────────────────────────────── */
      .eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 1.6px;
        color: var(--ink-3);
        text-transform: uppercase;
      }
      .h-display {
        font-family: var(--serif);
        font-weight: 400;
        font-size: clamp(56px, 7vw, 88px);
        line-height: 0.95;
        letter-spacing: -2.5px;
        color: var(--ink);
      }
      .h-display .it {
        font-style: italic;
        color: var(--clay-deep);
      }
      .h-title {
        font-family: var(--serif);
        font-weight: 400;
        font-size: 48px;
        letter-spacing: -1.2px;
        line-height: 1.02;
        color: var(--ink);
      }
      .h-title.italic {
        font-style: italic;
      }
      .h-sub {
        font-size: 17px;
        line-height: 1.55;
        color: var(--ink-2);
        font-weight: 400;
        max-width: 48ch;
      }
      .section-eyebrow {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .section-eyebrow::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }
      .label {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 1px;
        color: var(--ink-3);
        text-transform: uppercase;
      }

      /* ── Buttons ─────────────────────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 18px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 500;
        font-family: var(--sans);
        letter-spacing: -0.1px;
        border: 1px solid transparent;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-primary {
        background: var(--ink);
        color: var(--paper);
      }
      .btn-primary:hover {
        background: var(--clay-deep);
      }
      .btn-secondary {
        background: var(--surface);
        color: var(--ink);
        border-color: var(--line-2);
      }
      .btn-secondary:hover {
        border-color: var(--ink-2);
      }
      .btn-ghost {
        color: var(--ink-2);
        padding: 8px 14px;
      }
      .btn-ghost:hover {
        color: var(--ink);
        background: var(--paper-2);
      }
      .btn-danger {
        background: var(--rust-soft);
        color: var(--rust);
      }
      .btn-danger:hover {
        background: var(--rust);
        color: var(--surface);
      }
      .btn-sm {
        padding: 7px 14px;
        font-size: 12.5px;
      }
      .btn-xs {
        padding: 4px 10px;
        font-size: 11.5px;
        border-radius: 999px;
      }
      .btn-icon {
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 50%;
        border: 1px solid var(--line-2);
        background: var(--surface);
        color: var(--ink-2);
      }
      .btn-icon:hover {
        color: var(--ink);
        border-color: var(--ink-2);
      }
      .btn-full {
        width: 100%;
      }

      /* ── Badges & chips ───────────────────────────────────────────────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        border-radius: 999px;
        font-weight: 500;
      }
      .badge-safe {
        background: var(--moss-soft);
        color: var(--moss);
      }
      .badge-warn {
        background: var(--amber-soft);
        color: var(--amber);
      }
      .badge-danger {
        background: var(--rust-soft);
        color: var(--rust);
      }
      .badge-clay {
        background: var(--clay-soft);
        color: var(--clay-deep);
      }
      .badge-neutral {
        background: var(--paper-2);
        color: var(--ink-2);
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
      }
      .dot-safe {
        background: var(--moss);
      }
      .dot-warn {
        background: var(--amber);
      }
      .dot-danger {
        background: var(--rust);
      }
      .dot-clay {
        background: var(--clay);
      }

      .chip {
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--line-2);
        background: var(--surface);
        color: var(--ink-2);
        cursor: pointer;
        transition: all 0.12s;
      }
      .chip:hover {
        border-color: var(--ink-2);
        color: var(--ink);
      }
      .chip.selected {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }
      .chip.sel-danger {
        background: var(--rust);
        color: var(--surface);
        border-color: var(--rust);
      }
      .chip.sel-warn {
        background: var(--amber);
        color: var(--surface);
        border-color: var(--amber);
      }

      /* ── Cards ───────────────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 24px;
      }
      .card-flat {
        background: var(--paper-2);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 20px;
      }
      .card-bare {
        padding: 0;
      }

      /* ── Inputs ──────────────────────────────────────────────────────────── */
      .input {
        width: 100%;
        padding: 11px 14px;
        background: var(--surface);
        border: 1px solid var(--line-2);
        border-radius: var(--r-sm);
        font-size: 14px;
        color: var(--ink);
        font-family: var(--sans);
        transition:
          border 0.15s,
          box-shadow 0.15s;
      }
      .input:focus {
        border-color: var(--ink);
        box-shadow: 0 0 0 3px rgba(28, 24, 21, 0.06);
      }
      .input::placeholder {
        color: var(--ink-3);
      }
      .input-label {
        display: block;
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-3);
        margin-bottom: 8px;
      }

      .search {
        position: relative;
      }
      .search .input {
        padding-left: 38px;
        background: var(--surface);
        border-radius: 999px;
      }
      .search-glyph {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink-3);
        pointer-events: none;
        font-size: 13px;
      }

      /* ── Recipe card ─────────────────────────────────────────────────────── */
      .recipe-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--r-lg);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.18s ease;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .recipe-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        border-color: var(--line-2);
      }
      .recipe-card.flagged {
        background: var(--rust-soft);
        border-color: rgba(180, 60, 40, 0.18);
      }

      /* Favorite heart on recipe card / detail */
      .fav-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 3;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(252, 250, 246, 0.88);
        -webkit-backdrop-filter: blur(2px);
        backdrop-filter: blur(2px);
        border: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-3);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        transition: all 0.15s;
      }
      .fav-btn:hover {
        color: var(--clay-deep);
        border-color: var(--line-2);
        transform: scale(1.06);
      }
      .fav-btn.on {
        color: var(--clay-deep);
        background: var(--clay-soft);
        border-color: transparent;
      }
      .fav-btn .heart-fill {
        display: none;
      }
      .fav-btn.on .heart-fill {
        display: inline;
      }
      .fav-btn.on .heart-line {
        display: none;
      }

      .fav-btn-inline {
        position: static;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: auto;
        height: auto;
        padding: 9px 14px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--line-2);
        font-family: var(--sans);
        font-size: 13.5px;
        font-weight: 500;
        color: var(--ink-2);
      }
      .fav-btn-inline:hover {
        color: var(--clay-deep);
        border-color: var(--clay-deep);
        transform: none;
      }
      .fav-btn-inline.on {
        background: var(--clay-soft);
        color: var(--clay-deep);
        border-color: transparent;
      }
      .recipe-image {
        position: relative;
        aspect-ratio: 4/3;
        background: var(--paper-2);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .recipe-image-emoji {
        font-size: 64px;
        filter: saturate(0.95);
        transition: transform 0.3s;
      }
      .recipe-card:hover .recipe-image-emoji {
        transform: scale(1.06);
      }
      .recipe-image-stripes {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          135deg,
          transparent 0 12px,
          rgba(28, 24, 21, 0.025) 12px 13px
        );
        pointer-events: none;
      }
      .recipe-image-label {
        position: absolute;
        left: 12px;
        bottom: 10px;
        font-family: var(--mono);
        font-size: 9.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-3);
        opacity: 0.7;
      }
      .recipe-body {
        padding: 18px 20px 22px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
      }
      .recipe-name {
        font-family: var(--serif);
        font-size: 24px;
        line-height: 1.05;
        letter-spacing: -0.6px;
        color: var(--ink);
      }
      .recipe-name.italic {
        font-style: italic;
      }
      .recipe-meta {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-3);
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .recipe-tags {
        margin-top: auto;
        padding-top: 14px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      /* ── Stats / metric strips ───────────────────────────────────────────── */
      .metric {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .metric-num {
        font-family: var(--serif);
        font-size: 56px;
        letter-spacing: -2px;
        line-height: 0.9;
        color: var(--ink);
      }
      .metric-num.italic {
        font-style: italic;
      }
      .metric-label {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      /* ── Tag input ───────────────────────────────────────────────────────── */
      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .tag-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px 5px 12px;
        border-radius: 999px;
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .tag-pill .rm {
        font-family: var(--mono);
        font-size: 10px;
        opacity: 0.5;
      }
      .tag-pill:hover .rm {
        opacity: 1;
      }
      .tag-danger {
        background: var(--rust-soft);
        color: var(--rust);
      }
      .tag-warn {
        background: var(--amber-soft);
        color: var(--amber);
      }
      .tag-neutral {
        background: var(--paper-2);
        color: var(--ink-2);
      }

      /* ── Modal ───────────────────────────────────────────────────────────── */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(28, 24, 21, 0.35);
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        animation: overlay 0.2s ease;
      }
      @keyframes overlay {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal {
        background: var(--surface);
        border-radius: var(--r-lg);
        width: 100%;
        max-width: 520px;
        max-height: 88dvh;
        overflow-y: auto;
        position: relative;
        padding: 36px 32px 30px;
        box-shadow: var(--shadow-lg);
        animation: modal 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      }
      @keyframes modal {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .modal-title {
        font-family: var(--serif);
        font-size: 32px;
        letter-spacing: -1px;
        line-height: 1.05;
        margin-bottom: 6px;
      }
      .modal-title.italic {
        font-style: italic;
      }
      .modal-sub {
        font-size: 14px;
        color: var(--ink-2);
        margin-bottom: 22px;
      }
      .modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--paper-2);
        color: var(--ink-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .modal-close:hover {
        background: var(--line-2);
        color: var(--ink);
      }

      /* ── Detail view ─────────────────────────────────────────────────────── */
      .detail-back {
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-2);
        padding: 6px 0;
        margin-bottom: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .detail-back:hover {
        color: var(--ink);
      }
      .detail-hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 36px;
        align-items: end;
        margin-bottom: 36px;
        padding-bottom: 36px;
        border-bottom: 1px solid var(--line);
      }
      .detail-image {
        aspect-ratio: 1/1;
        background: var(--paper-2);
        border-radius: var(--r-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .detail-image .recipe-image-stripes {
        background: repeating-linear-gradient(
          135deg,
          transparent 0 16px,
          rgba(28, 24, 21, 0.03) 16px 17px
        );
      }
      .detail-image-emoji {
        font-size: 160px;
      }
      .detail-head .h-title {
        margin: 8px 0 16px;
      }
      .step-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
      }
      .step {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 16px;
        padding: 18px 0;
        border-top: 1px solid var(--line);
      }
      .step:last-child {
        border-bottom: 1px solid var(--line);
      }
      .step-num {
        font-family: var(--serif);
        font-style: italic;
        font-size: 42px;
        letter-spacing: -1px;
        color: var(--clay-deep);
        line-height: 0.9;
      }
      .step-text {
        font-size: 15.5px;
        color: var(--ink);
        line-height: 1.55;
        padding-top: 8px;
      }
      .ing-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 0;
        border-top: 1px solid var(--line);
        font-size: 14.5px;
      }
      .ing-row:last-child {
        border-bottom: 1px solid var(--line);
      }
      .ing-row .ing-name {
        flex: 1;
      }
      .ing-row.blocked .ing-name {
        color: var(--rust);
        text-decoration: line-through;
      }

      /* ── Shopping list ───────────────────────────────────────────────────── */
      .shop-summary {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 6px 0 22px;
      }
      .shop-stat {
        background: var(--paper-2);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 14px 16px;
      }
      .shop-stat-num {
        font-family: var(--serif);
        font-style: italic;
        font-size: 36px;
        letter-spacing: -1.2px;
        line-height: 1;
        color: var(--ink);
      }
      .shop-stat-num.clay {
        color: var(--clay-deep);
      }
      .shop-stat-num.moss {
        color: var(--moss);
      }
      .shop-stat-label {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-3);
        margin-top: 8px;
      }

      .shop-eyebrow {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--ink-3);
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0 6px;
      }
      .shop-eyebrow::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .shop-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .shop-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 4px;
        border-top: 1px solid var(--line);
        cursor: pointer;
        transition:
          background 0.12s,
          opacity 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .shop-row:last-child {
        border-bottom: 1px solid var(--line);
      }
      .shop-row:hover {
        background: var(--paper-2);
      }
      .shop-row .check {
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        border-radius: 6px;
        background: var(--surface);
        border: 1.5px solid var(--line-2);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.14s ease;
        color: transparent;
        font-size: 13px;
        font-weight: 700;
        font-family: var(--sans);
      }
      .shop-row .check::before {
        content: "✓";
        line-height: 1;
        letter-spacing: 0;
      }
      .shop-row .qty {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-3);
        min-width: 48px;
        text-align: right;
      }
      .shop-row .name {
        flex: 1;
        font-size: 15px;
        color: var(--ink);
        font-weight: 500;
      }
      .shop-row.checked .check {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--paper);
      }
      .shop-row.checked .name {
        color: var(--ink-3);
        text-decoration: line-through;
        text-decoration-thickness: 1px;
        text-decoration-color: var(--line-2);
      }
      .shop-row.have {
        cursor: default;
        opacity: 0.78;
      }
      .shop-row.have:hover {
        background: transparent;
      }
      .shop-row.have .check {
        background: var(--moss-soft);
        border-color: transparent;
        color: var(--moss);
      }
      .shop-row.have .name {
        color: var(--ink-2);
      }

      .shop-empty {
        text-align: center;
        padding: 32px 12px 8px;
      }
      .shop-empty-glyph {
        font-size: 48px;
        margin-bottom: 10px;
        opacity: 0.7;
      }
      .shop-empty-title {
        font-family: var(--serif);
        font-style: italic;
        font-size: 24px;
        letter-spacing: -0.5px;
        color: var(--ink);
        margin-bottom: 4px;
      }
      .shop-empty-sub {
        font-size: 14px;
        color: var(--ink-2);
        max-width: 34ch;
        margin: 0 auto;
      }

      .shop-footer {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }
      .shop-progress {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-3);
        flex: 1;
      }
      .shop-progress b {
        color: var(--ink);
        font-weight: 500;
      }
      .shop-toast {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--moss);
        margin-right: 4px;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .shop-toast.show {
        opacity: 1;
      }

      .btn-shop {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 24px;
      }
      .btn-shop .badge-count {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1px;
        background: rgba(245, 241, 234, 0.18);
        color: var(--paper);
        padding: 2px 8px;
        border-radius: 999px;
      }

      /* ── Empty state ─────────────────────────────────────────────────────── */
      .empty {
        text-align: center;
        padding: 64px 24px;
        color: var(--ink-3);
      }
      .empty-glyph {
        font-size: 56px;
        margin-bottom: 14px;
        opacity: 0.6;
      }
      .empty-title {
        font-family: var(--serif);
        font-size: 24px;
        letter-spacing: -0.5px;
        color: var(--ink);
        margin-bottom: 6px;
        font-style: italic;
      }
      .empty-sub {
        font-size: 14px;
        max-width: 38ch;
        margin: 0 auto;
      }

      /* ── Cookbook builder ─────────────────────────────────────────────────── */
      .cb-tabs {
        display: inline-flex;
        background: var(--paper-2);
        border-radius: 999px;
        padding: 4px;
        gap: 0;
      }
      .cb-tab {
        padding: 9px 18px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        color: var(--ink-2);
        font-family: var(--sans);
        transition: all 0.14s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .cb-tab:hover {
        color: var(--ink);
      }
      .cb-tab.active {
        background: var(--surface);
        color: var(--ink);
        box-shadow: var(--shadow-sm);
      }
      .cb-tab .count {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.5px;
        background: var(--paper-2);
        color: var(--ink-3);
        padding: 1px 7px;
        border-radius: 999px;
      }
      .cb-tab.active .count {
        background: var(--paper-2);
        color: var(--ink-2);
      }

      .cb-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 8px 0 24px;
        flex-wrap: wrap;
      }
      .cb-toolbar-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .cb-mini-btn {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--ink-2);
        padding: 6px 10px;
        border-radius: var(--r-xs);
      }
      .cb-mini-btn:hover {
        color: var(--ink);
        background: var(--paper-2);
      }

      .cb-card {
        position: relative;
        cursor: pointer;
        transition: all 0.18s ease;
        background: var(--surface);
        border: 1.5px solid var(--line);
        border-radius: var(--r-lg);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .cb-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        border-color: var(--line-2);
      }
      .cb-card.selected {
        border-color: var(--ink);
        box-shadow:
          0 0 0 1px var(--ink),
          var(--shadow);
      }
      .cb-card .recipe-image-emoji {
        font-size: 56px;
      }
      .cb-card .recipe-body {
        padding: 16px 18px 18px;
        gap: 4px;
      }
      .cb-card .recipe-name {
        font-size: 21px;
        font-style: italic;
      }
      .cb-card .recipe-meta {
        margin-top: 2px;
      }

      .cb-check {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 3;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(252, 250, 246, 0.92);
        -webkit-backdrop-filter: blur(2px);
        backdrop-filter: blur(2px);
        border: 1.5px solid var(--line-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 700;
        color: transparent;
        transition: all 0.14s;
      }
      .cb-check::before {
        content: "✓";
        line-height: 1;
      }
      .cb-card.selected .cb-check {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--paper);
      }
      .cb-card .fav-tag {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 3;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        background: var(--clay-soft);
        color: var(--clay-deep);
        padding: 4px 9px;
        border-radius: 999px;
      }

      .cb-bar {
        position: sticky;
        bottom: 18px;
        z-index: 50;
        margin-top: 32px;
        background: var(--ink);
        color: var(--paper);
        border-radius: 999px;
        padding: 10px 14px 10px 24px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: var(--shadow-lg);
        animation: cbBarIn 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      }
      @keyframes cbBarIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .cb-bar .cb-count {
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: rgba(245, 241, 234, 0.7);
        flex: 1;
      }
      .cb-bar .cb-count b {
        color: var(--paper);
        font-weight: 500;
        font-family: var(--serif);
        font-style: italic;
        font-size: 18px;
        letter-spacing: -0.3px;
        margin-right: 6px;
      }
      .cb-bar .btn-paper {
        background: var(--paper);
        color: var(--ink);
        padding: 10px 18px;
        border-radius: 999px;
        font-family: var(--sans);
        font-size: 13.5px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      .cb-bar .btn-paper:hover {
        background: var(--surface);
      }
      .cb-bar .btn-paper:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .cb-bar .btn-ghost-on-ink {
        color: rgba(245, 241, 234, 0.7);
        padding: 8px 12px;
        font-size: 12.5px;
      }
      .cb-bar .btn-ghost-on-ink:hover {
        color: var(--paper);
      }

      .cb-cover {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 36px 32px;
        text-align: center;
        margin: 6px 0 22px;
        position: relative;
        overflow: hidden;
      }
      .cb-cover::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          135deg,
          transparent 0 16px,
          rgba(28, 24, 21, 0.025) 16px 17px
        );
        pointer-events: none;
      }
      .cb-cover-eyebrow {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--ink-3);
        margin-bottom: 18px;
      }
      .cb-cover-title {
        font-family: var(--serif);
        font-style: italic;
        font-size: 46px;
        letter-spacing: -1.4px;
        line-height: 1;
        color: var(--clay-deep);
        margin-bottom: 10px;
      }
      .cb-cover-author {
        font-family: var(--serif);
        font-size: 18px;
        color: var(--ink);
        margin-bottom: 24px;
      }
      .cb-cover-meta {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--ink-3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }
      .cb-cover-meta span::before {
        content: "·";
        margin-right: 14px;
        color: var(--line-2);
      }
      .cb-cover-meta span:first-child::before {
        display: none;
      }
      .cb-form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 14px;
      }
      .cb-form-row.full {
        grid-template-columns: 1fr;
      }

      /* ── Product row ─────────────────────────────────────────────────────── */
      .product-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        background: var(--surface);
        border-top: 1px solid var(--line);
        transition: background 0.12s;
      }
      .product-row:last-child {
        border-bottom: 1px solid var(--line);
      }
      .product-row:hover {
        background: var(--paper-2);
      }
      .product-row .p-emoji {
        font-size: 24px;
        width: 32px;
        text-align: center;
      }
      .product-row .p-name {
        flex: 1;
        font-size: 14.5px;
        font-weight: 500;
      }
      .product-row .p-cat {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--ink-3);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        min-width: 90px;
      }

      /* ── Tweaks panel ────────────────────────────────────────────────────── */
      .tweaks {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--r-lg);
        padding: 22px;
        width: 280px;
        box-shadow: var(--shadow-lg);
        z-index: 200;
        display: none;
        animation: tweaksIn 0.2s ease;
      }
      @keyframes tweaksIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .tweaks.open {
        display: block;
      }
      .tweaks-title {
        font-family: var(--serif);
        font-style: italic;
        font-size: 22px;
        letter-spacing: -0.5px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .tweaks-close {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--paper-2);
        color: var(--ink-2);
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.12s;
        font-family: var(--sans);
        font-style: normal;
      }
      .tweaks-close:hover {
        background: var(--ink);
        color: var(--paper);
      }
      .tweak-row {
        margin-bottom: 16px;
      }
      .tweak-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--ink-3);
        margin-bottom: 8px;
        display: block;
      }
      .seg {
        display: inline-flex;
        background: var(--paper-2);
        border-radius: 999px;
        padding: 3px;
        gap: 0;
      }
      .seg-btn {
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-2);
        transition: all 0.12s;
      }
      .seg-btn.active {
        background: var(--surface);
        color: var(--ink);
        box-shadow: var(--shadow-sm);
      }

      /* ── Detail ingredient blocks ────────────────────────────────────────── */
      .fade-in {
        animation: fadeIn 0.22s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ── Theme variants ──────────────────────────────────────────────────── */
      .theme-fresh {
        --paper: #f0f2ee;
        --paper-2: #e5e9e0;
        --surface: #fafbf8;
        --line: #dde2d6;
        --line-2: #cdd3c3;
        --ink: #13201a;
        --ink-2: #3d4a41;
        --ink-3: #7c8779;
        --clay: oklch(0.52 0.1 165);
        --clay-soft: oklch(0.93 0.04 165);
        --clay-deep: oklch(0.38 0.1 165);
      }
      .theme-night {
        --paper: #15110e;
        --paper-2: #1f1a14;
        --surface: #241d17;
        --line: #3a3025;
        --line-2: #4a3f33;
        --ink: #f4ecdf;
        --ink-2: #b5a892;
        --ink-3: #7e7361;
        --clay: oklch(0.72 0.13 38);
        --clay-soft: oklch(0.32 0.08 38);
        --clay-deep: oklch(0.8 0.12 38);
      }

      /* ── Top bar ─────────────────────────────────────────────────────────── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 48px;
        gap: 24px;
      }
      .topbar .breadcrumb {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 1.2px;
        color: var(--ink-3);
        text-transform: uppercase;
      }
      .topbar .breadcrumb span {
        color: var(--ink);
      }
      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .topbar-date {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink-3);
        letter-spacing: 0.8px;
      }

      /* ── Two-column hero ─────────────────────────────────────────────────── */
      .hero-grid {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 48px;
        align-items: end;
        margin-bottom: 72px;
      }
      .hero-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .hero-stat-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 22px 22px 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: all 0.15s;
      }
      .hero-stat-card:hover {
        border-color: var(--line-2);
      }
      .hero-stat-num {
        font-family: var(--serif);
        font-size: 48px;
        letter-spacing: -1.5px;
        line-height: 0.9;
      }
      .hero-stat-num.italic {
        font-style: italic;
      }
      .hero-stat-num.clay {
        color: var(--clay-deep);
      }
      .hero-stat-num.rust {
        color: var(--rust);
      }
      .hero-stat-num.amber {
        color: var(--amber);
      }
      .hero-stat-num.moss {
        color: var(--moss);
      }
      .hero-stat-label {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--ink-3);
      }

      /* ── Grid sizing ─────────────────────────────────────────────────────── */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
      .grid-4 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }

      .divider {
        height: 1px;
        background: var(--line);
        margin: 48px 0;
      }

      /* ── Page header ─────────────────────────────────────────────────────── */
      .page-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 36px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }
      .page-head .h-title {
        margin-bottom: 4px;
      }
      .page-head-sub {
        font-size: 14.5px;
        color: var(--ink-2);
        max-width: 42ch;
      }

      /* ── Allergy banner ──────────────────────────────────────────────────── */
      .alert-banner {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 20px;
        background: var(--rust-soft);
        border-radius: var(--r);
        border: 1px solid rgba(180, 60, 40, 0.15);
        margin-bottom: 32px;
      }
      .alert-banner .dot {
        flex-shrink: 0;
      }
      .alert-banner-text {
        flex: 1;
        font-size: 13.5px;
        color: var(--rust);
        font-weight: 500;
      }
      .alert-banner-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      /* ── Fridge section ──────────────────────────────────────────────────── */
      .fridge-stage {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 40px;
        align-items: start;
        margin-top: 8px;
      }
      .fridge-room {
        position: relative;
        background:
          radial-gradient(
            60% 50% at 50% 25%,
            rgba(255, 255, 255, 0.55),
            transparent 70%
          ),
          linear-gradient(180deg, var(--paper-2) 0%, var(--paper) 100%);
        border: 1px solid var(--line);
        border-radius: var(--r-lg);
        padding: 28px 28px 44px;
        min-height: 760px;
        overflow: hidden;
      }
      .fridge-room::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 30%;
        background:
          linear-gradient(180deg, transparent 0%, rgba(28, 24, 21, 0.05) 100%),
          repeating-linear-gradient(
            115deg,
            var(--paper-2) 0 32px,
            var(--paper) 32px 64px
          );
        transform: perspective(900px) rotateX(60deg);
        transform-origin: bottom center;
        border-top: 1px solid var(--line);
        z-index: 0;
      }
      .fridge-room.is-open::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 14%;
        width: 520px;
        height: 140px;
        transform: translateX(-50%);
        background: radial-gradient(
          closest-side,
          oklch(0.86 0.1 75 / 0.45),
          transparent 70%
        );
        filter: blur(10px);
        pointer-events: none;
        z-index: 1;
      }

      .fridge-toolbar {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .fridge-status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: var(--ink-2);
        background: var(--surface);
        border: 1px solid var(--line);
        padding: 7px 14px;
        border-radius: 999px;
      }
      .fridge-status .led {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--moss);
        box-shadow: 0 0 0 3px rgba(80, 130, 90, 0.18);
      }
      .fridge-status.open .led {
        background: var(--amber);
        box-shadow: 0 0 0 3px rgba(220, 160, 40, 0.18);
        animation: fridgeBlink 1.4s infinite;
      }
      @keyframes fridgeBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .fridge-3d-wrap {
        position: relative;
        z-index: 2;
        perspective: 2200px;
        perspective-origin: 50% 40%;
        min-height: 610px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .fridge-3d {
        position: relative;
        width: 380px;
        height: 580px;
        transform-style: preserve-3d;
        filter: drop-shadow(0 30px 30px rgba(28, 24, 21, 0.18));
      }

      /* Cabinet body */
      .fridge-cabinet {
        position: absolute;
        inset: 0;
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          oklch(0.92 0.01 60) 0%,
          oklch(0.84 0.015 60) 100%
        );
        border: 1px solid var(--line-2);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.5),
          inset 0 -30px 60px rgba(28, 24, 21, 0.05);
      }

      /* Interior */
      .fridge-interior {
        position: absolute;
        inset: 10px;
        border-radius: 12px;
        overflow: hidden;
        background: linear-gradient(
          180deg,
          oklch(0.96 0.015 70) 0%,
          oklch(0.92 0.02 70) 100%
        );
        box-shadow:
          inset 0 0 0 1px rgba(28, 24, 21, 0.05),
          inset 0 30px 50px rgba(28, 24, 21, 0.08);
      }
      .fridge-interior::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          120% 60% at 50% -20%,
          oklch(0.92 0.12 75 / 0.8),
          transparent 70%
        );
        opacity: 0;
        transition: opacity 0.8s ease 0.2s;
        mix-blend-mode: multiply;
      }
      .fridge-3d.open .fridge-interior::before {
        opacity: 0.9;
      }

      /* Shelves */
      .fridge-shelves {
        position: absolute;
        inset: 0;
        padding: 18px 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .fridge-freezer {
        position: relative;
        height: 118px;
        border: 1px solid rgba(28, 24, 21, 0.08);
        border-radius: 10px;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(255, 255, 255, 0.7),
            transparent 40%
          ),
          radial-gradient(
            circle at 75% 60%,
            rgba(255, 255, 255, 0.5),
            transparent 40%
          ),
          linear-gradient(
            180deg,
            oklch(0.96 0.02 220 / 0.8),
            oklch(0.92 0.03 220 / 0.5)
          );
        padding: 18px 6px 6px;
        display: flex;
        align-items: flex-end;
        gap: 5px;
        flex-wrap: nowrap;
        overflow: hidden;
      }
      .fridge-shelf-row {
        flex: 1;
        position: relative;
        border-bottom: 1px solid oklch(0.85 0.02 60);
        display: flex;
        align-items: flex-end;
        gap: 5px;
        padding: 18px 6px 4px;
        overflow: hidden;
      }
      .fridge-shelf-row:last-child {
        border-bottom: none;
      }
      .fridge-shelf-row::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 5px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.8),
          transparent
        );
        pointer-events: none;
      }
      .shelf-tag {
        position: absolute;
        top: 5px;
        left: 8px;
        font-family: var(--mono);
        font-size: 8.5px;
        letter-spacing: 1.2px;
        color: var(--ink-3);
        text-transform: uppercase;
        pointer-events: none;
        opacity: 0.85;
      }

      /* Products */
      .fridge-product {
        position: relative;
        flex: 0 0 auto;
        width: 40px;
        height: 60px;
        border-radius: 7px 7px 3px 3px;
        background: linear-gradient(
          180deg,
          var(--surface) 0%,
          oklch(0.92 0.02 60) 100%
        );
        border: 1px solid rgba(28, 24, 21, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding: 3px 2px 4px;
        cursor: pointer;
        user-select: none;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          0 3px 0 rgba(28, 24, 21, 0.05),
          0 7px 8px rgba(28, 24, 21, 0.06);
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          opacity 0.2s;
      }
      .fridge-product:hover {
        transform: translateY(-3px);
        box-shadow:
          0 6px 0 rgba(28, 24, 21, 0.06),
          0 12px 16px rgba(28, 24, 21, 0.12);
      }
      .fridge-product.tall {
        height: 76px;
      }
      .fridge-product.short {
        height: 48px;
      }
      .fridge-product.wide {
        width: 56px;
      }
      .fridge-product .e {
        font-size: 22px;
        line-height: 1;
        margin-bottom: 1px;
        filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.06));
      }
      .fridge-product .l {
        font-family: var(--sans);
        font-size: 8px;
        font-weight: 600;
        letter-spacing: 0.2px;
        color: var(--ink);
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-transform: uppercase;
        line-height: 1;
      }
      .fridge-product .rm {
        position: absolute;
        top: -6px;
        right: -6px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--rust);
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        border: 2px solid var(--paper);
      }
      .fridge-product:hover .rm {
        display: flex;
      }
      .fridge-product.flagged {
        outline: 1.5px solid var(--rust);
        outline-offset: 1px;
      }
      .fridge-product.fading {
        opacity: 0;
        transform: scale(0.8);
      }

      /* Tints */
      .tint-milk {
        background: linear-gradient(
          180deg,
          var(--surface) 0%,
          oklch(0.93 0.015 220) 100%
        );
      }
      .tint-egg {
        background: linear-gradient(
          180deg,
          oklch(0.97 0.04 80) 0%,
          oklch(0.88 0.08 80) 100%
        );
      }
      .tint-cheese {
        background: linear-gradient(
          180deg,
          oklch(0.96 0.05 90) 0%,
          oklch(0.82 0.1 80) 100%
        );
      }
      .tint-veg {
        background: linear-gradient(
          180deg,
          oklch(0.95 0.03 145) 0%,
          oklch(0.82 0.07 145) 100%
        );
      }
      .tint-meat {
        background: linear-gradient(
          180deg,
          oklch(0.93 0.04 25) 0%,
          oklch(0.78 0.1 25) 100%
        );
      }
      .tint-fruit {
        background: linear-gradient(
          180deg,
          oklch(0.94 0.05 30) 0%,
          oklch(0.82 0.1 30) 100%
        );
      }
      .tint-jar {
        background: linear-gradient(
          180deg,
          oklch(0.93 0.02 60) 0%,
          oklch(0.82 0.04 60) 100%
        );
      }
      .tint-frozen {
        background: linear-gradient(
          180deg,
          oklch(0.96 0.02 220) 0%,
          oklch(0.82 0.05 220) 100%
        );
      }
      .tint-grain {
        background: linear-gradient(
          180deg,
          oklch(0.94 0.04 65) 0%,
          oklch(0.8 0.08 50) 100%
        );
      }

      /* Add slot */
      .fridge-slot {
        flex: 0 0 auto;
        width: 40px;
        height: 42px;
        border-radius: 7px;
        border: 1px dashed rgba(28, 24, 21, 0.22);
        background: rgba(255, 255, 255, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--ink-3);
        cursor: pointer;
        transition: all 0.12s;
      }
      .fridge-slot:hover {
        border-color: var(--clay-deep);
        color: var(--clay-deep);
        background: var(--clay-soft);
        border-style: solid;
      }

      /* Door */
      .fridge-door-wrap {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        perspective: 1600px;
        pointer-events: none;
      }
      .fridge-door {
        position: absolute;
        inset: 0;
        border-radius: 18px;
        pointer-events: auto;
        transform-origin: left center;
        transform: rotateY(0deg);
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(0.62, -0.02, 0.27, 1);
        background: linear-gradient(
          180deg,
          oklch(0.92 0.01 60) 0%,
          oklch(0.84 0.015 60) 100%
        );
        border: 1px solid var(--line-2);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.5),
          inset 0 -30px 60px rgba(28, 24, 21, 0.06),
          0 12px 28px rgba(28, 24, 21, 0.14);
        cursor: pointer;
      }
      .fridge-3d.open .fridge-door {
        transform: rotateY(-118deg);
      }

      .door-display {
        position: absolute;
        top: 28px;
        left: 24px;
        right: 54px;
        height: 46px;
        border-radius: 8px;
        background: linear-gradient(
          180deg,
          oklch(0.2 0.01 60) 0%,
          oklch(0.26 0.015 60) 100%
        );
        color: oklch(0.88 0.1 75);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.4);
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 1.2px;
        backface-visibility: hidden;
      }
      .door-display .temp {
        font-family: var(--serif);
        font-style: italic;
        font-size: 20px;
        letter-spacing: -0.5px;
        line-height: 1;
        color: oklch(0.94 0.1 75);
      }
      .door-brand {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 124px;
        text-align: center;
        font-family: var(--serif);
        font-style: italic;
        font-size: 30px;
        letter-spacing: -1px;
        color: rgba(28, 24, 21, 0.22);
        pointer-events: none;
        backface-visibility: hidden;
      }
      .door-brand-sub {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 98px;
        text-align: center;
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: rgba(28, 24, 21, 0.28);
        pointer-events: none;
        backface-visibility: hidden;
      }

      .fridge-handle {
        position: absolute;
        top: 90px;
        bottom: 90px;
        right: 18px;
        width: 10px;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          oklch(0.42 0.01 60),
          oklch(0.28 0.01 60) 40%,
          oklch(0.42 0.01 60)
        );
        box-shadow:
          0 0 0 3px rgba(0, 0, 0, 0.04),
          inset 0 1px 0 rgba(255, 255, 255, 0.25),
          inset 0 -1px 0 rgba(0, 0, 0, 0.25);
        cursor: pointer;
        transition: transform 0.2s;
        backface-visibility: hidden;
      }
      .fridge-handle::before,
      .fridge-handle::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 12px;
        background: linear-gradient(
          180deg,
          oklch(0.42 0.01 60),
          oklch(0.28 0.01 60)
        );
        border-radius: 3px;
      }
      .fridge-handle::before {
        top: -10px;
      }
      .fridge-handle::after {
        bottom: -10px;
      }
      .fridge-handle:hover {
        transform: scaleX(1.15);
      }

      .door-inside {
        position: absolute;
        inset: 0;
        border-radius: 18px;
        transform: rotateY(180deg) translateZ(-1px);
        backface-visibility: hidden;
        background: linear-gradient(
          180deg,
          oklch(0.96 0.015 70) 0%,
          oklch(0.92 0.02 70) 100%
        );
        border: 1px solid var(--line-2);
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 30px 14px;
        box-shadow: inset 0 0 0 1px rgba(28, 24, 21, 0.06);
      }
      .door-bin {
        height: 58px;
        border-radius: 8px 8px 12px 12px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.85),
          rgba(255, 255, 255, 0.55)
        );
        border: 1px solid rgba(28, 24, 21, 0.08);
        position: relative;
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding: 0 6px 4px;
      }
      .door-bin::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.5),
          transparent 30%
        );
        pointer-events: none;
      }
      .bottle {
        width: 16px;
        height: 42px;
        border-radius: 5px 5px 3px 3px;
        background: linear-gradient(
          180deg,
          var(--surface) 30%,
          oklch(0.92 0.02 60) 100%
        );
        box-shadow:
          0 1px 0 rgba(28, 24, 21, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
        position: relative;
        flex: 0 0 auto;
      }
      .bottle::before {
        content: "";
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%);
        width: 7px;
        height: 5px;
        border-radius: 2px;
        background: var(--clay);
      }
      .bottle.b2::before {
        background: var(--moss);
      }
      .bottle.b3::before {
        background: var(--amber);
      }
      .bottle.b4::before {
        background: var(--rust);
      }
      .bottle.b5::before {
        background: var(--ink-2);
      }

      .fridge-feet {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: -8px;
        height: 10px;
        display: flex;
        justify-content: space-between;
        z-index: -1;
      }
      .fridge-feet span {
        width: 28px;
        height: 10px;
        border-radius: 0 0 5px 5px;
        background: linear-gradient(
          180deg,
          oklch(0.4 0.01 60),
          oklch(0.22 0.01 60)
        );
      }

      .fridge-hint {
        position: absolute;
        left: 50%;
        bottom: 6%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--paper);
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 1px;
        padding: 8px 14px;
        border-radius: 999px;
        pointer-events: none;
        animation: floatY 2.4s ease-in-out infinite;
        z-index: 3;
        text-transform: uppercase;
        box-shadow: var(--shadow);
      }
      @keyframes floatY {
        0%,
        100% {
          transform: translate(-50%, 0);
        }
        50% {
          transform: translate(-50%, -4px);
        }
      }

      /* Side rail */
      .fridge-rail {
        display: flex;
        flex-direction: column;
        gap: 18px;
        position: sticky;
        top: 32px;
      }
      .rail-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 22px;
      }
      .rail-card .label {
        margin-bottom: 14px;
        display: block;
      }
      .rail-stat-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .rail-stat .metric-num {
        font-size: 38px;
        letter-spacing: -1.2px;
      }

      .cook-card {
        background: var(--ink);
        color: var(--paper);
        border-radius: var(--r);
        padding: 24px 24px 22px;
        position: relative;
        overflow: hidden;
      }
      .cook-card-title {
        font-family: var(--serif);
        font-style: italic;
        font-size: 30px;
        letter-spacing: -0.8px;
        line-height: 1;
        margin-bottom: 8px;
      }
      .cook-card-sub {
        font-size: 13.5px;
        color: rgba(245, 241, 234, 0.6);
        line-height: 1.55;
        margin-bottom: 18px;
        max-width: 32ch;
      }
      .cook-card-btn {
        background: var(--paper);
        color: var(--ink);
        padding: 10px 18px;
        border-radius: 999px;
        font-weight: 500;
        font-size: 13.5px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .cook-card-btn:hover {
        background: var(--clay);
        color: var(--surface);
      }
      .cook-card-glyph {
        position: absolute;
        right: -30px;
        bottom: -30px;
        font-size: 160px;
        opacity: 0.08;
        font-family: var(--serif);
        font-style: italic;
        line-height: 1;
      }

      .match-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .match-row {
        display: grid;
        grid-template-columns: 36px 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 14px 0;
        border-top: 1px solid var(--line);
        cursor: pointer;
        transition: padding 0.15s;
      }
      .match-row:first-of-type {
        border-top: none;
      }
      .match-row:hover {
        padding-left: 4px;
      }
      .match-row .m-thumb {
        width: 36px;

      // ─── HOOKS ────────────────────────────────────────────────────────────────
      function useLocalStorage(key, def) {
        const [val, setVal] = useState(() => {
          try {
            const s = localStorage.getItem(key);
            return s ? JSON.parse(s) : def;
          } catch {
            return def;
          }
        });
        const set = useCallback(
          (v) => {
            const next = typeof v === "function" ? v(val) : v;
            setVal(next);
            try {
              localStorage.setItem(key, JSON.stringify(next));
            } catch {}
          },
          [key, val],
        );
        return [val, set];
      }

      function Badge({ kind, children }) {
        const cls =
          {
            safe: "badge badge-safe",
            warn: "badge badge-warn",
            danger: "badge badge-danger",
            clay: "badge badge-clay",
            neutral: "badge badge-neutral",
          }[kind] || "badge badge-neutral";
        return <span className={cls}>{children}</span>;
      }

      function Modal({ open, onClose, title, sub, children }) {
        if (!open) return null;
        return (
          <div
            className="overlay"
            onClick={(e) => {
              if (e.target === e.currentTarget) onClose();
            }}
          >
            <div className="modal">
              <button
                className="modal-close"
                onClick={onClose}
                aria-label="Close"
              >
                ✕
              </button>
              <div className="modal-title italic">{title}</div>
              {sub && <div className="modal-sub">{sub}</div>}
              {children}
            </div>
          </div>
        );
      }

      function TagInput({ value, onChange, placeholder, kind = "neutral" }) {
        const [inp, setInp] = useState("");
        const add = () => {
          const v = inp.trim().toLowerCase();
          if (v && !value.includes(v)) onChange([...value, v]);
          setInp("");
        };
        const pillCls =
          kind === "danger"
            ? "tag-pill tag-danger"
            : kind === "warn"
              ? "tag-pill tag-warn"
              : "tag-pill tag-neutral";
        return (
          <div>
            <div style={{ display: "flex", gap: 10 }}>
              <input
                className="input"
                value={inp}
                onChange={(e) => setInp(e.target.value)}
                placeholder={placeholder}
                onKeyDown={(e) => {
                  if (e.key === "Enter") {
                    e.preventDefault();
                    add();
                  }
                }}
                style={{ flex: 1 }}
              />
              <button className="btn btn-secondary btn-sm" onClick={add}>
                Добави
              </button>
            </div>
            <div className="tag-list">
              {value.map((t) => (
                <span
                  key={t}
                  className={pillCls}
                  onClick={() => onChange(value.filter((x) => x !== t))}
                >
                  {t} <span className="rm">✕</span>
                </span>
              ))}
            </div>
          </div>
        );
      }
