                      }}
                    >
                      <span
                        style={{
                          fontFamily: "var(--mono)",
                          fontSize: 10.5,
                          letterSpacing: "1px",
                          color: "var(--ink-3)",
                          minWidth: 24,
                        }}
                      >
                        {String(i + 1).padStart(2, "0")}
                      </span>
                      <span style={{ fontSize: 18 }}>{r.emoji}</span>
                      <span
                        style={{
                          flex: 1,
                          fontFamily: "var(--serif)",
                          fontStyle: "italic",
                          fontSize: 17,
                          letterSpacing: "-.3px",
                        }}
                      >
                        {L && r.nameEn ? r.nameEn : r.name}
                      </span>
                      <span
                        style={{
                          fontFamily: "var(--mono)",
                          fontSize: 10.5,
                          letterSpacing: "1px",
                          textTransform: "uppercase",
                          color: "var(--ink-3)",
                        }}
                      >
                        {r.time}
                        {L ? "m" : "мин"}
                      </span>
                    </div>
                  ))
                )}
              </div>

              <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
                <button
                  className="btn btn-primary"
                  style={{ flex: 1 }}
                  onClick={createBook}
                  disabled={selectedRecipes.length === 0}
                >
                  {L ? "Open print view" : "Отвори за печат"}{" "}
                  <span style={{ opacity: 0.6 }}>↗</span>
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={() => setSetupOpen(false)}
                >
                  {L ? "Cancel" : "Отказ"}
                </button>
              </div>
              <div
                style={{
                  marginTop: 12,
                  fontFamily: "var(--mono)",
                  fontSize: 10.5,
                  letterSpacing: ".8px",
                  color: "var(--ink-3)",
                  lineHeight: 1.4,
                }}
              >
                {L
                  ? 'Opens a print-ready cookbook in a new tab. Use your browser\'s "Save as PDF" option to export.'
                  : 'Отваря книгата в нов раздел. Използвай „Запази като PDF" от диалога за печат.'}
              </div>
            </Modal>
          </div>
        );
      }

      // ─── APP ──────────────────────────────────────────────────────────────────
      function App() {
        const [tab, setTab] = useLocalStorage("kdy_tab_v2", "home");
        const [profile, setProfile] = useLocalStorage(
          "kdy_profile_v2",
          DEFAULT_PROFILE,
        );
        const [recipes, setRecipes] = useLocalStorage(
          "kdy_recipes_v2",
          DEFAULT_RECIPES,
        );
        const [favorites, setFavorites] = useLocalStorage("kdy_favorites_v1", [
          "r1",
          "r3",
        ]);
        const toggleFavorite = (id) =>
          setFavorites(
            favorites.includes(id)
              ? favorites.filter((x) => x !== id)
              : [...favorites, id],
          );
        const [products, setProducts] = useLocalStorage(
          "kdy_products_v2",
          DEFAULT_PRODUCTS,
        );
        const [fridge, setFridge] = useLocalStorage(
          "kdy_fridge_v2",
          DEFAULT_FRIDGE,
        );
        const [tweaks, setTweaks] = useState(() => {
          try {
            const s = localStorage.getItem("kdy_tweaks_v2");
            return s ? JSON.parse(s) : TWEAK_DEFAULTS;
          } catch {
            return TWEAK_DEFAULTS;
          }
        });
        const [tweaksOpen, setTweaksOpen] = useState(false);
        const [openRecipeId, setOpenRecipeId] = useState(null);

        useEffect(() => {
          try {
            localStorage.setItem("kdy_tweaks_v2", JSON.stringify(tweaks));
          } catch {}
        }, [tweaks]);

        // Tweaks protocol — register listener BEFORE announcing availability
        useEffect(() => {
          const handler = (e) => {
            if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
            if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
            if (e.data?.type === "__edit_mode_set_keys" && e.data.edits) {
              setTweaks((t) => ({ ...t, ...e.data.edits }));
            }
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");
          return () => window.removeEventListener("message", handler);
        }, []);

        const themeClass =
          tweaks.theme === "fresh"
            ? "theme-fresh"
            : tweaks.theme === "night"
              ? "theme-night"
              : "";
        const L = tweaks.lang === "en";

        const NAV = [
          { id: "home", label: L ? "Home" : "Начало", glyph: "◐" },
          { id: "fridge", label: L ? "Fridge" : "Хладилник", glyph: "▢" },
          { id: "recipes", label: L ? "Recipes" : "Рецепти", glyph: "✦" },
          { id: "cookbook", label: L ? "Cookbook" : "Книга", glyph: "❦" },
          { id: "products", label: L ? "Products" : "Продукти", glyph: "◊" },
          { id: "profile", label: L ? "Profile" : "Профил", glyph: "◯" },
        ];

        const openRecipe = (id) => {
          setOpenRecipeId(id);
          setTab("recipes");
        };

        const screens = {
          home: (
            <HomeScreen
              profile={profile}
              recipes={recipes}
              fridge={fridge}
              setTab={setTab}
              lang={tweaks.lang}
              onOpenRecipe={openRecipe}
            />
          ),
          fridge: (
            <FridgeScreen
              fridge={fridge}
              setFridge={setFridge}
              recipes={recipes}
              profile={profile}
              lang={tweaks.lang}
              onOpenRecipe={openRecipe}
              setTab={setTab}
            />
          ),
          recipes: (
            <RecipesScreen
              recipes={recipes}
              setRecipes={setRecipes}
              profile={profile}
              fridge={fridge}
              favorites={favorites}
              toggleFavorite={toggleFavorite}
              lang={tweaks.lang}
              openRecipeId={openRecipeId}
              setOpenRecipeId={setOpenRecipeId}
            />
          ),
          cookbook: (
            <CookbookScreen
              recipes={recipes}
              favorites={favorites}
              toggleFavorite={toggleFavorite}
              profile={profile}
              lang={tweaks.lang}
              onOpenRecipe={openRecipe}
            />
          ),
          products: (
            <ProductsScreen
              products={products}
              setProducts={setProducts}
              lang={tweaks.lang}
            />
          ),
          profile: (
            <ProfileScreen
              profile={profile}
              setProfile={setProfile}
              lang={tweaks.lang}
            />
          ),
        };

        // When tab switches away from recipes, clear detail
        useEffect(() => {
          if (tab !== "recipes") setOpenRecipeId(null);
        }, [tab]);

        const userInitial = (profile.name || "К")
          .trim()
          .charAt(0)
          .toUpperCase();

        const updateTweaks = (next) => {
          setTweaks(next);
          window.parent.postMessage(
            { type: "__edit_mode_set_keys", edits: next },
            "*",
          );
        };

        return (
          <div className={`app ${themeClass}`}>
            <aside className="sidebar">
              <div className="brand">
                <span className="brand-mark">Ко-да-ям</span>
                <span className="brand-sub">
                  {L ? "for picky eaters" : "за капризни хора"}
                </span>
              </div>
              <nav className="nav">
                <div className="nav-section-label">
                  {L ? "Sections" : "Секции"}
                </div>
                {NAV.map((n, i) => (
                  <button
                    key={n.id}
                    className={`nav-item${tab === n.id ? " active" : ""}`}
                    onClick={() => setTab(n.id)}
                  >
                    <span className="nav-num">
                      {String(i + 1).padStart(2, "0")}
                    </span>
                    <span className="nav-glyph" style={{ display: "none" }}>
                      {n.glyph}
                    </span>
                    <span>{n.label}</span>
                  </button>
                ))}
              </nav>
              <div className="sidebar-footer">
                <div className="user-chip">
                  <div className="user-avatar">{userInitial}</div>
                  <div>
                    <div className="user-name">
                      {profile.name || (L ? "Guest cook" : "Гост")}
                    </div>
                    <div className="user-meta">
                      {profile.allergies.length + profile.dislikes.length}{" "}
                      {L ? "filters" : "филтри"}
                    </div>
                  </div>
                </div>
                <div className="sidebar-utility">
                  <button
                    className={tweaksOpen ? "on" : ""}
                    onClick={() => setTweaksOpen((o) => !o)}
                  >
                    Tweaks
                  </button>
                  <button
                    onClick={() =>
                      updateTweaks({
                        ...tweaks,
                        lang: tweaks.lang === "bg" ? "en" : "bg",
                      })
                    }
                  >
                    {tweaks.lang === "bg" ? "EN" : "BG"}
                  </button>
                </div>
              </div>
            </aside>

            <main className="main">
              <div className="main-inner">{screens[tab]}</div>
            </main>

            <TweaksPanel
              open={tweaksOpen}
              tweaks={tweaks}
              setTweaks={updateTweaks}
              onClose={() => {
                setTweaksOpen(false);
                try {
                  window.parent.postMessage(
                    { type: "__edit_mode_dismissed" },
                    "*",
                  );
                } catch {}
              }}
            />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
