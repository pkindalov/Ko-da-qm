<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ко-да-ям — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Warm paper neutrals */
  --paper:#F5F1EA;
  --paper-2:#EFEAE0;
  --surface:#FCFAF6;
  --ink:#1C1815;
  --ink-2:#5A4F46;
  --ink-3:#8B8278;
  --line:#E4DED2;
  --line-2:#D6CFC1;

  /* Accents — same chroma, varied hue */
  --clay:oklch(0.58 0.13 38);
  --clay-soft:oklch(0.93 0.04 38);
  --clay-deep:oklch(0.42 0.13 38);
  --moss:oklch(0.52 0.07 145);
  --moss-soft:oklch(0.93 0.03 145);
  --rust:oklch(0.50 0.16 25);
  --rust-soft:oklch(0.93 0.05 25);
  --amber:oklch(0.66 0.11 75);
  --amber-soft:oklch(0.94 0.05 75);

  --shadow-sm:0 1px 2px rgba(28,24,21,.04), 0 1px 1px rgba(28,24,21,.03);
  --shadow:0 1px 2px rgba(28,24,21,.04), 0 8px 24px -8px rgba(28,24,21,.08);
  --shadow-lg:0 4px 12px rgba(28,24,21,.06), 0 24px 48px -16px rgba(28,24,21,.16);

  --r-xs:6px;
  --r-sm:10px;
  --r:14px;
  --r-lg:20px;

  --sans:"Geist", ui-sans-serif, system-ui, sans-serif;
  --serif:"Instrument Serif", ui-serif, Georgia, serif;
  --mono:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

html, body{background:var(--paper);color:var(--ink);min-height:100dvh;overflow-x:hidden}
body{font-family:var(--sans);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"ss01","cv11"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
input:focus,textarea:focus,select:focus{outline:none}
a{color:inherit;text-decoration:none}
::selection{background:var(--clay);color:var(--surface)}

/* ── Layout ───────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100dvh}
.sidebar{
  position:sticky;top:0;align-self:start;
  height:100dvh;padding:36px 28px 24px;
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;gap:36px;
  background:var(--paper);
}
.brand{display:flex;flex-direction:column;gap:2px;line-height:1}
.brand-mark{font-family:var(--serif);font-style:italic;font-size:34px;letter-spacing:-1.5px;color:var(--ink);font-weight:400}
.brand-sub{font-family:var(--mono);font-size:10.5px;letter-spacing:0.5px;color:var(--ink-3);text-transform:uppercase;margin-top:4px}

.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav-section-label{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;color:var(--ink-3);text-transform:uppercase;padding:0 4px;margin-bottom:8px}
.nav-item{
  display:flex;align-items:center;gap:14px;
  padding:10px 4px;
  font-size:15px;font-weight:500;color:var(--ink-2);
  border-radius:0;background:none;width:100%;text-align:left;
  position:relative;transition:color .15s;
  font-family:var(--sans);
}
.nav-item:hover{color:var(--ink)}
.nav-item .nav-num{font-family:var(--mono);font-size:11px;color:var(--ink-3);width:18px}
.nav-item.active{color:var(--ink);font-weight:600}
.nav-item.active::before{
  content:"";position:absolute;left:-28px;top:50%;transform:translateY(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--clay);
}

.sidebar-footer{display:flex;flex-direction:column;gap:14px;padding-top:24px;border-top:1px solid var(--line)}
.user-chip{display:flex;align-items:center;gap:10px;padding:6px 4px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--clay-soft);color:var(--clay-deep);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;letter-spacing:-.2px}
.user-name{font-size:13.5px;font-weight:500;color:var(--ink)}
.user-meta{font-size:11.5px;color:var(--ink-3);font-family:var(--mono);letter-spacing:.2px}
.sidebar-utility{display:flex;gap:6px;font-size:12px;color:var(--ink-3);font-family:var(--mono);letter-spacing:.3px}
.sidebar-utility button{padding:4px 8px;border-radius:var(--r-xs);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3)}
.sidebar-utility button:hover{color:var(--ink);background:var(--paper-2)}
.sidebar-utility button.on{color:var(--ink);background:var(--paper-2)}

.main{padding:48px 64px 96px;min-width:0}
.main-inner{max-width:1080px;margin:0 auto}

/* ── Typography ────────────────────────────────────────────────────────── */
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;color:var(--ink-3);text-transform:uppercase}
.h-display{font-family:var(--serif);font-weight:400;font-size:clamp(56px, 7vw, 88px);line-height:0.95;letter-spacing:-2.5px;color:var(--ink)}
.h-display .it{font-style:italic;color:var(--clay-deep)}
.h-title{font-family:var(--serif);font-weight:400;font-size:48px;letter-spacing:-1.2px;line-height:1.02;color:var(--ink)}
.h-title.italic{font-style:italic}
.h-sub{font-size:17px;line-height:1.55;color:var(--ink-2);font-weight:400;max-width:48ch}
.section-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.section-eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
.label{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--ink-3);text-transform:uppercase}

/* ── Buttons ─────────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:999px;font-size:14px;font-weight:500;font-family:var(--sans);
  letter-spacing:-.1px;border:1px solid transparent;cursor:pointer;
  transition:transform .12s ease, background .15s, color .15s, border-color .15s;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--ink);color:var(--paper)}
.btn-primary:hover{background:var(--clay-deep)}
.btn-secondary{background:var(--surface);color:var(--ink);border-color:var(--line-2)}
.btn-secondary:hover{border-color:var(--ink-2)}
.btn-ghost{color:var(--ink-2);padding:8px 14px}
.btn-ghost:hover{color:var(--ink);background:var(--paper-2)}
.btn-danger{background:var(--rust-soft);color:var(--rust)}
.btn-danger:hover{background:var(--rust);color:var(--surface)}
.btn-sm{padding:7px 14px;font-size:12.5px}
.btn-xs{padding:4px 10px;font-size:11.5px;border-radius:999px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2)}
.btn-icon:hover{color:var(--ink);border-color:var(--ink-2)}
.btn-full{width:100%}

/* ── Badges & chips ───────────────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;
  border-radius:999px;font-weight:500;
}
.badge-safe{background:var(--moss-soft);color:var(--moss)}
.badge-warn{background:var(--amber-soft);color:var(--amber)}
.badge-danger{background:var(--rust-soft);color:var(--rust)}
.badge-clay{background:var(--clay-soft);color:var(--clay-deep)}
.badge-neutral{background:var(--paper-2);color:var(--ink-2)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-safe{background:var(--moss)}.dot-warn{background:var(--amber)}.dot-danger{background:var(--rust)}.dot-clay{background:var(--clay)}

.chip{
  padding:7px 14px;border-radius:999px;font-size:13px;font-weight:500;
  border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);
  cursor:pointer;transition:all .12s;
}
.chip:hover{border-color:var(--ink-2);color:var(--ink)}
.chip.selected{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.sel-danger{background:var(--rust);color:var(--surface);border-color:var(--rust)}
.chip.sel-warn{background:var(--amber);color:var(--surface);border-color:var(--amber)}

/* ── Cards ───────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:24px}
.card-flat{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.card-bare{padding:0}

/* ── Inputs ──────────────────────────────────────────────────────────── */
.input{
  width:100%;padding:11px 14px;
  background:var(--surface);border:1px solid var(--line-2);
  border-radius:var(--r-sm);font-size:14px;color:var(--ink);font-family:var(--sans);
  transition:border .15s, box-shadow .15s;
}
.input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(28,24,21,.06)}
.input::placeholder{color:var(--ink-3)}
.input-label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}

.search{position:relative}
.search .input{padding-left:38px;background:var(--surface);border-radius:999px}
.search-glyph{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none;font-size:13px}

/* ── Recipe card ─────────────────────────────────────────────────────── */
.recipe-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  overflow:hidden;cursor:pointer;transition:all .18s ease;
  display:flex;flex-direction:column;position:relative;
}
.recipe-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line-2)}
.recipe-card.flagged{background:var(--rust-soft);border-color:rgba(180,60,40,.18)}
.recipe-image{
  position:relative;aspect-ratio:4/3;background:var(--paper-2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.recipe-image-emoji{font-size:64px;filter:saturate(.95);transition:transform .3s}
.recipe-card:hover .recipe-image-emoji{transform:scale(1.06)}
.recipe-image-stripes{
  position:absolute;inset:0;
  background:repeating-linear-gradient(135deg, transparent 0 12px, rgba(28,24,21,.025) 12px 13px);
  pointer-events:none;
}
.recipe-image-label{
  position:absolute;left:12px;bottom:10px;
  font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;
  color:var(--ink-3);opacity:.7;
}
.recipe-body{padding:18px 20px 22px;display:flex;flex-direction:column;gap:6px;flex:1}
.recipe-name{font-family:var(--serif);font-size:24px;line-height:1.05;letter-spacing:-.6px;color:var(--ink)}
.recipe-name.italic{font-style:italic}
.recipe-meta{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.4px;text-transform:uppercase}
.recipe-tags{margin-top:auto;padding-top:14px;display:flex;gap:6px;flex-wrap:wrap}

/* ── Stats / metric strips ───────────────────────────────────────────── */
.metric{display:flex;flex-direction:column;gap:4px}
.metric-num{font-family:var(--serif);font-size:56px;letter-spacing:-2px;line-height:0.9;color:var(--ink)}
.metric-num.italic{font-style:italic}
.metric-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3)}

/* ── Tag input ───────────────────────────────────────────────────────── */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px 5px 12px;border-radius:999px;font-size:12.5px;font-weight:500;
  cursor:pointer;transition:opacity .15s;
}
.tag-pill .rm{font-family:var(--mono);font-size:10px;opacity:.5}
.tag-pill:hover .rm{opacity:1}
.tag-danger{background:var(--rust-soft);color:var(--rust)}
.tag-warn{background:var(--amber-soft);color:var(--amber)}
.tag-neutral{background:var(--paper-2);color:var(--ink-2)}

/* ── Modal ───────────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(28,24,21,.35);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:overlay .2s ease}
@keyframes overlay{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:var(--r-lg);
  width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;
  position:relative;padding:36px 32px 30px;
  box-shadow:var(--shadow-lg);animation:modal .25s cubic-bezier(.2,.9,.3,1.1);
}
@keyframes modal{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.modal-title{font-family:var(--serif);font-size:32px;letter-spacing:-1px;line-height:1.05;margin-bottom:6px}
.modal-title.italic{font-style:italic}
.modal-sub{font-size:14px;color:var(--ink-2);margin-bottom:22px}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--paper-2);color:var(--ink-2);display:flex;align-items:center;justify-content:center;font-size:14px}
.modal-close:hover{background:var(--line-2);color:var(--ink)}

/* ── Detail view ─────────────────────────────────────────────────────── */
.detail-back{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);padding:6px 0;margin-bottom:24px;display:inline-flex;align-items:center;gap:8px}
.detail-back:hover{color:var(--ink)}
.detail-hero{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:end;margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid var(--line)}
.detail-image{
  aspect-ratio:1/1;background:var(--paper-2);border-radius:var(--r-lg);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.detail-image .recipe-image-stripes{background:repeating-linear-gradient(135deg, transparent 0 16px, rgba(28,24,21,.03) 16px 17px)}
.detail-image-emoji{font-size:160px}
.detail-head .h-title{margin:8px 0 16px}
.step-grid{display:grid;grid-template-columns:1fr;gap:0}
.step{display:grid;grid-template-columns:64px 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--line)}
.step:last-child{border-bottom:1px solid var(--line)}
.step-num{font-family:var(--serif);font-style:italic;font-size:42px;letter-spacing:-1px;color:var(--clay-deep);line-height:0.9}
.step-text{font-size:15.5px;color:var(--ink);line-height:1.55;padding-top:8px}
.ing-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);font-size:14.5px}
.ing-row:last-child{border-bottom:1px solid var(--line)}
.ing-row .ing-name{flex:1}
.ing-row.blocked .ing-name{color:var(--rust);text-decoration:line-through}

/* ── Empty state ─────────────────────────────────────────────────────── */
.empty{text-align:center;padding:64px 24px;color:var(--ink-3)}
.empty-glyph{font-size:56px;margin-bottom:14px;opacity:.6}
.empty-title{font-family:var(--serif);font-size:24px;letter-spacing:-.5px;color:var(--ink);margin-bottom:6px;font-style:italic}
.empty-sub{font-size:14px;max-width:38ch;margin:0 auto}

/* ── Product row ─────────────────────────────────────────────────────── */
.product-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;background:var(--surface);
  border-top:1px solid var(--line);transition:background .12s;
}
.product-row:last-child{border-bottom:1px solid var(--line)}
.product-row:hover{background:var(--paper-2)}
.product-row .p-emoji{font-size:24px;width:32px;text-align:center}
.product-row .p-name{flex:1;font-size:14.5px;font-weight:500}
.product-row .p-cat{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.8px;text-transform:uppercase;min-width:90px}

/* ── Tweaks panel ────────────────────────────────────────────────────── */
.tweaks{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:22px;width:280px;box-shadow:var(--shadow-lg);z-index:200;
  display:none;animation:tweaksIn .2s ease;
}
@keyframes tweaksIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tweaks.open{display:block}
.tweaks-title{font-family:var(--serif);font-style:italic;font-size:22px;letter-spacing:-.5px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.tweaks-close{width:26px;height:26px;border-radius:50%;background:var(--paper-2);color:var(--ink-2);font-size:13px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:var(--sans);font-style:normal}
.tweaks-close:hover{background:var(--ink);color:var(--paper)}
.tweak-row{margin-bottom:16px}
.tweak-label{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;display:block}
.seg{display:inline-flex;background:var(--paper-2);border-radius:999px;padding:3px;gap:0}
.seg-btn{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;color:var(--ink-2);transition:all .12s}
.seg-btn.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

/* ── Detail ingredient blocks ────────────────────────────────────────── */
.fade-in{animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Theme variants ──────────────────────────────────────────────────── */
.theme-fresh{
  --paper:#F0F2EE;--paper-2:#E5E9E0;--surface:#FAFBF8;--line:#DDE2D6;--line-2:#CDD3C3;
  --ink:#13201A;--ink-2:#3D4A41;--ink-3:#7C8779;
  --clay:oklch(0.52 0.10 165);--clay-soft:oklch(0.93 0.04 165);--clay-deep:oklch(0.38 0.10 165);
}
.theme-night{
  --paper:#15110E;--paper-2:#1F1A14;--surface:#241D17;
  --line:#3A3025;--line-2:#4A3F33;
  --ink:#F4ECDF;--ink-2:#B5A892;--ink-3:#7E7361;
  --clay:oklch(0.72 0.13 38);--clay-soft:oklch(0.32 0.08 38);--clay-deep:oklch(0.80 0.12 38);
}

/* ── Top bar ─────────────────────────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:48px;gap:24px;
}
.topbar .breadcrumb{font-family:var(--mono);font-size:11px;letter-spacing:1.2px;color:var(--ink-3);text-transform:uppercase}
.topbar .breadcrumb span{color:var(--ink)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.topbar-date{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.8px}

/* ── Two-column hero ─────────────────────────────────────────────────── */
.hero-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end;margin-bottom:72px}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.hero-stat-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:22px 22px 20px;display:flex;flex-direction:column;gap:8px;
  transition:all .15s;
}
.hero-stat-card:hover{border-color:var(--line-2)}
.hero-stat-num{font-family:var(--serif);font-size:48px;letter-spacing:-1.5px;line-height:0.9}
.hero-stat-num.italic{font-style:italic}
.hero-stat-num.clay{color:var(--clay-deep)}
.hero-stat-num.rust{color:var(--rust)}
.hero-stat-num.amber{color:var(--amber)}
.hero-stat-num.moss{color:var(--moss)}
.hero-stat-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3)}

/* ── Grid sizing ─────────────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3, 1fr);gap:18px}
.grid-4{display:grid;grid-template-columns:repeat(4, 1fr);gap:16px}

.divider{height:1px;background:var(--line);margin:48px 0}

/* ── Page header ─────────────────────────────────────────────────────── */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--line)}
.page-head .h-title{margin-bottom:4px}
.page-head-sub{font-size:14.5px;color:var(--ink-2);max-width:42ch}

/* ── Allergy banner ──────────────────────────────────────────────────── */
.alert-banner{
  display:flex;align-items:center;gap:14px;padding:14px 20px;
  background:var(--rust-soft);border-radius:var(--r);
  border:1px solid rgba(180,60,40,.15);margin-bottom:32px;
}
.alert-banner .dot{flex-shrink:0}
.alert-banner-text{flex:1;font-size:13.5px;color:var(--rust);font-weight:500}
.alert-banner-tags{display:flex;gap:6px;flex-wrap:wrap}

/* ── Fridge section ──────────────────────────────────────────────────── */
.fridge-stage{
  display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:40px;
  align-items:start;margin-top:8px;
}
.fridge-room{
  position:relative;
  background:
    radial-gradient(60% 50% at 50% 25%, rgba(255,255,255,.55), transparent 70%),
    linear-gradient(180deg, var(--paper-2) 0%, var(--paper) 100%);
  border:1px solid var(--line);border-radius:var(--r-lg);
  padding:28px 28px 44px;min-height:760px;overflow:hidden;
}
.fridge-room::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:30%;
  background:
    linear-gradient(180deg, transparent 0%, rgba(28,24,21,.05) 100%),
    repeating-linear-gradient(115deg, var(--paper-2) 0 32px, var(--paper) 32px 64px);
  transform:perspective(900px) rotateX(60deg);
  transform-origin:bottom center;
  border-top:1px solid var(--line);
  z-index:0;
}
.fridge-room.is-open::before{
  content:"";position:absolute;left:50%;bottom:14%;width:520px;height:140px;
  transform:translateX(-50%);
  background:radial-gradient(closest-side, oklch(0.86 0.10 75 / .45), transparent 70%);
  filter:blur(10px);pointer-events:none;z-index:1;
}

.fridge-toolbar{
  position:relative;z-index:2;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;flex-wrap:wrap;gap:10px;
}
.fridge-status{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--ink-2);
  background:var(--surface);border:1px solid var(--line);
  padding:7px 14px;border-radius:999px;
}
.fridge-status .led{width:6px;height:6px;border-radius:50%;background:var(--moss);box-shadow:0 0 0 3px rgba(80,130,90,.18)}
.fridge-status.open .led{background:var(--amber);box-shadow:0 0 0 3px rgba(220,160,40,.18);animation:fridgeBlink 1.4s infinite}
@keyframes fridgeBlink{0%,100%{opacity:1}50%{opacity:.4}}

.fridge-3d-wrap{
  position:relative;z-index:2;
  perspective:2200px;perspective-origin:50% 40%;
  min-height:610px;
  display:flex;align-items:center;justify-content:center;
}
.fridge-3d{
  position:relative;width:380px;height:580px;
  transform-style:preserve-3d;
  filter:drop-shadow(0 30px 30px rgba(28,24,21,.18));
}

/* Cabinet body */
.fridge-cabinet{
  position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(180deg, oklch(0.92 0.01 60) 0%, oklch(0.84 0.015 60) 100%);
  border:1px solid var(--line-2);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.5),
    inset 0 -30px 60px rgba(28,24,21,.05);
}

/* Interior */
.fridge-interior{
  position:absolute;inset:10px;border-radius:12px;overflow:hidden;
  background:linear-gradient(180deg, oklch(0.96 0.015 70) 0%, oklch(0.92 0.02 70) 100%);
  box-shadow:
    inset 0 0 0 1px rgba(28,24,21,.05),
    inset 0 30px 50px rgba(28,24,21,.08);
}
.fridge-interior::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(120% 60% at 50% -20%, oklch(0.92 0.12 75 / .8), transparent 70%);
  opacity:0;transition:opacity .8s ease .2s;
  mix-blend-mode:multiply;
}
.fridge-3d.open .fridge-interior::before{opacity:.9}

/* Shelves */
.fridge-shelves{position:absolute;inset:0;padding:18px 12px 16px;display:flex;flex-direction:column;gap:4px}
.fridge-freezer{
  position:relative;height:118px;
  border:1px solid rgba(28,24,21,.08);border-radius:10px;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.7), transparent 40%),
    radial-gradient(circle at 75% 60%, rgba(255,255,255,.5), transparent 40%),
    linear-gradient(180deg, oklch(0.96 0.02 220 / .8), oklch(0.92 0.03 220 / .5));
  padding:18px 6px 6px;display:flex;align-items:flex-end;gap:5px;flex-wrap:nowrap;overflow:hidden;
}
.fridge-shelf-row{
  flex:1;position:relative;
  border-bottom:1px solid oklch(0.85 0.02 60);
  display:flex;align-items:flex-end;gap:5px;
  padding:18px 6px 4px;overflow:hidden;
}
.fridge-shelf-row:last-child{border-bottom:none}
.fridge-shelf-row::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:5px;
  background:linear-gradient(180deg, rgba(255,255,255,.8), transparent);
  pointer-events:none;
}
.shelf-tag{
  position:absolute;top:5px;left:8px;
  font-family:var(--mono);font-size:8.5px;letter-spacing:1.2px;
  color:var(--ink-3);text-transform:uppercase;
  pointer-events:none;opacity:.85;
}

/* Products */
.fridge-product{
  position:relative;flex:0 0 auto;
  width:40px;height:60px;
  border-radius:7px 7px 3px 3px;
  background:linear-gradient(180deg, var(--surface) 0%, oklch(0.92 0.02 60) 100%);
  border:1px solid rgba(28,24,21,.10);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:3px 2px 4px;cursor:pointer;user-select:none;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.9),
    0 3px 0 rgba(28,24,21,.05),
    0 7px 8px rgba(28,24,21,.06);
  transition:transform .15s, box-shadow .15s, opacity .2s;
}
.fridge-product:hover{transform:translateY(-3px);box-shadow:0 6px 0 rgba(28,24,21,.06), 0 12px 16px rgba(28,24,21,.12)}
.fridge-product.tall{height:76px}
.fridge-product.short{height:48px}
.fridge-product.wide{width:56px}
.fridge-product .e{font-size:22px;line-height:1;margin-bottom:1px;filter:drop-shadow(0 1px 0 rgba(0,0,0,.06))}
.fridge-product .l{
  font-family:var(--sans);font-size:8px;font-weight:600;letter-spacing:.2px;
  color:var(--ink);max-width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-transform:uppercase;line-height:1;
}
.fridge-product .rm{
  position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;
  background:var(--rust);color:#fff;
  display:none;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;border:2px solid var(--paper);
}
.fridge-product:hover .rm{display:flex}
.fridge-product.flagged{outline:1.5px solid var(--rust);outline-offset:1px}
.fridge-product.fading{opacity:0;transform:scale(.8)}

/* Tints */
.tint-milk{background:linear-gradient(180deg, var(--surface) 0%, oklch(0.93 0.015 220) 100%)}
.tint-egg{background:linear-gradient(180deg, oklch(0.97 0.04 80) 0%, oklch(0.88 0.08 80) 100%)}
.tint-cheese{background:linear-gradient(180deg, oklch(0.96 0.05 90) 0%, oklch(0.82 0.10 80) 100%)}
.tint-veg{background:linear-gradient(180deg, oklch(0.95 0.03 145) 0%, oklch(0.82 0.07 145) 100%)}
.tint-meat{background:linear-gradient(180deg, oklch(0.93 0.04 25) 0%, oklch(0.78 0.10 25) 100%)}
.tint-fruit{background:linear-gradient(180deg, oklch(0.94 0.05 30) 0%, oklch(0.82 0.10 30) 100%)}
.tint-jar{background:linear-gradient(180deg, oklch(0.93 0.02 60) 0%, oklch(0.82 0.04 60) 100%)}
.tint-frozen{background:linear-gradient(180deg, oklch(0.96 0.02 220) 0%, oklch(0.82 0.05 220) 100%)}
.tint-grain{background:linear-gradient(180deg, oklch(0.94 0.04 65) 0%, oklch(0.80 0.08 50) 100%)}

/* Add slot */
.fridge-slot{
  flex:0 0 auto;width:40px;height:42px;border-radius:7px;
  border:1px dashed rgba(28,24,21,.22);background:rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--ink-3);cursor:pointer;
  transition:all .12s;
}
.fridge-slot:hover{border-color:var(--clay-deep);color:var(--clay-deep);background:var(--clay-soft);border-style:solid}

/* Door */
.fridge-door-wrap{position:absolute;inset:0;transform-style:preserve-3d;perspective:1600px;pointer-events:none}
.fridge-door{
  position:absolute;inset:0;border-radius:18px;pointer-events:auto;
  transform-origin:left center;transform:rotateY(0deg);
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.62,-0.02,.27,1);
  background:linear-gradient(180deg, oklch(0.92 0.01 60) 0%, oklch(0.84 0.015 60) 100%);
  border:1px solid var(--line-2);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.5),
    inset 0 -30px 60px rgba(28,24,21,.06),
    0 12px 28px rgba(28,24,21,.14);
  cursor:pointer;
}
.fridge-3d.open .fridge-door{transform:rotateY(-118deg)}

.door-display{
  position:absolute;top:28px;left:24px;right:54px;height:46px;border-radius:8px;
  background:linear-gradient(180deg, oklch(0.20 0.01 60) 0%, oklch(0.26 0.015 60) 100%);
  color:oklch(0.88 0.10 75);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  box-shadow:inset 0 0 14px rgba(0,0,0,.4);
  font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:1.2px;
  backface-visibility:hidden;
}
.door-display .temp{font-family:var(--serif);font-style:italic;font-size:20px;letter-spacing:-.5px;line-height:1;color:oklch(0.94 0.10 75)}
.door-brand{
  position:absolute;left:0;right:0;bottom:124px;text-align:center;
  font-family:var(--serif);font-style:italic;font-size:30px;letter-spacing:-1px;
  color:rgba(28,24,21,.22);pointer-events:none;
  backface-visibility:hidden;
}
.door-brand-sub{
  position:absolute;left:0;right:0;bottom:98px;text-align:center;
  font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(28,24,21,.28);pointer-events:none;
  backface-visibility:hidden;
}

.fridge-handle{
  position:absolute;top:90px;bottom:90px;right:18px;width:10px;
  border-radius:6px;
  background:linear-gradient(90deg, oklch(0.42 0.01 60), oklch(0.28 0.01 60) 40%, oklch(0.42 0.01 60));
  box-shadow:0 0 0 3px rgba(0,0,0,.04), inset 0 1px 0 rgba(255,255,255,.25), inset 0 -1px 0 rgba(0,0,0,.25);
  cursor:pointer;transition:transform .2s;
  backface-visibility:hidden;
}
.fridge-handle::before,.fridge-handle::after{
  content:"";position:absolute;left:50%;transform:translateX(-50%);width:18px;height:12px;
  background:linear-gradient(180deg, oklch(0.42 0.01 60), oklch(0.28 0.01 60));border-radius:3px;
}
.fridge-handle::before{top:-10px}
.fridge-handle::after{bottom:-10px}
.fridge-handle:hover{transform:scaleX(1.15)}

.door-inside{
  position:absolute;inset:0;border-radius:18px;
  transform:rotateY(180deg) translateZ(-1px);
  backface-visibility:hidden;
  background:linear-gradient(180deg, oklch(0.96 0.015 70) 0%, oklch(0.92 0.02 70) 100%);
  border:1px solid var(--line-2);
  display:flex;flex-direction:column;gap:14px;padding:30px 14px;
  box-shadow:inset 0 0 0 1px rgba(28,24,21,.06);
}
.door-bin{
  height:58px;border-radius:8px 8px 12px 12px;
  background:linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.55));
  border:1px solid rgba(28,24,21,.08);
  position:relative;display:flex;align-items:flex-end;gap:4px;padding:0 6px 4px;
}
.door-bin::before{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg, rgba(255,255,255,.5), transparent 30%);pointer-events:none}
.bottle{width:16px;height:42px;border-radius:5px 5px 3px 3px;
  background:linear-gradient(180deg, var(--surface) 30%, oklch(0.92 0.02 60) 100%);
  box-shadow:0 1px 0 rgba(28,24,21,.15), inset 0 1px 0 rgba(255,255,255,.6);
  position:relative;flex:0 0 auto;
}
.bottle::before{content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:7px;height:5px;border-radius:2px;background:var(--clay)}
.bottle.b2::before{background:var(--moss)}
.bottle.b3::before{background:var(--amber)}
.bottle.b4::before{background:var(--rust)}
.bottle.b5::before{background:var(--ink-2)}

.fridge-feet{position:absolute;left:14px;right:14px;bottom:-8px;height:10px;display:flex;justify-content:space-between;z-index:-1}
.fridge-feet span{width:28px;height:10px;border-radius:0 0 5px 5px;background:linear-gradient(180deg, oklch(0.40 0.01 60), oklch(0.22 0.01 60))}

.fridge-hint{
  position:absolute;left:50%;bottom:6%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  padding:8px 14px;border-radius:999px;
  pointer-events:none;animation:floatY 2.4s ease-in-out infinite;
  z-index:3;text-transform:uppercase;
  box-shadow:var(--shadow);
}
@keyframes floatY{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-4px)}}

/* Side rail */
.fridge-rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:32px}
.rail-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.rail-card .label{margin-bottom:14px;display:block}
.rail-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.rail-stat .metric-num{font-size:38px;letter-spacing:-1.2px}

.cook-card{background:var(--ink);color:var(--paper);border-radius:var(--r);padding:24px 24px 22px;position:relative;overflow:hidden}
.cook-card-title{font-family:var(--serif);font-style:italic;font-size:30px;letter-spacing:-.8px;line-height:1.0;margin-bottom:8px}
.cook-card-sub{font-size:13.5px;color:rgba(245,241,234,.6);line-height:1.55;margin-bottom:18px;max-width:32ch}
.cook-card-btn{background:var(--paper);color:var(--ink);padding:10px 18px;border-radius:999px;font-weight:500;font-size:13.5px;display:inline-flex;align-items:center;gap:8px}
.cook-card-btn:hover{background:var(--clay);color:var(--surface)}
.cook-card-glyph{position:absolute;right:-30px;bottom:-30px;font-size:160px;opacity:.08;font-family:var(--serif);font-style:italic;line-height:1}

.match-list{display:flex;flex-direction:column;gap:0}
.match-row{display:grid;grid-template-columns:36px 1fr auto;gap:14px;align-items:center;padding:14px 0;border-top:1px solid var(--line);cursor:pointer;transition:padding .15s}
.match-row:first-of-type{border-top:none}
.match-row:hover{padding-left:4px}
.match-row .m-thumb{width:36px;height:36px;border-radius:8px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;font-size:18px}
.match-row .m-name{font-size:14px;font-weight:500;line-height:1.2}
.match-row .m-meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;color:var(--ink-3);margin-top:2px}
.match-row .m-score{font-family:var(--serif);font-style:italic;font-size:22px;letter-spacing:-.5px;color:var(--clay-deep);line-height:1}
.match-row .m-score small{font-family:var(--mono);font-style:normal;font-size:10.5px;color:var(--ink-3);letter-spacing:.4px;margin-left:2px}

.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
.picker-tile{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-sm);cursor:pointer;transition:all .12s}
.picker-tile:hover{background:var(--surface);border-color:var(--ink-2)}
.picker-tile .e{font-size:24px}
.picker-tile .n{font-size:11.5px;font-weight:500;color:var(--ink-2)}

@media(max-width:1080px){
  .fridge-stage{grid-template-columns:1fr;gap:24px}
  .fridge-rail{position:static}
}
@media(max-width:520px){
  .fridge-3d{transform:scale(.82)}
  .fridge-room{padding:18px 14px 36px;min-height:660px}
}

/* ── Responsive ──────────────────────────────────────────────────────── */
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;top:auto;
    height:auto;flex-direction:row;
    padding:10px 14px;border-right:none;border-top:1px solid var(--line);
    z-index:100;gap:8px;background:var(--surface);
    overflow-x:auto;
  }
  .brand,.sidebar-footer,.nav-section-label{display:none}
  .nav{flex-direction:row;flex:1;gap:0;justify-content:space-around}
  .nav-item{flex-direction:column;gap:4px;padding:6px 8px;font-size:11px;text-align:center;color:var(--ink-3)}
  .nav-item.active::before{display:none}
  .nav-item.active{color:var(--clay-deep)}
  .nav-item .nav-num{display:none}
  .nav-glyph{font-size:18px}
  .main{padding:28px 20px 100px}
  .hero-grid{grid-template-columns:1fr;gap:36px}
  .detail-hero{grid-template-columns:1fr;gap:20px}
  .grid-3{grid-template-columns:1fr 1fr}
  .grid-4{grid-template-columns:1fr 1fr}
  .h-display{font-size:56px;letter-spacing:-1.8px}
}
@media(max-width:520px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .hero-stats{grid-template-columns:1fr 1fr}
  .topbar{flex-wrap:wrap}
  .main{padding:24px 16px 96px}
}
</style>

// ─── HOOKS ────────────────────────────────────────────────────────────────
function useLocalStorage(key, def) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; }
    catch { return def; }
  });
  const set = useCallback(v => {
    const next = typeof v === 'function' ? v(val) : v;
    setVal(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
  }, [key, val]);
  return [val, set];
}

// ─── UI ATOMS ─────────────────────────────────────────────────────────────
function Badge({ kind, children }) {
  const cls = {
    safe: 'badge badge-safe',
    warn: 'badge badge-warn',
    danger: 'badge badge-danger',
    clay: 'badge badge-clay',
    neutral: 'badge badge-neutral',
  }[kind] || 'badge badge-neutral';
  return <span className={cls}>{children}</span>;
}

function Modal({ open, onClose, title, sub, children }) {
  if (!open) return null;
  return (
    <div className="overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <button className="modal-close" onClick={onClose} aria-label="Close">✕</button>
        <div className="modal-title italic">{title}</div>
        {sub && <div className="modal-sub">{sub}</div>}
        {children}
      </div>
    </div>
  );
}

function TagInput({ value, onChange, placeholder, kind = 'neutral' }) {
  const [inp, setInp] = useState('');
  const add = () => {
    const v = inp.trim().toLowerCase();
    if (v && !value.includes(v)) onChange([...value, v]);
    setInp('');
  };
  const pillCls = kind === 'danger' ? 'tag-pill tag-danger' : kind === 'warn' ? 'tag-pill tag-warn' : 'tag-pill tag-neutral';
  return (
    <div>
      <div style={{ display: 'flex', gap: 10 }}>
        <input
          className="input"
          value={inp}
          onChange={(e) => setInp(e.target.value)}
          placeholder={placeholder}
          onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); add(); } }}
          style={{ flex: 1 }}
        />
        <button className="btn btn-secondary btn-sm" onClick={add}>Добави</button>
      </div>
      <div className="tag-list">
        {value.map((t) => (
          <span key={t} className={pillCls} onClick={() => onChange(value.filter((x) => x !== t))}>
            {t} <span className="rm">✕</span>
          </span>
        ))}
      </div>
    </div>
  );
}

// ─── RECIPE CARD ──────────────────────────────────────────────────────────
function RecipeCard({ recipe, blocked, onClick, lang }) {
  const L = lang === 'en';
  const flagged = recipe.requiredIngredients?.some((i) =>
    blocked.some((b) => i.toLowerCase().includes(b))
  );
  const displayName = L && recipe.nameEn ? recipe.nameEn : recipe.name;
  return (
    <article className={`recipe-card${flagged ? ' flagged' : ''}`} onClick={onClick}>
      <div className="recipe-image">
        <div className="recipe-image-stripes" />
        <div className="recipe-image-emoji">{recipe.emoji}</div>
        <div className="recipe-image-label">PHOTO · {recipe.time}MIN</div>
      </div>
      <div className="recipe-body">
        <div className="recipe-name italic">{displayName}</div>
        <div className="recipe-meta">{recipe.tags?.[0] || (L ? 'recipe' : 'рецепта')} · {recipe.time} {L ? 'min' : 'мин'}</div>
        <div className="recipe-tags">
          {flagged
            ? <Badge kind="danger"><span className="dot dot-danger" /> {L ? 'check' : 'провери'}</Badge>
            : <Badge kind="safe"><span className="dot dot-safe" /> {L ? 'safe' : 'безопасно'}</Badge>}
          {recipe.isAI && <Badge kind="clay">AI</Badge>}
        </div>
      </div>
    </article>
  );
}

function RecipesScreen({ recipes, setRecipes, profile, lang, openRecipeId, setOpenRecipeId }) {
  const L = lang === 'en';
  const [search, setSearch] = useState('');
  const [filterSafe, setFilterSafe] = useState(false);
  const [addOpen, setAddOpen] = useState(false);
  const [newR, setNewR] = useState({ name: '', emoji: '🍽', time: '', ingredients: '', steps: '' });

  const blocked = [...profile.allergies, ...profile.dislikes];
  const isSafe = (r) => !r.requiredIngredients?.some((i) => blocked.some((b) => i.toLowerCase().includes(b)));

  const filtered = recipes.filter((r) => {
    const n = L && r.nameEn ? r.nameEn : r.name;
    return n.toLowerCase().includes(search.toLowerCase()) && (!filterSafe || isSafe(r));
  });

  const saveRecipe = () => {
    if (!newR.name.trim()) return;
    const ings = newR.ingredients.split('\n').filter(Boolean);
    const r = {
      id: 'r' + Date.now(),
      name: newR.name,
      emoji: newR.emoji || '🍽',
      ingredients: ings,
      steps: newR.steps.split('\n').filter(Boolean),
      time: parseInt(newR.time) || 15,
      tags: [],
      isAI: false,
      requiredIngredients: ings.map((i) => i.split(' ').slice(1).join(' ') || i),
    };
    setRecipes([...recipes, r]);
    setNewR({ name: '', emoji: '🍽', time: '', ingredients: '', steps: '' });
    setAddOpen(false);
  };

        </div>
      )}

      <Modal open={addOpen} onClose={() => setAddOpen(false)} title={L ? 'A new recipe' : 'Нова рецепта'} sub={L ? 'Write it down before you forget.' : 'Запиши я преди да забравиш.'}>
        <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
          <div style={{ flex: 1 }}>
            <label className="input-label">{L ? 'Name' : 'Название'}</label>
            <input className="input" value={newR.name} onChange={(e) => setNewR({ ...newR, name: e.target.value })} placeholder={L ? 'Recipe name' : 'Името на рецептата'} />
          </div>
          <div style={{ width: 80 }}>
            <label className="input-label">Emoji</label>
            <input className="input" value={newR.emoji} onChange={(e) => setNewR({ ...newR, emoji: e.target.value })} style={{ textAlign: 'center', fontSize: 22 }} />
          </div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label className="input-label">{L ? 'Time (min)' : 'Време (мин)'}</label>
          <input className="input" type="number" value={newR.time} onChange={(e) => setNewR({ ...newR, time: e.target.value })} placeholder="15" />
        </div>
        <div style={{ marginBottom: 14 }}>
          <label className="input-label">{L ? 'Ingredients · one per line' : 'Съставки · по една на ред'}</label>
          <textarea className="input" rows={4} value={newR.ingredients} onChange={(e) => setNewR({ ...newR, ingredients: e.target.value })} placeholder={'3 яйца\n50г кашкавал'} />
        </div>
        <div style={{ marginBottom: 22 }}>
          <label className="input-label">{L ? 'Steps · one per line' : 'Стъпки · по една на ред'}</label>
          <textarea className="input" rows={4} value={newR.steps} onChange={(e) => setNewR({ ...newR, steps: e.target.value })} placeholder={'Разбий яйцата\nЗагрей тигана'} />
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={saveRecipe}>{L ? 'Save recipe' : 'Запази'}</button>
          <button className="btn btn-ghost" onClick={() => setAddOpen(false)}>{L ? 'Cancel' : 'Отказ'}</button>
        </div>
      </Modal>
    </div>
  );
}

// ─── FRIDGE ───────────────────────────────────────────────────────────────
function FridgeScreen({ fridge, setFridge, recipes, profile, lang, onOpenRecipe, setTab }) {
  const L = lang === 'en';
  const [open, setOpen] = useState(true);
  const [pickerShelf, setPickerShelf] = useState(null);
  const [removing, setRemoving] = useState({});
  const [customOpen, setCustomOpen] = useState(false);
  const [custom, setCustom] = useState({ name: '', emoji: '📦', shelf: 2, tint: 'jar', kind: '', expires: 7 });

  const blocked = useMemo(() => [...profile.allergies, ...profile.dislikes], [profile]);

  const byShelf = useMemo(() => {
    const m = [[], [], [], [], []];
    fridge.forEach((it) => { if (m[it.shelf] != null) m[it.shelf].push(it); });
    return m;
  }, [fridge]);

  const removeItem = (id) => {
    setRemoving((r) => ({ ...r, [id]: true }));
    setTimeout(() => {
      setFridge(fridge.filter((f) => f.id !== id));
      setRemoving((r) => { const next = { ...r }; delete next[id]; return next; });
    }, 220);
  };

  const addItem = (template, shelfOverride) => {
    const item = {
      id: 'f' + Date.now() + Math.random().toString(36).slice(2, 6),
      name: template.name, nameEn: template.nameEn,
      emoji: template.emoji,
      shelf: shelfOverride != null ? shelfOverride : template.shelf,
      tint: template.tint || 'jar', kind: template.kind || '',
      expires: template.expires,
    };
    setFridge([...fridge, item]);
    setOpen(true);
  };

  const addCustom = () => {
    if (!custom.name.trim()) return;
    addItem({ name: custom.name.trim(), nameEn: custom.name.trim(), emoji: custom.emoji || '📦', shelf: custom.shelf, tint: custom.tint, kind: '', expires: parseInt(custom.expires) || 7 });
    setCustom({ name: '', emoji: '📦', shelf: 2, tint: 'jar', kind: '', expires: 7 });
    setCustomOpen(false);
    setPickerShelf(null);
  };

  const existingNames = new Set(fridge.map((f) => f.name.toLowerCase()));

  // Recipe matches against fridge inventory
  const fridgeLow = fridge.map((f) => f.name.toLowerCase());
  const matchesIng = (i) => fridgeLow.some((f) => f.includes(i.toLowerCase()) || i.toLowerCase().includes(f));
  const isBlockedIng = (i) => blocked.some((b) => i.toLowerCase().includes(b));
  const recipeMatches = recipes
    .filter((r) => !r.requiredIngredients?.some(isBlockedIng))
    .map((r) => {
      const matched = (r.requiredIngredients || []).filter(matchesIng).length;
      const total = (r.requiredIngredients || []).length || 1;
      return { ...r, matchedCount: matched, totalCount: total, matchScore: matched / total };
    })
    .filter((r) => r.matchScore > 0)
    .sort((a, b) => b.matchScore - a.matchScore)
    .slice(0, 5);

  const expiringSoon = fridge.filter((f) => f.expires <= 3).length;

  const renderProduct = (it) => {
    const flagged = blocked.some((b) => it.name.toLowerCase().includes(b) || (it.nameEn && it.nameEn.toLowerCase().includes(b)));
    const label = L && it.nameEn ? it.nameEn : it.name;
    return (
      <div
        key={it.id}
        className={`fridge-product tint-${it.tint || 'jar'} ${it.kind || ''}${flagged ? ' flagged' : ''}${removing[it.id] ? ' fading' : ''}`}
        onClick={(e) => { e.stopPropagation(); removeItem(it.id); }}
        title={`${label} · ${it.expires}${L ? 'd' : 'дн'}`}
      >
        <span className="e">{it.emoji}</span>
        <span className="l">{label.length > 8 ? label.slice(0, 7) + '…' : label}</span>
        <span className="rm">✕</span>
      </div>
    );
  };

  return (
    <div className="fade-in">
      <div className="topbar">
        <div className="breadcrumb">{L ? 'Kitchen' : 'Кухня'} <span>/ {L ? 'Fridge' : 'Хладилник'}</span></div>
        <div className="topbar-actions">
          <button className="btn btn-secondary btn-sm" onClick={() => setCustomOpen(true)}>+ {L ? 'Custom item' : 'Свой продукт'}</button>
        </div>
      </div>

      <div className="page-head">
        <div>
          <div className="eyebrow" style={{ marginBottom: 12 }}>{L ? 'What\'s inside' : 'Какво е вътре'}</div>
          <h1 className="h-title italic">{L ? 'Fridge' : 'Хладилник'}</h1>
          <div className="page-head-sub" style={{ marginTop: 8 }}>
            {L
              ? 'Tap the door to open. Click any product to take it out, or use a plus to put something new in.'
              : 'Натисни вратата, за да отвориш. Натисни продукт, за да го извадиш, или плюс, за да добавиш нещо.'}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 28 }}>
          <div className="metric"><div className="metric-num italic" style={{ fontSize: 44 }}>{fridge.length}</div><div className="metric-label">{L ? 'items' : 'продукта'}</div></div>
          <div className="metric"><div className="metric-num italic" style={{ fontSize: 44, color: 'var(--rust)' }}>{expiringSoon}</div><div className="metric-label">{L ? 'expiring' : 'изтичат'}</div></div>
        </div>
      </div>

      <div className="fridge-stage">
        <div className={`fridge-room${open ? ' is-open' : ''}`}>
          <div className="fridge-toolbar">
            <span className={`fridge-status${open ? ' open' : ''}`}>
              <span className="led" />
              {open ? (L ? 'Door open · 4°C' : 'Отворено · 4°C') : (L ? 'Sealed · 4°C' : 'Затворено · 4°C')}
            </span>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-secondary btn-sm" onClick={() => setOpen(!open)}>
                {open ? (L ? 'Close door' : 'Затвори') : (L ? 'Open fridge' : 'Отвори хладилника')}
              </button>
            </div>
          </div>

          <div className="fridge-3d-wrap">
            <div className={`fridge-3d${open ? ' open' : ''}`}>
              <div className="fridge-cabinet" />
              <div className="fridge-interior">
                <div className="fridge-shelves">
                  {/* Freezer */}
                  <div className="fridge-freezer">
                    <span className="shelf-tag">{SHELF_LABELS[0].n} · {L ? SHELF_LABELS[0].en : SHELF_LABELS[0].bg}</span>
                    {byShelf[0].map(renderProduct)}
                    <button className="fridge-slot" onClick={(e) => { e.stopPropagation(); setPickerShelf(0); }} title={L ? 'Add to freezer' : 'Добави'}>+</button>
                  </div>
                  {/* Main shelves */}
                  {[1, 2, 3, 4].map((idx) => (
                    <div className="fridge-shelf-row" key={idx}>
                      <span className="shelf-tag">{SHELF_LABELS[idx].n} · {L ? SHELF_LABELS[idx].en : SHELF_LABELS[idx].bg}</span>
                      {byShelf[idx].map(renderProduct)}
                      <button className="fridge-slot" onClick={(e) => { e.stopPropagation(); setPickerShelf(idx); }} title={L ? 'Add to shelf' : 'Добави'}>+</button>
                    </div>
                  ))}
                </div>
              </div>

              <div className="fridge-door-wrap">
                <div className="fridge-door" onClick={() => setOpen(!open)}>
                  <div className="door-display">
                    <span>FRESH</span>
                    <span className="temp">4°</span>
                    <span>❄</span>
                  </div>
                  <div className="door-brand">Ко-да-ям</div>
                  <div className="door-brand-sub">for picky eaters</div>
                  <div className="fridge-handle" onClick={(e) => { e.stopPropagation(); setOpen(!open); }} />
                  <div className="door-inside">
                    <div className="door-bin"><div className="bottle b1" /><div className="bottle b2" /><div className="bottle b3" /></div>
                    <div className="door-bin"><div className="bottle b4" /><div className="bottle b5" /><div className="bottle b2" /><div className="bottle b1" /></div>
                    <div className="door-bin"><div className="bottle b3" /><div className="bottle b4" /></div>
                  </div>
                </div>
              </div>

              <div className="fridge-feet"><span /><span /></div>
            </div>
            {!open && (
              <div className="fridge-hint">{L ? '↑ Tap the door to open' : '↑ Натисни вратата'}</div>
            )}
          </div>
        </div>

        <aside className="fridge-rail">
          <div className="cook-card">
            <div className="cook-card-glyph">?</div>
            <div className="cook-card-title">{L ? 'What can I cook?' : 'Какво да сготвя?'}</div>
            <div className="cook-card-sub">
              {L
                ? `We matched ${recipeMatches.length} recipes against the ${fridge.length} things on your shelves.`
                : `Намерихме ${recipeMatches.length} рецепти от ${fridge.length}-те продукта в хладилника.`}
            </div>
            <button className="cook-card-btn" onClick={() => setTab('recipes')}>
              {L ? 'Open the cookbook' : 'Към книгата'} <span style={{ opacity: .55 }}>→</span>
            </button>
          </div>

          <div className="rail-card">
            <span className="label">{L ? 'At a glance' : 'Преглед'}</span>
            <div className="rail-stat-row">
              <div className="rail-stat metric">
                <div className="metric-num italic" style={{ color: 'var(--clay-deep)' }}>{recipeMatches.length}</div>
                <div className="metric-label">{L ? 'recipe matches' : 'съвпадения'}</div>
              </div>
              <div className="rail-stat metric">
                <div className="metric-num italic" style={{ color: 'var(--rust)' }}>{expiringSoon}</div>
                <div className="metric-label">{L ? 'expiring soon' : 'изтичат'}</div>
              </div>
            </div>
          </div>

          <div className="rail-card">
            <span className="label">{L ? 'You can make now' : 'Готови за готвене'}</span>
            {recipeMatches.length === 0 ? (
              <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: .5, fontStyle: 'italic', padding: '12px 0' }}>
                {L ? 'Add a few items and we\'ll find ideas.' : 'Добави няколко продукта и ще намерим идеи.'}
              </div>
            ) : (
              <div className="match-list">
                {recipeMatches.map((r) => (
                  <div key={r.id} className="match-row" onClick={() => onOpenRecipe(r.id)}>
                    <div className="m-thumb">{r.emoji}</div>
                    <div>
                      <div className="m-name">{L && r.nameEn ? r.nameEn : r.name}</div>
                      <div className="m-meta">⏱ {r.time} {L ? 'min' : 'мин'} · {(r.requiredIngredients || []).slice(0, 3).join(', ')}</div>
                    </div>
                    <div className="m-score">
                      {r.matchedCount}<small>/{r.totalCount}</small>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </aside>
      </div>

      {/* Quick-add picker as modal */}
      <Modal
        open={pickerShelf !== null}
        onClose={() => setPickerShelf(null)}
        title={pickerShelf !== null ? (L ? `Stock the ${SHELF_LABELS[pickerShelf].en}` : `Зареди ${SHELF_LABELS[pickerShelf].bg}`) : ''}
        sub={L ? 'Pick what to place inside.' : 'Избери какво да сложиш.'}
      >
        <div className="picker-grid">
          {ADDABLE_ITEMS.filter((a) => !existingNames.has(a.name.toLowerCase())).map((a) => (
            <button key={a.name} className="picker-tile" onClick={() => { addItem(a, pickerShelf); setPickerShelf(null); }}>
              <span className="e">{a.emoji}</span>
              <span className="n">{L && a.nameEn ? a.nameEn : a.name}</span>
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 18, justifyContent: 'space-between' }}>
          <button className="btn btn-ghost btn-sm" onClick={() => { setCustom({ ...custom, shelf: pickerShelf }); setPickerShelf(null); setCustomOpen(true); }}>
            {L ? 'Custom item →' : 'Свой продукт →'}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={() => setPickerShelf(null)}>{L ? 'Cancel' : 'Отказ'}</button>
        </div>
      </Modal>

      <Modal open={customOpen} onClose={() => setCustomOpen(false)} title={L ? 'A custom item' : 'Свой продукт'} sub={L ? 'Add anything that\'s not in the list.' : 'Добави нещо, което не е в списъка.'}>
        <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
          <div style={{ flex: 1 }}>
            <label className="input-label">{L ? 'Name' : 'Името'}</label>
            <input className="input" value={custom.name} onChange={(e) => setCustom({ ...custom, name: e.target.value })} placeholder={L ? 'e.g. Olives' : 'напр. Маслини'} autoFocus />
          </div>
          <div style={{ width: 80 }}>
            <label className="input-label">Emoji</label>
            <input className="input" value={custom.emoji} onChange={(e) => setCustom({ ...custom, emoji: e.target.value })} style={{ textAlign: 'center', fontSize: 22 }} />
          </div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label className="input-label">{L ? 'Shelf' : 'Рафт'}</label>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {SHELF_LABELS.map((s, i) => (
              <span key={i} className={`chip${custom.shelf === i ? ' selected' : ''}`} onClick={() => setCustom({ ...custom, shelf: i })}>
                {s.n} · {L ? s.en : s.bg}
              </span>
            ))}
          </div>
        </div>
        <div style={{ marginBottom: 22 }}>
          <label className="input-label">{L ? 'Days until expiry' : 'Дни до изтичане'}</label>
          <input className="input" type="number" value={custom.expires} onChange={(e) => setCustom({ ...custom, expires: e.target.value })} placeholder="7" />
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={addCustom}>{L ? 'Add to fridge' : 'Сложи в хладилника'}</button>
          <button className="btn btn-ghost" onClick={() => setCustomOpen(false)}>{L ? 'Cancel' : 'Отказ'}</button>
        </div>
      </Modal>
    </div>
  );
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id: 'protein', label: 'Месо', labelEn: 'Meat' },
  { id: 'fish', label: 'Риба', labelEn: 'Fish' },
  { id: 'dairy', label: 'Млечни', labelEn: 'Dairy' },
  { id: 'egg', label: 'Яйца', labelEn: 'Eggs' },
  { id: 'veg', label: 'Зеленчуци', labelEn: 'Vegetables' },
  { id: 'fruit', label: 'Плодове', labelEn: 'Fruits' },
  { id: 'grain', label: 'Зърнени', labelEn: 'Grains' },
  { id: 'condiment', label: 'Подправки', labelEn: 'Condiments' },
  { id: 'other', label: 'Друго', labelEn: 'Other' },
];

function ProductsScreen({ products, setProducts, lang }) {
  const L = lang === 'en';
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [addOpen, setAddOpen] = useState(false);
  const [newP, setNewP] = useState({ name: '', emoji: '📦', category: 'other', status: 'liked' });

  const filtered = products.filter((p) => {
    const n = L && p.nameEn ? p.nameEn : p.name;
    return n.toLowerCase().includes(search.toLowerCase()) && (statusFilter === 'all' || p.status === statusFilter);
  });

  const counts = {
    liked: products.filter((p) => p.status === 'liked').length,
    disliked: products.filter((p) => p.status === 'disliked').length,
    allergic: products.filter((p) => p.status === 'allergic').length,
  };

  const addProduct = () => {
    if (!newP.name.trim()) return;
    setProducts([...products, { id: 'p' + Date.now(), ...newP }]);
    setNewP({ name: '', emoji: '📦', category: 'other', status: 'liked' });
    setAddOpen(false);
  };

  const statusBadge = (s) => s === 'liked'
    ? <Badge kind="safe"><span className="dot dot-safe" /> {L ? 'safe' : 'харесвам'}</Badge>
    : s === 'disliked'
      ? <Badge kind="warn"><span className="dot dot-warn" /> {L ? 'dislike' : 'нелюб.'}</Badge>
      : <Badge kind="danger"><span className="dot dot-danger" /> {L ? 'allergy' : 'алергия'}</Badge>;

  const cycleStatus = (id) => {
    const order = ['liked', 'disliked', 'allergic'];
    setProducts(products.map((p) => p.id === id ? { ...p, status: order[(order.indexOf(p.status) + 1) % 3] } : p));
  };

  const FILTERS = [
    { id: 'all', label: L ? 'All' : 'Всички', n: products.length },
    { id: 'liked', label: L ? 'Safe' : 'Харесвам', n: counts.liked },
    { id: 'disliked', label: L ? 'Disliked' : 'Не харесвам', n: counts.disliked },
    { id: 'allergic', label: L ? 'Allergic' : 'Алергии', n: counts.allergic },
  ];

  return (
    <div className="fade-in">
      <div className="topbar">
        <div className="breadcrumb">{L ? 'Kitchen' : 'Кухня'} <span>/ {L ? 'Products' : 'Продукти'}</span></div>
        <div className="topbar-actions">
          <button className="btn btn-secondary btn-sm" onClick={() => setAddOpen(true)}>+ {L ? 'Add product' : 'Добави'}</button>
        </div>
      </div>

      <div className="page-head">
        <div>
          <div className="eyebrow" style={{ marginBottom: 12 }}>{L ? 'What I eat & what I don\'t' : 'Какво ям и какво не'}</div>
          <h1 className="h-title italic">{L ? 'Products' : 'Продукти'}</h1>
          <div className="page-head-sub" style={{ marginTop: 8 }}>
            {L ? 'Tap a status to cycle through safe / dislike / allergy.' : 'Натисни статуса, за да превключиш безопасно / нелюбимо / алергия.'}
          </div>
        </div>
        <div className="search" style={{ width: 260 }}>
          <span className="search-glyph">⌕</span>
          <input className="input" value={search} onChange={(e) => setSearch(e.target.value)} placeholder={L ? 'Search products…' : 'Търси…'} />
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 24, flexWrap: 'wrap' }}>
        {FILTERS.map((f) => (
          <button key={f.id} className={`chip${statusFilter === f.id ? ' selected' : ''}`} onClick={() => setStatusFilter(f.id)}>
            {f.label} <span style={{ opacity: .55, marginLeft: 4, fontFamily: 'var(--mono)', fontSize: 11 }}>{f.n}</span>
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="empty">
          <div className="empty-glyph">🥕</div>
          <div className="empty-title">Няма продукти</div>
          <div className="empty-sub">{L ? 'Add the things you eat often.' : 'Добави нещата, които ядеш често.'}</div>
        </div>
      ) : (
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          {filtered.map((p) => {
            const cat = CATEGORIES.find((c) => c.id === p.category);
            return (
              <div key={p.id} className="product-row">
                <span className="p-emoji">{p.emoji}</span>
                <span className="p-name">{L && p.nameEn ? p.nameEn : p.name}</span>
                <span className="p-cat">{cat ? (L ? cat.labelEn : cat.label) : '—'}</span>
                <button className="btn btn-xs" onClick={() => cycleStatus(p.id)} style={{ background: 'transparent', padding: 0 }}>
                  {statusBadge(p.status)}
                </button>
                <button
                  className="btn-icon"
                  style={{ width: 28, height: 28, fontSize: 11 }}
                  onClick={() => setProducts(products.filter((x) => x.id !== p.id))}
                  aria-label="Remove"
                >✕</button>
              </div>
            );
          })}
        </div>
      )}

      <Modal open={addOpen} onClose={() => setAddOpen(false)} title={L ? 'Add a product' : 'Нов продукт'}>
        <div style={{ display: 'flex', gap: 12, marginBottom: 14 }}>
          <div style={{ flex: 1 }}>
            <label className="input-label">{L ? 'Name' : 'Името'}</label>
            <input className="input" value={newP.name} onChange={(e) => setNewP({ ...newP, name: e.target.value })} placeholder={L ? 'e.g. Tomatoes' : 'напр. Домати'} />
          </div>
          <div style={{ width: 80 }}>
            <label className="input-label">Emoji</label>
            <input className="input" value={newP.emoji} onChange={(e) => setNewP({ ...newP, emoji: e.target.value })} style={{ textAlign: 'center', fontSize: 22 }} />
          </div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label className="input-label">{L ? 'Category' : 'Категория'}</label>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {CATEGORIES.map((c) => (
              <span key={c.id} className={`chip${newP.category === c.id ? ' selected' : ''}`} onClick={() => setNewP({ ...newP, category: c.id })}>
                {L ? c.labelEn : c.label}
              </span>
            ))}
          </div>
        </div>
        <div style={{ marginBottom: 22 }}>
          <label className="input-label">{L ? 'Status' : 'Статус'}</label>
          <div style={{ display: 'flex', gap: 6 }}>
            <span className={`chip${newP.status === 'liked' ? ' selected' : ''}`} onClick={() => setNewP({ ...newP, status: 'liked' })}>{L ? 'Safe' : 'Харесвам'}</span>
            <span className={`chip${newP.status === 'disliked' ? ' sel-warn' : ''}`} onClick={() => setNewP({ ...newP, status: 'disliked' })}>{L ? 'Dislike' : 'Не харесвам'}</span>
            <span className={`chip${newP.status === 'allergic' ? ' sel-danger' : ''}`} onClick={() => setNewP({ ...newP, status: 'allergic' })}>{L ? 'Allergy' : 'Алергия'}</span>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={addProduct}>{L ? 'Add' : 'Добави'}</button>
          <button className="btn btn-ghost" onClick={() => setAddOpen(false)}>{L ? 'Cancel' : 'Отказ'}</button>
        </div>
      </Modal>
    </div>
  );
}

// ─── PROFILE ──────────────────────────────────────────────────────────────
function ProfileScreen({ profile, setProfile, lang }) {
  const L = lang === 'en';
  const [name, setName] = useState(profile.name || '');
  const saveName = () => setProfile({ ...profile, name: name.trim() });

  const PREFS = ['Вегетарианец', 'Веган', 'Без глутен', 'Без лактоза', 'Халал', 'Кошер'];

  return (
    <div className="fade-in">
      <div className="topbar">
        <div className="breadcrumb">{L ? 'Kitchen' : 'Кухня'} <span>/ {L ? 'Profile' : 'Профил'}</span></div>
      </div>

      <div className="page-head">
        <div>
          <div className="eyebrow" style={{ marginBottom: 12 }}>{L ? 'Your shape of hunger' : 'Твоята форма на глад'}</div>
          <h1 className="h-title italic">{L ? 'Profile' : 'Профил'}</h1>
          <div className="page-head-sub" style={{ marginTop: 8 }}>
            {L ? 'Tell the kitchen what to avoid. The cookbook will quietly remember.' : 'Кажи на кухнята какво да избягва. Книгата ще го помни.'}
          </div>
        </div>
      </div>

      <div className="grid-2" style={{ alignItems: 'start' }}>
        <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <div className="label">{L ? 'Display name' : 'Име'}</div>
          <div style={{ display: 'flex', gap: 10 }}>
            <input className="input" value={name} onChange={(e) => setName(e.target.value)} placeholder={L ? 'Your name' : 'Твоето име'} onBlur={saveName} onKeyDown={(e) => e.key === 'Enter' && saveName()} />
            <button className="btn btn-secondary btn-sm" onClick={saveName}>{L ? 'Save' : 'Запази'}</button>
          </div>
          <div style={{ marginTop: 18 }}>
            <div className="label" style={{ marginBottom: 12 }}>{L ? 'Dietary preferences' : 'Диетични предпочитания'}</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {PREFS.map((pref) => {
                const sel = profile.dietaryPrefs.includes(pref);
                return (
                  <span key={pref} className={`chip${sel ? ' selected' : ''}`} onClick={() => setProfile({ ...profile, dietaryPrefs: sel ? profile.dietaryPrefs.filter((p) => p !== pref) : [...profile.dietaryPrefs, pref] })}>
                    {pref}
                  </span>
                );
              })}
            </div>
          </div>
        </div>

        <div className="card" style={{ background: 'var(--paper-2)' }}>
          <div className="label">{L ? 'Quiet summary' : 'Тихо обобщение'}</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 28, marginTop: 18 }}>
            <div className="metric"><div className="metric-num italic" style={{ color: 'var(--rust)' }}>{profile.allergies.length}</div><div className="metric-label">{L ? 'allergies' : 'алергии'}</div></div>
            <div className="metric"><div className="metric-num italic" style={{ color: 'var(--amber)' }}>{profile.dislikes.length}</div><div className="metric-label">{L ? 'dislikes' : 'нелюбими'}</div></div>
            <div className="metric"><div className="metric-num italic" style={{ color: 'var(--moss)' }}>{profile.dietaryPrefs.length}</div><div className="metric-label">{L ? 'preferences' : 'предпочит.'}</div></div>
            <div className="metric"><div className="metric-num italic">{(profile.allergies.length + profile.dislikes.length)}</div><div className="metric-label">{L ? 'total filters' : 'общо филтри'}</div></div>
          </div>
        </div>
      </div>

      <div className="divider" />

      <div className="grid-2" style={{ alignItems: 'start' }}>
        <div className="card" style={{ borderColor: 'rgba(180,60,40,.2)' }}>
          <div className="section-eyebrow" style={{ marginBottom: 8 }}>
            <span className="label" style={{ color: 'var(--rust)' }}>{L ? 'Allergies — serious' : 'Алергии — сериозни'}</span>
          </div>
          <p className="page-head-sub" style={{ marginBottom: 16, fontSize: 13.5 }}>
            {L ? 'These will always be marked as dangerous.' : 'Тези съставки винаги се маркират като опасни.'}
          </p>
          <TagInput
            value={profile.allergies}
            kind="danger"
            onChange={(v) => setProfile({ ...profile, allergies: v })}
            placeholder={L ? 'Add allergen' : 'Добави алерген'}
          />
        </div>

        <div className="card" style={{ borderColor: 'rgba(212,140,30,.2)' }}>
          <div className="section-eyebrow" style={{ marginBottom: 8 }}>
            <span className="label" style={{ color: 'var(--amber)' }}>{L ? 'Dislikes' : 'Нелюбими'}</span>
          </div>
          <p className="page-head-sub" style={{ marginBottom: 16, fontSize: 13.5 }}>
            {L ? 'Foods you simply don\'t enjoy.' : 'Храни, които просто не харесваш.'}
          </p>
          <TagInput
            value={profile.dislikes}
            kind="warn"
            onChange={(v) => setProfile({ ...profile, dislikes: v })}
            placeholder={L ? 'Add disliked food' : 'Добави нелюбима храна'}
          />
        </div>
      </div>
    </div>
  );
}

// ─── TWEAKS PANEL ─────────────────────────────────────────────────────────
function TweaksPanel({ open, tweaks, setTweaks, onClose }) {
  const themes = [
    { id: 'paper', label: 'Paper' },
    { id: 'fresh', label: 'Fresh' },
    { id: 'night', label: 'Night' },
  ];
  return (
    <div className={`tweaks${open ? ' open' : ''}`}>
      <div className="tweaks-title">
        <span>Tweaks</span>
        <button className="tweaks-close" onClick={onClose} aria-label="Hide tweaks" title="Hide">✕</button>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Theme</span>
        <div className="seg">
          {themes.map((t) => (
            <button key={t.id} className={`seg-btn${tweaks.theme === t.id ? ' active' : ''}`} onClick={() => setTweaks({ ...tweaks, theme: t.id })}>{t.label}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Language</span>
        <div className="seg">
          <button className={`seg-btn${tweaks.lang === 'bg' ? ' active' : ''}`} onClick={() => setTweaks({ ...tweaks, lang: 'bg' })}>Български</button>
          <button className={`seg-btn${tweaks.lang === 'en' ? ' active' : ''}`} onClick={() => setTweaks({ ...tweaks, lang: 'en' })}>English</button>
        </div>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Show emoji</span>
        <div className="seg">
          <button className={`seg-btn${tweaks.showEmoji ? ' active' : ''}`} onClick={() => setTweaks({ ...tweaks, showEmoji: true })}>On</button>
          <button className={`seg-btn${!tweaks.showEmoji ? ' active' : ''}`} onClick={() => setTweaks({ ...tweaks, showEmoji: false })}>Off</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useLocalStorage('kdy_tab_v2', 'home');
  const [profile, setProfile] = useLocalStorage('kdy_profile_v2', DEFAULT_PROFILE);
  const [recipes, setRecipes] = useLocalStorage('kdy_recipes_v2', DEFAULT_RECIPES);
  const [products, setProducts] = useLocalStorage('kdy_products_v2', DEFAULT_PRODUCTS);
  const [fridge, setFridge] = useLocalStorage('kdy_fridge_v2', DEFAULT_FRIDGE);
  const [tweaks, setTweaks] = useState(() => {
    try { const s = localStorage.getItem('kdy_tweaks_v2'); return s ? JSON.parse(s) : TWEAK_DEFAULTS; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [openRecipeId, setOpenRecipeId] = useState(null);

  useEffect(() => { try { localStorage.setItem('kdy_tweaks_v2', JSON.stringify(tweaks)); } catch {} }, [tweaks]);

  // Tweaks protocol — register listener BEFORE announcing availability
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
      if (e.data?.type === '__edit_mode_set_keys' && e.data.edits) {
        setTweaks((t) => ({ ...t, ...e.data.edits }));
      }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const themeClass = tweaks.theme === 'fresh' ? 'theme-fresh' : tweaks.theme === 'night' ? 'theme-night' : '';
  const L = tweaks.lang === 'en';

  const NAV = [
    { id: 'home', label: L ? 'Home' : 'Начало', glyph: '◐' },
    { id: 'fridge', label: L ? 'Fridge' : 'Хладилник', glyph: '▢' },
    { id: 'recipes', label: L ? 'Recipes' : 'Рецепти', glyph: '✦' },
    { id: 'products', label: L ? 'Products' : 'Продукти', glyph: '◊' },
    { id: 'profile', label: L ? 'Profile' : 'Профил', glyph: '◯' },
  ];

  const openRecipe = (id) => { setOpenRecipeId(id); setTab('recipes'); };

  const screens = {
    home: <HomeScreen profile={profile} recipes={recipes} fridge={fridge} setTab={setTab} lang={tweaks.lang} onOpenRecipe={openRecipe} />,
    fridge: <FridgeScreen fridge={fridge} setFridge={setFridge} recipes={recipes} profile={profile} lang={tweaks.lang} onOpenRecipe={openRecipe} setTab={setTab} />,
    recipes: <RecipesScreen recipes={recipes} setRecipes={setRecipes} profile={profile} lang={tweaks.lang} openRecipeId={openRecipeId} setOpenRecipeId={setOpenRecipeId} />,
    products: <ProductsScreen products={products} setProducts={setProducts} lang={tweaks.lang} />,
    profile: <ProfileScreen profile={profile} setProfile={setProfile} lang={tweaks.lang} />,
  };

  // When tab switches away from recipes, clear detail
  useEffect(() => { if (tab !== 'recipes') setOpenRecipeId(null); }, [tab]);

  const userInitial = (profile.name || 'К').trim().charAt(0).toUpperCase();

  const updateTweaks = (next) => {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  return (
    <div className={`app ${themeClass}`}>
      <aside className="sidebar">
        <div className="brand">
          <span className="brand-mark">Ко-да-ям</span>
          <span className="brand-sub">{L ? 'for picky eaters' : 'за капризни хора'}</span>
        </div>
        <nav className="nav">
          <div className="nav-section-label">{L ? 'Sections' : 'Секции'}</div>
          {NAV.map((n, i) => (
            <button key={n.id} className={`nav-item${tab === n.id ? ' active' : ''}`} onClick={() => setTab(n.id)}>
              <span className="nav-num">{String(i + 1).padStart(2, '0')}</span>
              <span className="nav-glyph" style={{ display: 'none' }}>{n.glyph}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-chip">
            <div className="user-avatar">{userInitial}</div>
            <div>
              <div className="user-name">{profile.name || (L ? 'Guest cook' : 'Гост')}</div>
              <div className="user-meta">{profile.allergies.length + profile.dislikes.length} {L ? 'filters' : 'филтри'}</div>
            </div>
          </div>
          <div className="sidebar-utility">
            <button className={tweaksOpen ? 'on' : ''} onClick={() => setTweaksOpen((o) => !o)}>Tweaks</button>
            <button onClick={() => updateTweaks({ ...tweaks, lang: tweaks.lang === 'bg' ? 'en' : 'bg' })}>{tweaks.lang === 'bg' ? 'EN' : 'BG'}</button>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="main-inner">
          {screens[tab]}
        </div>
      </main>

      <TweaksPanel
        open={tweaksOpen}
        tweaks={tweaks}
        setTweaks={updateTweaks}
        onClose={() => {
          setTweaksOpen(false);
          try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch {}
        }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
