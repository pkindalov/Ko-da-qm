        // e.g. requiredIngredient "яйца" + ingredients ["3 яйца", ...] → "3"
        const findQty = (req) => {
          const r = req.toLowerCase();
          const match = (recipe.ingredients || []).find((s) =>
            s.toLowerCase().includes(r),
          );
          if (!match) return "";
          // Strip the ingredient word, keep leading qty
          const cleaned = match
            .replace(new RegExp(`\\s*${req}.*$`, "i"), "")
            .trim();
          return cleaned;
        };
        const findFullLine = (req) => {
          const r = req.toLowerCase();
          return (
            (recipe.ingredients || []).find((s) =>
              s.toLowerCase().includes(r),
            ) || req
          );
        };

        const required = recipe.requiredIngredients || [];
        const missing = required.filter((i) => !hasInFridge(i));
        const have = required.filter((i) => hasInFridge(i));

        // Persisted ticked state, per recipe
        const storageKey = `kdj-shop-${recipe.id}`;
        const [checked, setChecked] = useState(() => {
          try {
            return new Set(
              JSON.parse(localStorage.getItem(storageKey) || "[]"),
            );
          } catch {
            return new Set();
          }
        });
        const [toast, setToast] = useState("");

        // Reset when recipe changes
        useEffect(() => {
          try {
            setChecked(
              new Set(JSON.parse(localStorage.getItem(storageKey) || "[]")),
            );
          } catch {
            setChecked(new Set());
          }
        }, [recipe.id]);

        const persist = (next) => {
          setChecked(next);
          try {
            localStorage.setItem(storageKey, JSON.stringify([...next]));
          } catch {}
        };

        const toggle = (ing) => {
          const next = new Set(checked);
          if (next.has(ing)) next.delete(ing);
          else next.add(ing);
          persist(next);
        };

        const shareText = () => {
          const title = L && recipe.nameEn ? recipe.nameEn : recipe.name;
          const header =
            (L ? "Shopping list — " : "Списък за пазар — ") + title;
          const lines = missing.map((m) => "— " + findFullLine(m));
          return [header, "", ...lines].join("\n");
        };

        const copy = async () => {
          try {
            await navigator.clipboard.writeText(shareText());
            setToast(L ? "Copied" : "Копирано");
            setTimeout(() => setToast(""), 1800);
          } catch {
            setToast(L ? "Copy failed" : "Грешка");
            setTimeout(() => setToast(""), 1800);
          }
        };

        const share = async () => {
          const text = shareText();
          const title =
            (L ? "Shopping list — " : "Списък за пазар — ") +
            (L && recipe.nameEn ? recipe.nameEn : recipe.name);
          if (navigator.share) {
            try {
              await navigator.share({ title, text });
              return;
            } catch {}
          }
          copy();
        };

        const clearTicks = () => persist(new Set());

        const checkedCount = [...checked].filter((c) =>
          missing.includes(c),
        ).length;
        const allDone = missing.length > 0 && checkedCount === missing.length;

        return (
          <div
            className="overlay"
            onClick={(e) => {
              if (e.target === e.currentTarget) onClose();
            }}
          >
            <div className="modal" style={{ maxWidth: 560 }}>
              <button
                className="modal-close"
                onClick={onClose}
                aria-label="Close"
              >
                ✕
              </button>
              <div className="eyebrow" style={{ marginBottom: 8 }}>
                {L ? "Shop missing" : "Пазарувай"} ·{" "}
                {L && recipe.nameEn ? recipe.nameEn : recipe.name}
              </div>
              <div className="modal-title italic">
                {missing.length === 0
                  ? L
                    ? "You have it all"
                    : "Имаш всичко"
                  : L
                    ? "A short list"
                    : "Кратък списък"}
              </div>
              <div className="modal-sub">
                {missing.length === 0
                  ? L
                    ? "Your fridge covers every ingredient this recipe needs."
                    : "Хладилникът ти покрива всяка съставка от рецептата."
                  : L
                    ? `${missing.length} of ${required.length} ingredients to pick up. Tick them off as you go.`
                    : `${missing.length} от ${required.length} съставки за купуване. Отмятай ги докато пазаруваш.`}
              </div>

              <div className="shop-summary">
                <div className="shop-stat">
                  <div className="shop-stat-num clay">{missing.length}</div>
                  <div className="shop-stat-label">
                    {L ? "to buy" : "за купуване"}
                  </div>
                </div>
                <div className="shop-stat">
                  <div className="shop-stat-num moss">{have.length}</div>
                  <div className="shop-stat-label">
                    {L ? "already in fridge" : "в хладилника"}
                  </div>
                </div>
              </div>

              {missing.length === 0 ? (
                <div className="shop-empty">
                  <div className="shop-empty-glyph">🧺</div>
                  <div className="shop-empty-title">
                    {L ? "Ready to cook" : "Готови за готвене"}
                  </div>
                  <div className="shop-empty-sub">
                    {L
                      ? "Every ingredient checked against your fridge — no detour to the shop."
                      : "Всички съставки са в хладилника — без отбиване до магазина."}
                  </div>
                </div>
              ) : (
                <>
                  <div className="shop-eyebrow">{L ? "Pick up" : "Купи"}</div>
                  <ul className="shop-list">
                    {missing.map((ing) => {
                      const isChecked = checked.has(ing);
                      const qty = findQty(ing);
                      return (
                        <li
                          key={ing}
                          className={`shop-row${isChecked ? " checked" : ""}`}
                          onClick={() => toggle(ing)}
                        >
                          <span className="check" aria-hidden="true" />
                          <span className="name">{ing}</span>
                          {qty && <span className="qty">{qty}</span>}
                        </li>
                      );
                    })}
                  </ul>
                </>
              )}

              {have.length > 0 && (
                <>
                  <div className="shop-eyebrow">
                    {L ? "Already have" : "Вече имаш"}
                  </div>
                  <ul className="shop-list">
                    {have.map((ing) => (
                      <li key={ing} className="shop-row have">
                        <span className="check" aria-hidden="true" />
                        <span className="name">{ing}</span>
                        <span className="qty">
                          {L ? "in fridge" : "хладилник"}
                        </span>
                      </li>
                    ))}
                  </ul>
                </>
              )}

              <div className="shop-footer">
                <div className="shop-progress">
                  {missing.length === 0 ? (
                    L ? (
                      "Nothing to buy"
                    ) : (
                      "Нищо за купуване"
                    )
                  ) : allDone ? (
                    L ? (
                      "All ticked — ready to go"
                    ) : (
                      "Всичко е отметнато"
                    )
                  ) : (
                    <>
                      <b>{checkedCount}</b> / {missing.length}{" "}
                      {L ? "ticked" : "отметнати"}
                    </>
                  )}
                </div>
                {toast && <span className={`shop-toast show`}>· {toast}</span>}
                {missing.length > 0 && checkedCount > 0 && (
                  <button className="btn btn-ghost btn-sm" onClick={clearTicks}>
                    {L ? "Reset" : "Изчисти"}
                  </button>
                )}
                {missing.length > 0 && (
                  <>
                    <button className="btn btn-secondary btn-sm" onClick={copy}>
                      {L ? "Copy" : "Копирай"}
                    </button>
                    <button className="btn btn-primary btn-sm" onClick={share}>
                      {L ? "Share" : "Сподели"}
                    </button>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ─── RECIPE CARD ──────────────────────────────────────────────────────────
      function RecipeCard({
        recipe,
        blocked,
        onClick,
        lang,
        isFavorite,
        onToggleFav,
      }) {
        const L = lang === "en";
        const flagged = recipe.requiredIngredients?.some((i) =>
          blocked.some((b) => i.toLowerCase().includes(b)),
        );
        const displayName = L && recipe.nameEn ? recipe.nameEn : recipe.name;
        return (
          <article
            className={`recipe-card${flagged ? " flagged" : ""}`}
            onClick={onClick}
          >
            {onToggleFav && (
              <button
                className={`fav-btn${isFavorite ? " on" : ""}`}
                onClick={(e) => {
                  e.stopPropagation();
                  onToggleFav(recipe.id);
                }}
                aria-label={L ? "Toggle favorite" : "Любима"}
                title={
                  L
                    ? isFavorite
                      ? "Remove from favorites"
                      : "Add to favorites"
                    : isFavorite
                      ? "Премахни от любими"
                      : "Добави в любими"
                }
              >
                <span className="heart-line">♡</span>
                <span className="heart-fill">♥</span>
              </button>
            )}
            <div className="recipe-image">
              <div className="recipe-image-stripes" />
              <div className="recipe-image-emoji">{recipe.emoji}</div>
              <div className="recipe-image-label">PHOTO · {recipe.time}MIN</div>
            </div>
            <div className="recipe-body">
              <div className="recipe-name italic">{displayName}</div>
              <div className="recipe-meta">
                {recipe.tags?.[0] || (L ? "recipe" : "рецепта")} · {recipe.time}{" "}
                {L ? "min" : "мин"}
              </div>
              <div className="recipe-tags">
                {flagged ? (
                  <Badge kind="danger">
                    <span className="dot dot-danger" />{" "}
                    {L ? "check" : "провери"}
                  </Badge>
                ) : (
                  <Badge kind="safe">
                    <span className="dot dot-safe" /> {L ? "safe" : "безопасно"}
                  </Badge>
                )}
                {recipe.isAI && <Badge kind="clay">AI</Badge>}
              </div>
            </div>
          </article>
        );
      }

      // ─── RECIPES ──────────────────────────────────────────────────────────────
      function RecipesScreen({
        recipes,
        setRecipes,
        profile,
        fridge,
        favorites,
        toggleFavorite,
        lang,
        openRecipeId,
        setOpenRecipeId,
      }) {
        const L = lang === "en";
        const [search, setSearch] = useState("");
        const [shopOpen, setShopOpen] = useState(false);
        const [filterSafe, setFilterSafe] = useState(false);
        const [addOpen, setAddOpen] = useState(false);
        const [newR, setNewR] = useState({
          name: "",
          emoji: "🍽",
          time: "",
          ingredients: "",
          steps: "",
        });

        const blocked = [...profile.allergies, ...profile.dislikes];
        const isSafe = (r) =>
          !r.requiredIngredients?.some((i) =>
            blocked.some((b) => i.toLowerCase().includes(b)),
          );

        const filtered = recipes.filter((r) => {
          const n = L && r.nameEn ? r.nameEn : r.name;
          return (
            n.toLowerCase().includes(search.toLowerCase()) &&
            (!filterSafe || isSafe(r))
          );
        });

        const saveRecipe = () => {
          if (!newR.name.trim()) return;
          const ings = newR.ingredients.split("\n").filter(Boolean);
          const r = {
            id: "r" + Date.now(),
            name: newR.name,
            emoji: newR.emoji || "🍽",
            ingredients: ings,
            steps: newR.steps.split("\n").filter(Boolean),
            time: parseInt(newR.time) || 15,
            tags: [],
            isAI: false,
            requiredIngredients: ings.map(
              (i) => i.split(" ").slice(1).join(" ") || i,
            ),
          };
          setRecipes([...recipes, r]);
          setNewR({
            name: "",
            emoji: "🍽",
            time: "",
            ingredients: "",
            steps: "",
          });
          setAddOpen(false);
        };

        // Recipe detail view
        if (openRecipeId) {
          const r = recipes.find((x) => x.id === openRecipeId);
          if (!r) {
            setOpenRecipeId(null);
            return null;
          }
          const safe = isSafe(r);
          // Missing-ingredient count for the CTA badge
          const fridgeLowDetail = (fridge || []).map((f) =>
            (f.name || "").toLowerCase(),
          );
          const missingCount = (r.requiredIngredients || []).filter(
            (i) =>
              !fridgeLowDetail.some(
                (f) =>
                  f.includes(i.toLowerCase()) || i.toLowerCase().includes(f),
              ),
          ).length;
          return (
            <div className="fade-in">
              <button
                className="detail-back"
                onClick={() => setOpenRecipeId(null)}
              >
                ← {L ? "Back to recipes" : "Към рецептите"}
              </button>
              <div className="detail-hero">
                <div className="detail-image">
                  <div className="recipe-image-stripes" />
                  <div className="detail-image-emoji">{r.emoji}</div>
                  <div className="recipe-image-label">PHOTO · DROP HERE</div>
                </div>
                <div className="detail-head">
                  <div className="eyebrow">
                    {r.tags?.[0] || (L ? "recipe" : "рецепта")} · {r.time}{" "}
                    {L ? "min" : "мин"}
                  </div>
                  <h1 className="h-title italic">
                    {L && r.nameEn ? r.nameEn : r.name}
                  </h1>
                  <div
                    style={{
                      display: "flex",
                      gap: 6,
                      flexWrap: "wrap",
                      marginBottom: 18,
                    }}
                  >
                    {safe ? (
                      <Badge kind="safe">
                        <span className="dot dot-safe" />{" "}
                        {L ? "Safe for you" : "Безопасно"}
                      </Badge>
                    ) : (
                      <Badge kind="danger">
                        <span className="dot dot-danger" />{" "}
                        {L ? "Contains restrictions" : "Съдържа ограничения"}
                      </Badge>
                    )}
                    <Badge kind="neutral">
                      {r.time} {L ? "minutes" : "минути"}
                    </Badge>
                    {r.isAI && <Badge kind="clay">AI</Badge>}
                  </div>
                  <p
                    className="h-sub"
                    style={{ fontSize: 15, maxWidth: "38ch" }}
                  >
                    {L
                      ? "A short, honest recipe — the kind you cook on Tuesday without thinking."
                      : "Кратка, честна рецепта — от тези, които правиш във вторник без да мислиш."}
                  </p>
                </div>
              </div>

              <div className="grid-2" style={{ alignItems: "start", gap: 48 }}>
                <div>
                  <div className="section-eyebrow">
                    <span className="label">
                      {L ? "Ingredients" : "Съставки"}
                    </span>
                  </div>
                  {r.ingredients.map((ing, i) => {
                    const isBlocked = blocked.some((b) =>
                      ing.toLowerCase().includes(b),
                    );
                    return (
                      <div
                        key={i}
                        className={`ing-row${isBlocked ? " blocked" : ""}`}
                      >
                        <span
                          className={`dot ${isBlocked ? "dot-danger" : "dot-safe"}`}
                        />
                        <span className="ing-name">{ing}</span>
                        {isBlocked && (
                          <Badge
                            kind={
                              profile.allergies.some((a) =>
                                ing.toLowerCase().includes(a),
                              )
                                ? "danger"
                                : "warn"
                            }
                          >
                            {profile.allergies.some((a) =>
                              ing.toLowerCase().includes(a),
                            )
                              ? L
                                ? "allergy"
                                : "алергия"
                              : L
                                ? "dislike"
                                : "нелюб."}
                          </Badge>
                        )}
                      </div>
                    );
                  })}
                  <button
                    className="btn btn-primary btn-shop"
                    style={{ marginTop: 24, marginRight: 10 }}
                    onClick={() => setShopOpen(true)}
                  >
                    {L
                      ? "Shop missing ingredients"
                      : "Купи липсващите съставки"}
                    {missingCount > 0 ? (
                      <span className="badge-count">{missingCount}</span>
                    ) : (
                      <span
                        className="badge-count"
                        style={{ background: "rgba(245,241,234,.18)" }}
                      >
                        {L ? "all set" : "имаш всичко"}
                      </span>
                    )}
                  </button>
                  <button
                    className={`fav-btn-inline${favorites.includes(r.id) ? " on" : ""}`}
                    style={{ marginTop: 24, marginRight: 10 }}
                    onClick={() => toggleFavorite(r.id)}
                    aria-label={L ? "Toggle favorite" : "Любима"}
                  >
                    <span style={{ fontSize: 15, lineHeight: 1 }}>
                      {favorites.includes(r.id) ? "♥" : "♡"}
                    </span>
                    {favorites.includes(r.id)
                      ? L
                        ? "Favorited"
                        : "В любими"
                      : L
                        ? "Add to favorites"
                        : "В любими"}
                  </button>
                  <button
                    className="btn btn-danger btn-sm"
                    style={{ marginTop: 24 }}
                    onClick={() => {
                      setRecipes(recipes.filter((x) => x.id !== r.id));
                      setOpenRecipeId(null);
                    }}
                  >
                    {L ? "Delete recipe" : "Изтрий"}
                  </button>
                </div>
                <div>
                  <div className="section-eyebrow">
                    <span className="label">{L ? "Method" : "Метод"}</span>
                  </div>
                  <div className="step-grid">
                    {r.steps.map((s, i) => (
                      <div key={i} className="step">
                        <span className="step-num">
                          {String(i + 1).padStart(2, "0")}
                        </span>
                        <div className="step-text">{s}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <ShoppingListModal
                open={shopOpen}
                onClose={() => setShopOpen(false)}
                recipe={r}
                fridge={fridge || []}
                lang={lang}
              />
            </div>
          );
        }

        // List view
        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Recipes" : "Рецепти"}</span>
              </div>

                <div className="page-head-sub" style={{ marginTop: 8 }}>

              <div style={{ marginBottom: 14 }}>

                <label className="input-label">

                    setNewR({ ...newR, ingredients: e.target.value })

                  rows={4}

      // ─── FRIDGE ───────────────────────────────────────────────────────────────
      function FridgeScreen({
        fridge,
        setFridge,
        recipes,
        profile,
        lang,
        onOpenRecipe,
        setTab,
      }) {
        const L = lang === "en";
        const [open, setOpen] = useState(true);
        const [pickerShelf, setPickerShelf] = useState(null);
        const [removing, setRemoving] = useState({});
        const [customOpen, setCustomOpen] = useState(false);
        const [custom, setCustom] = useState({
          name: "",
          emoji: "📦",
          shelf: 2,
          tint: "jar",
          kind: "",
          expires: 7,
        });

        const blocked = useMemo(
          () => [...profile.allergies, ...profile.dislikes],
          [profile],
        );

        const byShelf = useMemo(() => {
          const m = [[], [], [], [], []];
          fridge.forEach((it) => {
            if (m[it.shelf] != null) m[it.shelf].push(it);
          });
          return m;
        }, [fridge]);

        const removeItem = (id) => {
          setRemoving((r) => ({ ...r, [id]: true }));
          setTimeout(() => {
            setFridge(fridge.filter((f) => f.id !== id));
            setRemoving((r) => {
              const next = { ...r };
              delete next[id];
              return next;
            });
          }, 220);
        };

        const addItem = (template, shelfOverride) => {
          const item = {
            id: "f" + Date.now() + Math.random().toString(36).slice(2, 6),
            name: template.name,
            nameEn: template.nameEn,
            emoji: template.emoji,
            shelf: shelfOverride != null ? shelfOverride : template.shelf,
            tint: template.tint || "jar",
            kind: template.kind || "",
            expires: template.expires,
          };
          setFridge([...fridge, item]);
          setOpen(true);
        };

        const addCustom = () => {
          if (!custom.name.trim()) return;
          addItem({
            name: custom.name.trim(),
            nameEn: custom.name.trim(),
            emoji: custom.emoji || "📦",
            shelf: custom.shelf,
            tint: custom.tint,
            kind: "",
            expires: parseInt(custom.expires) || 7,
          });
          setCustom({
            name: "",
            emoji: "📦",
            shelf: 2,
            tint: "jar",
            kind: "",
            expires: 7,
          });
          setCustomOpen(false);
          setPickerShelf(null);
        };

        const existingNames = new Set(fridge.map((f) => f.name.toLowerCase()));

        // Recipe matches against fridge inventory
        const fridgeLow = fridge.map((f) => f.name.toLowerCase());
        const matchesIng = (i) =>
          fridgeLow.some(
            (f) => f.includes(i.toLowerCase()) || i.toLowerCase().includes(f),
          );
        const isBlockedIng = (i) =>
          blocked.some((b) => i.toLowerCase().includes(b));
        const recipeMatches = recipes
          .filter((r) => !r.requiredIngredients?.some(isBlockedIng))
          .map((r) => {
            const matched = (r.requiredIngredients || []).filter(
              matchesIng,
            ).length;
            const total = (r.requiredIngredients || []).length || 1;
            return {
              ...r,
              matchedCount: matched,
              totalCount: total,
              matchScore: matched / total,
            };
          })
          .filter((r) => r.matchScore > 0)
          .sort((a, b) => b.matchScore - a.matchScore)
          .slice(0, 5);

        const expiringSoon = fridge.filter((f) => f.expires <= 3).length;

        const renderProduct = (it) => {
          const flagged = blocked.some(
            (b) =>
              it.name.toLowerCase().includes(b) ||
              (it.nameEn && it.nameEn.toLowerCase().includes(b)),
          );
          const label = L && it.nameEn ? it.nameEn : it.name;
          return (
            <div
              key={it.id}
              className={`fridge-product tint-${it.tint || "jar"} ${it.kind || ""}${flagged ? " flagged" : ""}${removing[it.id] ? " fading" : ""}`}
              onClick={(e) => {
                e.stopPropagation();
                removeItem(it.id);
              }}
              title={`${label} · ${it.expires}${L ? "d" : "дн"}`}
            >
              <span className="e">{it.emoji}</span>
              <span className="l">
                {label.length > 8 ? label.slice(0, 7) + "…" : label}
              </span>
              <span className="rm">✕</span>
            </div>
          );
        };

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Fridge" : "Хладилник"}</span>
              </div>
              <div className="topbar-actions">
                <button
                  className="btn btn-secondary btn-sm"
                  onClick={() => setCustomOpen(true)}
                >
                  + {L ? "Custom item" : "Свой продукт"}
                </button>
              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "What's inside" : "Какво е вътре"}
                </div>
                <h1 className="h-title italic">{L ? "Fridge" : "Хладилник"}</h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {L
                    ? "Tap the door to open. Click any product to take it out, or use a plus to put something new in."
                    : "Натисни вратата, за да отвориш. Натисни продукт, за да го извадиш, или плюс, за да добавиш нещо."}
                </div>
              </div>
              <div style={{ display: "flex", gap: 28 }}>
                <div className="metric">
                  <div className="metric-num italic" style={{ fontSize: 44 }}>
                    {fridge.length}
                  </div>
                  <div className="metric-label">{L ? "items" : "продукта"}</div>
                </div>
                <div className="metric">
                  <div
                    className="metric-num italic"
                    style={{ fontSize: 44, color: "var(--rust)" }}
                  >
                    {expiringSoon}
                  </div>
                  <div className="metric-label">
                    {L ? "expiring" : "изтичат"}
                  </div>
                </div>
              </div>
            </div>

            <div className="fridge-stage">
              <div className={`fridge-room${open ? " is-open" : ""}`}>
                <div className="fridge-toolbar">
                  <span className={`fridge-status${open ? " open" : ""}`}>
                    <span className="led" />
                    {open
                      ? L
                        ? "Door open · 4°C"
                        : "Отворено · 4°C"
                      : L
                        ? "Sealed · 4°C"
                        : "Затворено · 4°C"}
                  </span>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      className="btn btn-secondary btn-sm"
                      onClick={() => setOpen(!open)}
                    >
                      {open
                        ? L
                          ? "Close door"
                          : "Затвори"
                        : L
                          ? "Open fridge"
                          : "Отвори хладилника"}
                    </button>
                  </div>
                </div>

                <div className="fridge-3d-wrap">
                  <div className={`fridge-3d${open ? " open" : ""}`}>
                    <div className="fridge-cabinet" />
                    <div className="fridge-interior">
                      <div className="fridge-shelves">
                        {/* Freezer */}
                        <div className="fridge-freezer">
                          <span className="shelf-tag">
                            {SHELF_LABELS[0].n} ·{" "}
                            {L ? SHELF_LABELS[0].en : SHELF_LABELS[0].bg}
                          </span>
                          {byShelf[0].map(renderProduct)}
                          <button
                            className="fridge-slot"
                            onClick={(e) => {
                              e.stopPropagation();
                              setPickerShelf(0);
                            }}
                            title={L ? "Add to freezer" : "Добави"}
                          >
                            +
                          </button>
                        </div>
                        {/* Main shelves */}
                        {[1, 2, 3, 4].map((idx) => (
                          <div className="fridge-shelf-row" key={idx}>
                            <span className="shelf-tag">
                              {SHELF_LABELS[idx].n} ·{" "}
                              {L ? SHELF_LABELS[idx].en : SHELF_LABELS[idx].bg}
                            </span>
                            {byShelf[idx].map(renderProduct)}
                            <button
                              className="fridge-slot"
                              onClick={(e) => {
                                e.stopPropagation();
                                setPickerShelf(idx);
                              }}
                              title={L ? "Add to shelf" : "Добави"}
                            >
                              +
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="fridge-door-wrap">
                      <div
                        className="fridge-door"
                        onClick={() => setOpen(!open)}
                      >
                        <div className="door-display">
                          <span>FRESH</span>
                          <span className="temp">4°</span>
                          <span>❄</span>
                        </div>
                        <div className="door-brand">Ко-да-ям</div>
                        <div className="door-brand-sub">for picky eaters</div>
                        <div
                          className="fridge-handle"
                          onClick={(e) => {
                            e.stopPropagation();
                            setOpen(!open);
                          }}
                        />
                        <div className="door-inside">
                          <div className="door-bin">
                            <div className="bottle b1" />
                            <div className="bottle b2" />
                            <div className="bottle b3" />
                          </div>
                          <div className="door-bin">
                            <div className="bottle b4" />
                            <div className="bottle b5" />
                            <div className="bottle b2" />
                            <div className="bottle b1" />
                          </div>
                          <div className="door-bin">
                            <div className="bottle b3" />
                            <div className="bottle b4" />
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="fridge-feet">
                      <span />
                      <span />
                    </div>
                  </div>
                  {!open && (
                    <div className="fridge-hint">
                      {L ? "↑ Tap the door to open" : "↑ Натисни вратата"}
                    </div>
                  )}
                </div>
              </div>

              <aside className="fridge-rail">
                <div className="cook-card">
                  <div className="cook-card-glyph">?</div>
                  <div className="cook-card-title">
                    {L ? "What can I cook?" : "Какво да сготвя?"}
                  </div>
                  <div className="cook-card-sub">
                    {L
                      ? `We matched ${recipeMatches.length} recipes against the ${fridge.length} things on your shelves.`
                      : `Намерихме ${recipeMatches.length} рецепти от ${fridge.length}-те продукта в хладилника.`}
                  </div>
                  <button
                    className="cook-card-btn"
                    onClick={() => setTab("recipes")}
                  >
                    {L ? "Open the cookbook" : "Към книгата"}{" "}
                    <span style={{ opacity: 0.55 }}>→</span>
                  </button>
                </div>

                <div className="rail-card">
                  <span className="label">{L ? "At a glance" : "Преглед"}</span>
                  <div className="rail-stat-row">
                    <div className="rail-stat metric">
                      <div
                        className="metric-num italic"
                        style={{ color: "var(--clay-deep)" }}
                      >
                        {recipeMatches.length}
                      </div>
                      <div className="metric-label">
                        {L ? "recipe matches" : "съвпадения"}
                      </div>
                    </div>
                    <div className="rail-stat metric">
                      <div
                        className="metric-num italic"
                        style={{ color: "var(--rust)" }}
                      >
                        {expiringSoon}
                      </div>
                      <div className="metric-label">
                        {L ? "expiring soon" : "изтичат"}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="rail-card">
                  <span className="label">
                    {L ? "You can make now" : "Готови за готвене"}
                  </span>
                  {recipeMatches.length === 0 ? (
                    <div
                      style={{
                        fontFamily: "var(--mono)",
                        fontSize: 11,
                        color: "var(--ink-3)",
                        letterSpacing: 0.5,
                        fontStyle: "italic",
                        padding: "12px 0",
                      }}
                    >
                      {L
                        ? "Add a few items and we'll find ideas."
                        : "Добави няколко продукта и ще намерим идеи."}
                    </div>
                  ) : (
                    <div className="match-list">
                      {recipeMatches.map((r) => (
                        <div
                          key={r.id}
                          className="match-row"
                          onClick={() => onOpenRecipe(r.id)}
                        >
                          <div className="m-thumb">{r.emoji}</div>
                          <div>
                            <div className="m-name">
                              {L && r.nameEn ? r.nameEn : r.name}
                            </div>
                            <div className="m-meta">
                              ⏱ {r.time} {L ? "min" : "мин"} ·{" "}
                              {(r.requiredIngredients || [])
                                .slice(0, 3)
                                .join(", ")}
                            </div>
                          </div>
                          <div className="m-score">
                            {r.matchedCount}
                            <small>/{r.totalCount}</small>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </aside>
            </div>

            {/* Quick-add picker as modal */}
            <Modal
              open={pickerShelf !== null}
              onClose={() => setPickerShelf(null)}
              title={
                pickerShelf !== null
                  ? L
                    ? `Stock the ${SHELF_LABELS[pickerShelf].en}`
                    : `Зареди ${SHELF_LABELS[pickerShelf].bg}`
                  : ""
              }
              sub={L ? "Pick what to place inside." : "Избери какво да сложиш."}
            >
              <div className="picker-grid">
                {ADDABLE_ITEMS.filter(
                  (a) => !existingNames.has(a.name.toLowerCase()),
                ).map((a) => (
                  <button
                    key={a.name}
                    className="picker-tile"
                    onClick={() => {
                      addItem(a, pickerShelf);
                      setPickerShelf(null);
                    }}
                  >
                    <span className="e">{a.emoji}</span>
                    <span className="n">
                      {L && a.nameEn ? a.nameEn : a.name}
                    </span>
                  </button>
                ))}
              </div>
              <div
                style={{
                  display: "flex",
                  gap: 8,
                  marginTop: 18,
                  justifyContent: "space-between",
                }}
              >
                <button
                  className="btn btn-ghost btn-sm"
                  onClick={() => {
                    setCustom({ ...custom, shelf: pickerShelf });
                    setPickerShelf(null);
                    setCustomOpen(true);
                  }}
                >
                  {L ? "Custom item →" : "Свой продукт →"}
                </button>
                <button
                  className="btn btn-ghost btn-sm"
                  onClick={() => setPickerShelf(null)}
                >
                  {L ? "Cancel" : "Отказ"}
                </button>
              </div>
            </Modal>

            <Modal
              open={customOpen}
              onClose={() => setCustomOpen(false)}
              title={L ? "A custom item" : "Свой продукт"}
              sub={
                L
                  ? "Add anything that's not in the list."
                  : "Добави нещо, което не е в списъка."
              }
            >
              <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                <div style={{ flex: 1 }}>
                  <label className="input-label">{L ? "Name" : "Името"}</label>
                  <input
                    className="input"
                    value={custom.name}
                    onChange={(e) =>
                      setCustom({ ...custom, name: e.target.value })
                    }
                    placeholder={L ? "e.g. Olives" : "напр. Маслини"}
                    autoFocus
                  />
                </div>
                <div style={{ width: 80 }}>
                  <label className="input-label">Emoji</label>
                  <input
                    className="input"
                    value={custom.emoji}
                    onChange={(e) =>
                      setCustom({ ...custom, emoji: e.target.value })
                    }
                    style={{ textAlign: "center", fontSize: 22 }}
                  />
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <label className="input-label">{L ? "Shelf" : "Рафт"}</label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {SHELF_LABELS.map((s, i) => (
                    <span
                      key={i}
                      className={`chip${custom.shelf === i ? " selected" : ""}`}
                      onClick={() => setCustom({ ...custom, shelf: i })}
                    >
                      {s.n} · {L ? s.en : s.bg}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 22 }}>
                <label className="input-label">
                  {L ? "Days until expiry" : "Дни до изтичане"}
                </label>
                <input
                  className="input"
                  type="number"
                  value={custom.expires}
                  onChange={(e) =>
                    setCustom({ ...custom, expires: e.target.value })
                  }
                  placeholder="7"
                />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button
                  className="btn btn-primary"
                  style={{ flex: 1 }}
                  onClick={addCustom}
                >
                  {L ? "Add to fridge" : "Сложи в хладилника"}
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={() => setCustomOpen(false)}
                >
                  {L ? "Cancel" : "Отказ"}
                </button>
              </div>
            </Modal>
          </div>
        );
      }

      // ─── PRODUCTS ─────────────────────────────────────────────────────────────
      const CATEGORIES = [
        { id: "protein", label: "Месо", labelEn: "Meat" },
        { id: "fish", label: "Риба", labelEn: "Fish" },
        { id: "dairy", label: "Млечни", labelEn: "Dairy" },
        { id: "egg", label: "Яйца", labelEn: "Eggs" },
        { id: "veg", label: "Зеленчуци", labelEn: "Vegetables" },
        { id: "fruit", label: "Плодове", labelEn: "Fruits" },
        { id: "grain", label: "Зърнени", labelEn: "Grains" },
        { id: "condiment", label: "Подправки", labelEn: "Condiments" },
        { id: "other", label: "Друго", labelEn: "Other" },
      ];

      function ProductsScreen({ products, setProducts, lang }) {
        const L = lang === "en";
        const [search, setSearch] = useState("");
        const [statusFilter, setStatusFilter] = useState("all");
        const [addOpen, setAddOpen] = useState(false);
        const [newP, setNewP] = useState({
          name: "",
          emoji: "📦",
          category: "other",
          status: "liked",
        });

        const filtered = products.filter((p) => {
          const n = L && p.nameEn ? p.nameEn : p.name;
          return (
            n.toLowerCase().includes(search.toLowerCase()) &&
            (statusFilter === "all" || p.status === statusFilter)
          );
        });

        const counts = {
          liked: products.filter((p) => p.status === "liked").length,
          disliked: products.filter((p) => p.status === "disliked").length,
          allergic: products.filter((p) => p.status === "allergic").length,
        };

        const addProduct = () => {
          if (!newP.name.trim()) return;
          setProducts([...products, { id: "p" + Date.now(), ...newP }]);
          setNewP({
            name: "",
            emoji: "📦",
            category: "other",
            status: "liked",
          });
          setAddOpen(false);
        };

        const statusBadge = (s) =>
          s === "liked" ? (
            <Badge kind="safe">
              <span className="dot dot-safe" /> {L ? "safe" : "харесвам"}
            </Badge>
          ) : s === "disliked" ? (
            <Badge kind="warn">
              <span className="dot dot-warn" /> {L ? "dislike" : "нелюб."}
            </Badge>
          ) : (
            <Badge kind="danger">
              <span className="dot dot-danger" /> {L ? "allergy" : "алергия"}
            </Badge>
          );

        const cycleStatus = (id) => {
          const order = ["liked", "disliked", "allergic"];
          setProducts(
            products.map((p) =>
              p.id === id
                ? { ...p, status: order[(order.indexOf(p.status) + 1) % 3] }
                : p,
            ),
          );
        };

        const FILTERS = [
          { id: "all", label: L ? "All" : "Всички", n: products.length },
          { id: "liked", label: L ? "Safe" : "Харесвам", n: counts.liked },
          {
            id: "disliked",
            label: L ? "Disliked" : "Не харесвам",
            n: counts.disliked,
          },
          {
            id: "allergic",
            label: L ? "Allergic" : "Алергии",
            n: counts.allergic,
          },
        ];

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Products" : "Продукти"}</span>
              </div>
              <div className="topbar-actions">
                <button
                  className="btn btn-secondary btn-sm"
                  onClick={() => setAddOpen(true)}

                  + {L ? "Add product" : "Добави"}

              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "What I eat & what I don't" : "Какво ям и какво не"}
                </div>
                <h1 className="h-title italic">
                  {L ? "Products" : "Продукти"}
                </h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {L
                    ? "Tap a status to cycle through safe / dislike / allergy."
                    : "Натисни статуса, за да превключиш безопасно / нелюбимо / алергия."}
                </div>
              </div>
              <div className="search" style={{ width: 260 }}>
                <span className="search-glyph">⌕</span>
                <input
                  className="input"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder={L ? "Search products…" : "Търси…"}
                />
              </div>
            </div>

            <div
              style={{
                display: "flex",
                gap: 8,
                marginBottom: 24,
                flexWrap: "wrap",
              }}
            >
              {FILTERS.map((f) => (
                <button
                  key={f.id}
                  className={`chip${statusFilter === f.id ? " selected" : ""}`}
                  onClick={() => setStatusFilter(f.id)}
                >
                  {f.label}{" "}
                  <span
                    style={{
                      opacity: 0.55,
                      marginLeft: 4,
                      fontFamily: "var(--mono)",
                      fontSize: 11,
                    }}
                  >
                    {f.n}
                  </span>
                </button>
              ))}
            </div>

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="empty-glyph">🥕</div>
                <div className="empty-title">Няма продукти</div>
                <div className="empty-sub">
                  {L
                    ? "Add the things you eat often."
                    : "Добави нещата, които ядеш често."}
                </div>
              </div>
            ) : (
              <div className="card" style={{ padding: 0, overflow: "hidden" }}>
                {filtered.map((p) => {
                  const cat = CATEGORIES.find((c) => c.id === p.category);
                  return (
                    <div key={p.id} className="product-row">
                      <span className="p-emoji">{p.emoji}</span>
                      <span className="p-name">
                        {L && p.nameEn ? p.nameEn : p.name}
                      </span>
                      <span className="p-cat">
                        {cat ? (L ? cat.labelEn : cat.label) : "—"}
                      </span>
                      <button
                        className="btn btn-xs"
                        onClick={() => cycleStatus(p.id)}
                        style={{ background: "transparent", padding: 0 }}
                      >
                        {statusBadge(p.status)}
                      </button>
                      <button
                        className="btn-icon"
                        style={{ width: 28, height: 28, fontSize: 11 }}
                        onClick={() =>
                          setProducts(products.filter((x) => x.id !== p.id))
                        }
                        aria-label="Remove"
                      >
                        ✕
                      </button>
                    </div>
                  );
                })}
              </div>
            )}

            <Modal
              open={addOpen}
              onClose={() => setAddOpen(false)}
              title={L ? "Add a product" : "Нов продукт"}
            >
              <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                <div style={{ flex: 1 }}>
                  <label className="input-label">{L ? "Name" : "Името"}</label>
                  <input
                    className="input"
                    value={newP.name}
                    onChange={(e) => setNewP({ ...newP, name: e.target.value })}
                    placeholder={L ? "e.g. Tomatoes" : "напр. Домати"}
                  />
                </div>
                <div style={{ width: 80 }}>
                  <label className="input-label">Emoji</label>
                  <input
                    className="input"
                    value={newP.emoji}
                    onChange={(e) =>
                      setNewP({ ...newP, emoji: e.target.value })
                    }
                    style={{ textAlign: "center", fontSize: 22 }}
                  />
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <label className="input-label">
                  {L ? "Category" : "Категория"}
                </label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {CATEGORIES.map((c) => (
                    <span
                      key={c.id}
                      className={`chip${newP.category === c.id ? " selected" : ""}`}
                      onClick={() => setNewP({ ...newP, category: c.id })}
                    >
                      {L ? c.labelEn : c.label}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 22 }}>
                <label className="input-label">{L ? "Status" : "Статус"}</label>
                <div style={{ display: "flex", gap: 6 }}>
                  <span
                    className={`chip${newP.status === "liked" ? " selected" : ""}`}
                    onClick={() => setNewP({ ...newP, status: "liked" })}
                  >
                    {L ? "Safe" : "Харесвам"}
                  </span>
                  <span
                    className={`chip${newP.status === "disliked" ? " sel-warn" : ""}`}
                    onClick={() => setNewP({ ...newP, status: "disliked" })}
                  >
                    {L ? "Dislike" : "Не харесвам"}
                  </span>
                  <span
                    className={`chip${newP.status === "allergic" ? " sel-danger" : ""}`}
                    onClick={() => setNewP({ ...newP, status: "allergic" })}
                  >
                    {L ? "Allergy" : "Алергия"}
                  </span>
                </div>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button
                  className="btn btn-primary"
                  style={{ flex: 1 }}
                  onClick={addProduct}
                >
                  {L ? "Add" : "Добави"}
                </button>
                <button
                  className="btn btn-ghost"
                  onClick={() => setAddOpen(false)}
                >
                  {L ? "Cancel" : "Отказ"}
                </button>
              </div>
            </Modal>
          </div>
        );
      }

  --clay:oklch(0.58 0.13 38);--clay-deep:oklch(0.42 0.13 38);
  --serif:"Instrument Serif", ui-serif, Georgia, serif;
  --sans:"Geist", ui-sans-serif, system-ui, sans-serif;
  --mono:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
}
html,body{background:#3B342C;color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"ss01","cv11"}
.toolbar{
  position:sticky;top:0;z-index:50;background:rgba(28,24,21,.92);color:#F5F1EA;
  padding:14px 24px;display:flex;align-items:center;gap:14px;
  font-family:var(--mono);font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;
  border-bottom:1px solid rgba(245,241,234,.08);
}
.toolbar .ttl{font-family:var(--serif);font-style:italic;font-size:18px;letter-spacing:-.3px;text-transform:none;color:#F5F1EA;flex:1}
.toolbar button{
  font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:-.1px;text-transform:none;
  padding:9px 16px;border-radius:999px;border:1px solid rgba(245,241,234,.16);
  background:rgba(245,241,234,.06);color:#F5F1EA;cursor:pointer;
}
.toolbar button.primary{background:#F5F1EA;color:var(--ink);border-color:#F5F1EA}
.toolbar button:hover{background:rgba(245,241,234,.16)}
.toolbar button.primary:hover{background:#fff}

.book{max-width:840px;margin:24px auto 64px;display:flex;flex-direction:column;gap:18px;padding:0 16px}

.cb-page{
  position:relative;background:var(--paper);
  width:100%;min-height:1120px;padding:80px 72px;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
  display:flex;flex-direction:column;
}
.cb-page .stripes{position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(135deg, transparent 0 18px, rgba(28,24,21,.025) 18px 19px)}

/* Cover */
.cover{justify-content:space-between;text-align:center;padding:96px 72px 64px}
.cover-inner{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:18px;margin-top:80px}
.brand-mark{font-family:var(--serif);font-style:italic;font-size:44px;letter-spacing:-1.8px;color:var(--ink);line-height:1}
.brand-sub{font-family:var(--mono);font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:48px}
.cover-title{font-family:var(--serif);font-style:italic;font-size:84px;letter-spacing:-3px;line-height:1;color:var(--clay-deep);max-width:11ch}
.cover-intro{font-family:var(--serif);font-size:18px;color:var(--ink-2);max-width:36ch;line-height:1.4;margin-top:10px}
.cover-meta{font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-3);
  display:flex;align-items:center;gap:18px;margin-top:56px}
.cover-meta span+span::before{content:"·";margin-right:18px;color:var(--line-2)}
.cover-bottom{position:relative;display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3)}

/* TOC */
.page-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px}
.page-h{font-family:var(--serif);font-size:54px;letter-spacing:-1.6px;line-height:1;color:var(--ink);margin-bottom:48px}
.page-h em{color:var(--clay-deep);font-style:italic}
.toc-list{list-style:none;margin:0;padding:0}
.toc-list li{display:flex;align-items:baseline;gap:14px;padding:14px 0;border-top:1px solid var(--line);font-size:16px;color:var(--ink)}
.toc-list li:last-child{border-bottom:1px solid var(--line)}
.toc-num{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;color:var(--ink-3);min-width:32px}
.toc-name{flex:0 0 auto;font-family:var(--serif);font-style:italic;font-size:22px;letter-spacing:-.4px;color:var(--ink)}
.toc-dots{flex:1;border-bottom:1px dotted var(--line-2);transform:translateY(-4px);margin:0 4px}
.toc-time{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3)}
.toc-foot{margin-top:auto;padding-top:36px;font-family:var(--serif);font-style:italic;font-size:18px;color:var(--ink-2);max-width:42ch}

/* Recipe */
.r-head{margin-bottom:32px}
.r-title{font-family:var(--serif);font-style:italic;font-size:56px;letter-spacing:-1.6px;line-height:1;color:var(--ink);margin:6px 0 16px;max-width:14ch}
.r-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.r-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
  background:var(--paper-2);color:var(--ink-2);padding:5px 11px;border-radius:999px}
.r-time{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);margin-left:6px}
.r-hero{display:grid;grid-template-columns:1.1fr 1fr;gap:28px;margin-bottom:36px;align-items:end;padding-bottom:32px;border-bottom:1px solid var(--line)}
.r-image{aspect-ratio:1/1;background:var(--paper-2);border-radius:16px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
.r-image .stripes{background:repeating-linear-gradient(135deg, transparent 0 16px, rgba(28,24,21,.04) 16px 17px)}
.r-emoji{font-size:120px;line-height:1}
.r-image-label{position:absolute;left:14px;bottom:12px;font-family:var(--mono);font-size:9.5px;letter-spacing:1px;color:var(--ink-3)}
.r-lede{font-family:var(--serif);font-size:20px;line-height:1.4;color:var(--ink-2);max-width:32ch}
.r-body{display:grid;grid-template-columns:.85fr 1.2fr;gap:48px;margin-bottom:auto}
.r-section-label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.r-ings ul{list-style:none}
.r-ings li{font-size:15px;padding:10px 0;border-bottom:1px solid var(--line);color:var(--ink)}
.r-ings li:last-child{border-bottom:none}
.r-method ol{list-style:none;counter-reset:none}
.r-method li{display:grid;grid-template-columns:54px 1fr;gap:14px;padding:14px 0;border-top:1px solid var(--line);font-size:15px;line-height:1.55;color:var(--ink)}
.r-method li:last-child{border-bottom:1px solid var(--line)}
.step-num{font-family:var(--serif);font-style:italic;font-size:36px;letter-spacing:-1px;line-height:.9;color:var(--clay-deep)}
.step-body{padding-top:6px}
.r-foot{margin-top:36px;padding-top:14px;border-top:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3)}
.r-foot .page-no{font-family:var(--serif);font-style:italic;font-size:18px;letter-spacing:-.5px;text-transform:none;color:var(--ink)}

/* Colophon */
.colophon{justify-content:flex-start}
.colophon p{font-family:var(--serif);font-size:20px;line-height:1.5;color:var(--ink-2);max-width:42ch;margin-bottom:18px}
.colophon p em{font-style:italic;color:var(--ink)}
.colophon-attrib{margin-top:36px !important;font-size:16px !important}
.colophon-mark{margin-top:auto;font-family:var(--serif);font-style:italic;font-size:54px;letter-spacing:-2px;color:var(--clay-deep);align-self:flex-end}

/* PRINT */
@page{size:A4;margin:0}
@media print{
  html,body{background:var(--paper)}
  .toolbar{display:none}
  .book{margin:0;max-width:none;padding:0;gap:0}
  .cb-page{
    width:210mm;min-height:297mm;height:297mm;
    padding:24mm 22mm;box-shadow:none;
    page-break-after:always;break-after:page;
  }
  .cb-page:last-child{page-break-after:auto}
  .cover-title{font-size:78px}
  .r-title{font-size:48px}
  .r-emoji{font-size:96px}
  .r-hero{margin-bottom:24px;padding-bottom:24px}
  .r-body{gap:32px}
}
</style>
</head>
<body>
  <div class="toolbar">
    <div class="ttl">${esc(title)} — Ко-да-ям</div>
    <button onclick="window.close()">${L ? "Close" : "Затвори"}</button>
    <button class="primary" onclick="window.print()">${L ? "Save as PDF" : "Запази като PDF"}</button>
  </div>
  <main class="book">
    ${cover}
    ${toc}
    ${recipePages}
    ${colophon}
  </main>
  <` +
          `script>
    // Give fonts a moment, then surface the print dialog automatically.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => setTimeout(() => window.print(), 350));
    } else {
      window.addEventListener('load', () => setTimeout(() => window.print(), 600));
    }
  </` +
          `script>
</body>
</html>`
        );
      }

      function CookbookScreen({
        recipes,
        favorites,
        toggleFavorite,
        profile,
        lang,
        onOpenRecipe,
      }) {
        const L = lang === "en";
        const [filter, setFilter] = useState("all"); // all | favorites
        const [selected, setSelected] = useLocalStorage(
          "kdy_cookbook_sel_v1",
          [],
        );
        const [setupOpen, setSetupOpen] = useState(false);
        const [title, setTitle] = useState(
          L ? "My Cookbook" : "Моята готварска книга",
        );
        const [author, setAuthor] = useState(
          profile.name || (L ? "A quiet cook" : "Тих готвач"),
        );
        const [intro, setIntro] = useState("");

        useEffect(() => {
          setAuthor(profile.name || (L ? "A quiet cook" : "Тих готвач"));
        }, [profile.name, L]);

        const favSet = new Set(favorites);
        const ownRecipes = recipes; // every recipe in the cookbook is "yours"
        const visibleRecipes =
          filter === "favorites"
            ? ownRecipes.filter((r) => favSet.has(r.id))
            : ownRecipes;

        const selectedSet = new Set(selected);
        const visibleSelectedCount = visibleRecipes.filter((r) =>
          selectedSet.has(r.id),
        ).length;
        const allVisibleSelected =
          visibleRecipes.length > 0 &&
          visibleSelectedCount === visibleRecipes.length;

        const toggle = (id) => {
          setSelected(
            selectedSet.has(id)
              ? selected.filter((x) => x !== id)
              : [...selected, id],
          );
        };
        const selectAllVisible = () => {
          const next = new Set(selected);
          if (allVisibleSelected) {
            visibleRecipes.forEach((r) => next.delete(r.id));
          } else {
            visibleRecipes.forEach((r) => next.add(r.id));
          }
          setSelected([...next]);
        };
        const clearSelection = () => setSelected([]);

        const selectedRecipes = recipes.filter((r) => selectedSet.has(r.id));

        const createBook = () => {
          const html = buildCookbookHTML({
            title:
              title.trim() || (L ? "My Cookbook" : "Моята готварска книга"),
            author: author.trim() || (L ? "A quiet cook" : "Тих готвач"),
            intro: intro.trim(),
            recipes: selectedRecipes,
            lang,
          });
          const blob = new Blob([html], { type: "text/html;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const win = window.open(url, "_blank", "noopener,noreferrer");
          if (!win) {
            // Popup blocked — fall back to download
            const a = document.createElement("a");
            a.href = url;
            a.download = `${(title || "cookbook").replace(/[^\p{L}\p{N}_ -]/gu, "").trim() || "cookbook"}.html`;
            document.body.appendChild(a);
            a.click();
            a.remove();
          }
          setTimeout(() => URL.revokeObjectURL(url), 60_000);
          setSetupOpen(false);
        };

        const favCount = ownRecipes.filter((r) => favSet.has(r.id)).length;
        const blocked = [...profile.allergies, ...profile.dislikes];

        return (
          <div className="fade-in">
            <div className="topbar">
              <div className="breadcrumb">
                {L ? "Kitchen" : "Кухня"}{" "}
                <span>/ {L ? "Cookbook" : "Готварска книга"}</span>
              </div>
              <div className="topbar-actions">
                <button
                  className="btn btn-secondary btn-sm"
                  onClick={() => setSelected(ownRecipes.map((r) => r.id))}
                  disabled={ownRecipes.length === 0}
                >
                  {L ? "Select all recipes" : "Избери всички"}
                </button>
              </div>
            </div>

            <div className="page-head">
              <div>
                <div className="eyebrow" style={{ marginBottom: 12 }}>
                  {L ? "Make a book" : "Направи книга"}
                </div>
                <h1 className="h-title italic">
                  {L ? "Your" : "Твоята"}{" "}
                  <span
                    style={{ fontStyle: "italic", color: "var(--clay-deep)" }}
                  >
                    {L ? "cookbook" : "готварска книга"}
                  </span>
                </h1>
                <div className="page-head-sub" style={{ marginTop: 8 }}>
                  {L
                    ? "Pick recipes from your saved collection and favorites, then export a typeset PDF — cover, contents and all."
                    : "Избери рецепти от своята книга и любими, после генерирай PDF — корица, съдържание и всичко необходимо."}
                </div>
              </div>
            </div>

            <div className="cb-toolbar">
              <div className="cb-tabs" role="tablist">
                <button
                  className={`cb-tab${filter === "all" ? " active" : ""}`}
                  onClick={() => setFilter("all")}
                >
                  {L ? "My recipes" : "Моите рецепти"}
                  <span className="count">{ownRecipes.length}</span>
                </button>
                <button
                  className={`cb-tab${filter === "favorites" ? " active" : ""}`}
                  onClick={() => setFilter("favorites")}
                >
                  <span style={{ color: "var(--clay-deep)", fontSize: 13 }}>
                    ♥
                  </span>
                  {L ? "Favorites" : "Любими"}
                  <span className="count">{favCount}</span>
                </button>
              </div>
              <div className="cb-toolbar-actions">
                {visibleRecipes.length > 0 && (
                  <button className="cb-mini-btn" onClick={selectAllVisible}>
                    {allVisibleSelected
                      ? L
                        ? "Deselect visible"
                        : "Размаркирай"
                      : L
                        ? "Select visible"
                        : "Маркирай видимите"}
                  </button>
                )}
                {selected.length > 0 && (
                  <button className="cb-mini-btn" onClick={clearSelection}>
                    {L ? "Clear" : "Изчисти"}
                  </button>
                )}
              </div>
            </div>

            {visibleRecipes.length === 0 ? (
              <div className="empty">
                <div className="empty-glyph">
                  {filter === "favorites" ? "♡" : "📖"}
                </div>
                <div className="empty-title">
                  {filter === "favorites"
                    ? L
                      ? "No favorites yet"
                      : "Все още няма любими"
                    : L
                      ? "No recipes yet"
                      : "Все още няма рецепти"}
                </div>
                <div className="empty-sub">
                  {filter === "favorites"
                    ? L
                      ? "Tap the heart on any recipe card to mark it as a favorite."
                      : "Натисни сърцето на някоя рецепта, за да я добавиш в любимите."
                    : L
                      ? "Add a recipe from the Recipes tab to start your book."
                      : 'Добави рецепта от страницата „Рецепти", за да започнеш книгата.'}
                </div>
              </div>
            ) : (
              <div className="grid-3">
                {visibleRecipes.map((r) => {
                  const isSel = selectedSet.has(r.id);
                  const flagged = (r.requiredIngredients || []).some((i) =>
                    blocked.some((b) => i.toLowerCase().includes(b)),
                  );
                  return (
                    <article
                      key={r.id}
                      className={`recipe-card cb-card${isSel ? " selected" : ""}${flagged ? " flagged" : ""}`}
                      onClick={() => toggle(r.id)}
                    >
                      <button
                        className="cb-check"
                        aria-label={L ? "Toggle selection" : "Превключи"}
                      />
                      {favSet.has(r.id) && (
                        <span className="fav-tag">
                          ♥ {L ? "fav" : "любима"}
                        </span>
                      )}
                      <div className="recipe-image">
                        <div className="recipe-image-stripes" />
                        <div className="recipe-image-emoji">{r.emoji}</div>
                        <div className="recipe-image-label">
                          PHOTO · {r.time}MIN
                        </div>
                      </div>
                      <div className="recipe-body">
                        <div className="recipe-name italic">
                          {L && r.nameEn ? r.nameEn : r.name}
                        </div>
                        <div className="recipe-meta">
                          {r.tags?.[0] || (L ? "recipe" : "рецепта")} · {r.time}{" "}
                          {L ? "min" : "мин"} ·{" "}
                          {(r.requiredIngredients || []).length}{" "}
                          {L ? "ings" : "съст."}
                        </div>
                      </div>
                    </article>
                  );
                })}
              </div>
            )}

            {selected.length > 0 && (
              <div className="cb-bar">
                <div className="cb-count">
                  <b>{selected.length}</b>{" "}
                  {L
                    ? selected.length === 1
                      ? "recipe selected"
                      : "recipes selected"
                    : selected.length === 1
                      ? "избрана рецепта"
                      : "избрани рецепти"}
                </div>
                <button className="btn-ghost-on-ink" onClick={clearSelection}>
                  {L ? "Clear" : "Изчисти"}
                </button>
                <button
                  className="btn-paper"
                  onClick={() => setSetupOpen(true)}
                  disabled={selected.length === 0}
                >
                  {L ? "Create a Recipe Book" : "Създай готварска книга"}
                  <span style={{ opacity: 0.6 }}>→</span>
                </button>
              </div>
            )}

            <Modal
              open={setupOpen}
              onClose={() => setSetupOpen(false)}
              title={L ? "A new cookbook" : "Нова готварска книга"}
              sub={
                L
                  ? `${selectedRecipes.length} recipes — cover, contents, and a page for each.`
                  : `${selectedRecipes.length} рецепти — корица, съдържание и страница за всяка.`
              }
            >
              <div className="cb-cover">
                <div className="cb-cover-eyebrow">
                  Ко-да-ям · {L ? "Volume I" : "Том I"}
                </div>
                <div className="cb-cover-title">
                  {title || (L ? "Untitled" : "Без име")}
                </div>
                <div className="cb-cover-author">
                  {L ? "by" : "от"}{" "}
                  {author || (L ? "a quiet cook" : "тих готвач")}
                </div>
                <div className="cb-cover-meta">
                  <span>
                    {selectedRecipes.length} {L ? "recipes" : "рецепти"}
                  </span>
                  <span>
                    {new Date().toLocaleDateString(L ? "en-GB" : "bg-BG", {
                      month: "long",
                      year: "numeric",
                    })}
                  </span>
                </div>
              </div>

              <div className="cb-form-row">
                <div>
                  <label className="input-label">
                    {L ? "Book title" : "Заглавие"}
                  </label>
                  <input
                    className="input"
                    value={title}
                    onChange={(e) => setTitle(e.target.value)}
                    placeholder={L ? "My Cookbook" : "Моята готварска книга"}
                  />
                </div>
                <div>
                  <label className="input-label">
                    {L ? "Author" : "Автор"}
                  </label>
                  <input
                    className="input"
                    value={author}
                    onChange={(e) => setAuthor(e.target.value)}
                    placeholder={L ? "Your name" : "Твоето име"}
                  />
                </div>
              </div>
              <div className="cb-form-row full">
                <div>
                  <label className="input-label">
                    {L
                      ? "A short dedication (optional)"
                      : "Кратко посвещение (по избор)"}
                  </label>
                  <input
                    className="input"
                    value={intro}
                    onChange={(e) => setIntro(e.target.value)}
                    placeholder={
                      L
                        ? "Cooked from a small kitchen, with love."
                        : "Готвено в малка кухня, с любов."
                    }
                  />
                </div>
              </div>

              <div
                style={{
                  fontFamily: "var(--mono)",
                  fontSize: 10.5,
                  letterSpacing: "1px",
                  textTransform: "uppercase",
                  color: "var(--ink-3)",
                  margin: "18px 0 14px",
                }}
              >
                {L ? "Included recipes" : "Включени рецепти"}
              </div>
              <div
                style={{
                  maxHeight: 180,
                  overflowY: "auto",
                  border: "1px solid var(--line)",

              >
                {selectedRecipes.length === 0 ? (
                  <div

                ) : (

                    <div
                      key={r.id}
                      style={{
                        display: "flex",

                        padding: "8px 0",

                          i === selectedRecipes.length - 1
                            ? "none"
